body:
  text: 佛學之宗旨和目的十九年春在閩南佛學院講現在在院求學的學僧是從各方雲集而來的其年齡程度以及思想性情等等當然也決不會一致的可是有一點是很統一的就是同住在閩南佛學院讀書求學你們須注意這個佛學院並不是一般所謂學校閩南佛學院的宗旨是要將佛學院精神實現為人間社會建設的由理想達之事實這點精神和宗旨你們須十分確切認清然後方不負教者學者的初願平常説僧伽是和合衆其精神也就在此佛學院中的學僧要成為有生命有精神的和合衆不然則是徒具形式早已失去所以為閩南佛學院底效用這樣一來將使教員是教員學僧是學僧且其思想行動已成散沙之勢不能結合成一個有生命的和合衆了所以在這裡求學的學僧並不是隨隨便便聽講學課所能完事的是有重大使命的本來在佛教底進程上講來出家比丘已從三歸五戒而超越過了沙彌的地位在佛教應已具有相當的信心和志願這種志願和信心比個己的生命還看得重要雖然出家可以返俗但這不過是一種例外罷了如真心出了家實在是要想把這種信心和志願達之於無窮盡的空間和時間的不然出家不過是一回兒戲還有你們要認清的在閩南佛學院是要拿出精神來學佛學的院內雖有各門學課也要從事修學那是拿來作為研究和宣傳佛學的工具根本是要以佛學的信念為目標的佛學院既以佛學為唯一的宗旨只要你們能深切認清不遺不忘則對于其餘的學課知識不妨盡量容納如修學文學的不但要以文學來領略佛經還要以優美的文學來表顯佛理使不知佛學的人知道有佛教修學哲學科學等也是這樣但是平常有一種很深的病症是學各學科時即被各學科所轉而忽略且忘卻根本的佛學例如有文學興趣的學僧即被文學尤其是文藝一類的書所轉對於佛學便不能注意研精這樣非特失了佛學院中所有的一致的精神和目標並且因不能領略到學佛的真趣寖假離了佛教而不信佛教比未來佛學院更壞結果豈不相反我看到這種不好的現象所以我今天要特別提出來這不是教你們不去修學各種學問是教你們在修學各種學問的時候不要忘記以佛學為根本的精神這種精神是你們所以到佛學院來集合一起的總因應該是從你們自己心靈中湧現出來的共同要求而不是從外面滲入的要使在佛學院修學的你們越加明記不忘地保持這種佛學院的根本共同精神所以再為你們説佛學的宗旨和目的佛學底宗旨和目的簡單地概括起來不過是自利利他而已其實世間所有種種的工作云為也不過為的彼此間利益而已惟所差在究竟與不究竟之別在佛學的見地來説惟有佛學乃能達到究竟自利利他佛學所要達到的究竟自利利他有智斷恩的三種德能能夠把這三種德能造詣到了圓滿的程度則已算達到了佛教中自利利他的究竟目的但是這種最高至極的自利利他究竟目的不容易達到必須先立其基礎這種基礎的條件最要的是正見和正信正戒正念正定正業利生為事業宏法是家務正見是依研究正教而引生的即是佛經中所謂正知正見這種正知正見並非憑個人的粗浮知識來做標準的是要懇切精細的心思來受學一切經論所以説無論學佛或研究佛學都很不容易你們不要忽略這種初學佛學的基礎如果不將這初步自利利他的基礎建立牢固則究竟自利利他的目標終末由達到所以你們要想真實達到究竟自利利他的目標非從這基礎工夫做起不可現在把我以上對你們所説佛學上自利利他的目標和關係表示於下自利正見基礎的正信正戒正念正定利他正業佛學的目標自利斷究竟的智利他恩岫盧記見海刊十一卷三期附注原題對於閩南佛學院學僧訓話今改題
