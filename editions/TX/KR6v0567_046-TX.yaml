body:
  text: 優婆夷教育與佛化家庭二十四年十一月在香港東蓮覺苑講在釋迦如來興世的時代印度有一須達長者建設了一個祗樹給孤獨園請佛說法這段因緣中國學佛者差不多都知道的還有一個優婆夷的領袖毘舍佉母曾經在舍衛國施設鹿子母講堂請佛說法作弘揚佛化的道場是佛教史上最負盛名的優婆夷然現在學佛的人皆知有祗樹給孤獨園對于鹿子母講堂則少有所知今日感到張苑長在華南創開東蓮覺苑建築富麗堂皇的房舍如一新的世界儼如毘舍佉母當時築設講堂為佛弘法的道場一樣光景中國在近二三十年來起了很大的變化在這變化中中國幾千年傳下來的固有文化碰到今日世界的歐美文明就起了交換變化的作用中國固有的風俗習慣道德等等皆受搖動同時流傳中國已有一千八百年歷史的佛教也因此在遞嬗推移之中在這遞嬗演變也可說是飄搖不穩的時候有人出而提倡適應時機所宜之佛教教育是很難得的今張苑長居然開辦覺苑教育僧俗女子自然是很堪讚歎的了差不多在二十七年前楊仁山居士曾在南京設一祗洹精舍一方面專事印刻經典今金陵刻經處是把從前遺失在日本高麗等隋唐高僧之著述皆取回重流行於中國一方面與印度達磨波羅居士接洽先通英文後習梵文想把中國的佛教譯還印度昌明到全世界以前辦佛教教育的曾有楊居士設立的祗洹精舍而我當時也就是參加學習的一員祗洹精舍後因經濟不裕不久即停頓而繼續辦下去的祗有金陵刻經處為中國流行經本中最好的版本但是祗洹精舍雖辦了不久即停頓其影響後來的佛教事業實大民元發起中華佛教會的歐陽漸梅擷雲李證剛等居士僧中如仁山智光等法師都是精舍中的人故二三十年來能引導許多居士信佛其原動力實有賴於楊居士太虛自出精舍即至廣東弘法民初與仁山法師等辦佛教協進會及中華佛教總會皆為適合中國現代時勢的需要而建立四眾弘化適機的機關這就是當時楊居士創立祗洹精舍與後來佛教的關係現在張居士所辦之東蓮覺苑其規模較祗洹精舍為宏大即學額與經濟的數量都超過祗洹精舍加之對佛法具有深切的信心善與佛法中各方面的緇素聯絡則其發達影響于將來中國的佛教必較楊居士所辦祗洹精舍的成效為尤大至於本人二十多年來雖有一種懷抱著的志願覺得應如何去適應現代思潮與環境的需要把佛法普及全中國與全世界以佛法救濟世界人類使全人類咸沐佛法的利益在此大前提上又覺得須先將主持弘揚代表佛教的在家出家四眾教育好整頓好成為真能主持佛教弘揚佛教代表佛教者然後佛教才得以普遍深入的傳播於全人類之間倘無良好住持佛教的人材則雖有適合時代潮流足以救濟人類的佛教亦必因不得弘傳而聽之潰爛因此我時感到佛教內部的制度有改善的需要應如何去教養僧眾應如何去結合信眾而成立有和諧合聚精神的團體實行弘揚佛法的工作本此宗旨過去也曾發表了許多言論而事實上做到的實在很少很少所以張苑長和陳居士稱揚及此聞之只有慚愧近年來在出家人寺院裏或其他另外新興的新場所也曾有佛學院或僧學院的組織稱之為辦僧教育的機關但因都在佛教過渡期中作臨時應付辦法故至今尚未能走上有程序有系統的僧教育軌道過去只能算是在僧教育上做了一些零零碎碎的工作在中國既無整個系統的僧教育機關故過去未能有顯明卓著的成績即在學僧方面亦尚談不到學以致用尤其是女子學佛的機關甚少甚少十來年前在武昌曾辦女眾佛學院繼之尚有北平及武漢二三處但因規模不宏人數無幾故無多大成績可言總共起來學過者亦不下百人因無良好出路一出院即感到沒有什麼事情可做那末還能希望他有成績斐然給我們看嗎由此種過去的回想覺到今後辦佛教教育實有改善的地方而現在我雖初到東蓮覺苑不大知悉詳情然確是一個很好的佛教教育道場除了數十人住在苑中專修佛法外尚學英文國文及普通學識而且還另設義學以佛教的知識灌輸純真的孩童這種教育法是很好的因為既有體復有用如所辦高級教育注重佛法修學便是體同時還學普通文字及辦小學使將來的佛教流入社會就是用體用兼重是現在辦佛教教育最需要的故能如此做下去對於弘揚佛法建立佛教於將來的世界是有很大的幫助根據上說的意思我對於東蓮覺苑所辦的教育還要貢獻幾點意見一依中國舊有的習慣一說到佛教即認為出家二眾住寺院才是佛教學佛者是必須住寺院出家的實則大謬不然寺院和出家人雖是代表佛教者但信佛學佛者實不拘於住寺院的僧尼學佛者是需要普遍深入社會方能表現出佛教的普及精神今貴苑中尚有出家尼眾頂好能完全教導在家眾來修學佛法而其所學所做亦不必限於作佛教的功課凡女子所應學的知識與所應作的事業皆宜學習使之將來學成後能作真正的優婆夷二此地應專作優婆夷眾之道場故其所施設的教育亦宜著重於優婆夷教育但如何是優婆夷教育呢即如今小學所受之教育為國民教育將來亦可升受佛教教育使之對佛法作普通教理研究與功課修養教理研究與功課修養同時並進便可訓練成在佛法中有解有行的佛弟子優婆夷但祇如此做則所辦的教育亦是有體無用因無學習現時社會做事的知識與能力一出寺苑之門即如迷路的羔羊找不到適宜住宿生活的地方故應認清此地為優婆夷道場優婆夷教育應注重的有以下數點甲優婆夷教育首先要注重能處理家事的家庭教育造成此種優婆夷人材將來便可使他們家庭佛教化乙此地學生華文英文並習將來學有餘力時亦可出洋傳教如外國牧師之來中國傳教興學校設醫院等然在現在的中國存此希望自知這希望未免太奢但若能學習中醫去外國一面施醫一面傳教是比較容易做得到的祇要有人肯發心做的話丙中國近來亦有人要發起辦佛教醫院如前年漢口曾有人發起創辦而未成事實者因要院中辦事人皆為信佛者不容易找到蓋覓少數佛徒的醫師尚容易唯有看護士一類要完全信佛的就很難物色所有物色來的都是信崇他教的所以這種人材亦有造就的需要丁優婆夷教育還要注重幼稚園和小學教師的人材造就現在社會上有許多人都把子女送往幼稚園或小學或在家庭中另請教師教養而這些教師大都是異教徒若佛教中有這類人材去當家庭教師或幼稚園小學教師則佛教將來必有普遍深入社會之可能因此優婆夷除了專心學佛的人格修養外還須施以家事教育中醫教育看護教育幼稚園小學之師範教育等則所造之材必各有所需各適其適個人既成為社會有用之人而佛教亦可由此流入社會民眾間裨益當非淺鮮三所謂佛化家庭在家學佛的二眾須特別注意尤其是造成佛化家庭的因素是在學佛的婦女佛化家庭在佛教中向未注重故佛教在世界上雖曾盛行一時於各國而有不久滅跡銷聲者我曾考察印度的歷史今印度有婆羅門教徒二萬多人回教徒也有七千萬人即後來傳入的基督教亦有一千多萬人其餘如尼犍子教徒即今所謂之耆那教亦有兩百萬多人而佛教在今日的印度除近尼泊爾的雪山部落中有少部份人信仰佛教其餘者都是非佛教徒其餘散零的在家佛教徒只是從錫蘭的佛團流傳過去的非是印度原有的印度本為佛教的發源地自佛世經阿育王至戒日王時代佛教在印度曾因崇奉信仰而放燦爛的光彩使婆羅門教的氣燄一落千丈到了今日婆羅門教復興回教耶教盛行甚至耆那教亦有信徒二三百萬眾佛教反而衰落而至於滅跡這是什麼緣故呢由歷史的考察知道由過去主持佛教者唯為寺院僧眾而維護興盛佛教的關鍵完全操諸高僧及國王大臣之手若有王臣擁護的佛教高僧便可使佛教弘盛風靡一時否則若某一時代無傑出僧材不能引生王臣信仰或遇根本不信佛教的國王佛教自然被壓迫摧殘了在中國元末的時候蒙古部屬崇奉回教的莫臥爾曾征服印度而建立莫臥爾帝國想把印度的宗教消滅了但這時除佛教已在印度被滅跡其他婆羅門教與耆那教等並沒有被回教摧滅原因是婆羅門教和耆那教是建築在家庭宗教的基礎上過去已把家庭宗族宗教化祖父子孫歷代相承在一般社會中已根深蒂固故不容易為異教所征滅得以長久流行及觀佛教所以在印度滅跡就因沒有同婆羅門和耆那教一樣地把基礎建築在家庭上不與全民發生分離不開的關係故有今日的結果從這種歷史的教訓上知道佛教過去在流傳上的失敗故今後在家學佛的信眾應把家庭整個佛教化凡是我家庭中之子孫婢僕皆須灌輸以佛教知識使之信崇子子孫孫遞相傳承與佛教發生親密的關係把佛教在家族上打下一個深固的基礎則佛教將來就可永遠流傳下去要使佛教消滅除非人類都消滅了如婆羅門教與耆那教在印度的潛勢力一樣故我在第一點中即提說要家庭佛教化而其責任則在優婆夷要把佛化的家庭造成比不信佛者的家庭更來得清潔整齊美麗樸實同時也就能感化了不信佛的人因東蓮覺苑是以優婆夷教育為本位的故有以上三點意見的貢獻東蓮覺苑雖附設有義務小學但主要者是專修佛學我現在反專在優婆夷的普通教育上發言似覺輕重倒置實則我所以注意優婆夷的普通教育是有意思的因覺得佛學界對在家學佛女子所施教育若無如此之辦法則學成而出院者除去入菴作尼必更無用處故不厭煩瑣剴切言之竹摩記見海潮音十七卷二期
