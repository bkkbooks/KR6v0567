body:
  text: 佛教和平國際的提議二十六年一月在上海市佛學會作佛教的和平本質在諸法一眾生一世界一事一物以至一原素的各一單位眾緣生諸法無自性諸法無自性諸法眾緣生的理論般若此理論的具體表現即是一攝一切一切攝一的法界在人群即為個人是具有協力的和合關係之群體的分子社會是具有協力的和合關係之分子的群體由此每一眾生的發心行事應為法界眾生的除苦大悲成樂大慈而動作方便每一個人的發心行事應為世界人群的除害成利而動作以茲和平原則應用到世界人類則為國際和平應用到國家民族則為國內和平現今世界人類反和平的鬥爭則為階級對立與民族對立的兩大鬥爭然在中國則既未形成兩大階級的對立亦未完成民族國家的統一遂由國內殘餘封建勢力的軍閥藉國際之民族鬥爭與階級鬥爭的背景以為破壞國家民族統一的割據分裂故猶有消弭內亂以建設國家民族統一的需要蓋自蘇俄放棄世界革命而建設一國社會主義以來已將階級鬥爭屈服於民族鬥爭之下形成民族鬥爭的極端尖銳化時代此時的中國設非建成統一的民族國家則中國民族必為旁的民族所獨吞或分割無以自存故為救亡圖存而完成統一的民族國家計對於欲保持封建餘勢的內爭既非用武力戡平不可而外來的強鄰侵逼尤非武力抵抗不為功如程清舫在儒術政治與中國武化一書中所謂我們目前是急切需要中國的武化需要勇於戰以戰收復失地同時亦需要辯的外交為戰爭後盾根據這現代的中國武化的新原則強化一切的組織和活動政治要絕對的統一經濟亦須同樣的加以統制他如教育以及一般的民眾生活亦復聯帶的必然的要施以嚴格的軍事化紀律化強化得像水泥鋼骨一般的結得牢豎得起耐得久靠得住為迫於外力壓迫的需要我們應努力照這樣做我們應切實做到這樣中國民族為迫於需要而求建現代的統一國家安內攘外的武化既為必須的工作故佛教的和平原則幾無施用之地而佛教徒最近所提倡的護國和平會亦殆無成立的可能唯是中國現今的內亂既以國際兩大鬥爭為背景則為消弭內亂的拔本塞源計端在融解國際兩大對立而建設和平國際何況在兩大鬥爭一消一長間階級鬥爭現雖暫屈於民族鬥爭之下迨民族鬥爭鬆懈後階級鬥爭必又抬頭到階級鬥爭疲敝後民族鬥爭又必興起設非闡明世界人類和平的本然社會真相組織和平國際以造成和平的人類世界俾兩大對立從根本上不復存在則終於起伏於兩大鬥爭故建成現代的統一國家亦不過造成一民族鬥爭的戰鬥員雖有暫圖自存的意義而無利益世界人類的價值由此發揮佛教和平原理以成立佛教和平國際為利益國民及世界人類而作國際的和平建設實為現代佛教對於人群應盡之義務因此佛教徒護國和平會應改佛教和平國際之組織原來社會即人群有本然的與構成的二大區別本然社會即人類生於是死於是之協力的和合關係群體原始的亦終極的即為世界具體而微之初起的則為家族擴大而演進則為國家由家族擴進為國家群體之過程上則有強族貴族或武士的封建始為推進家族以成國家群體之動力終為建成民族的統一國家之障礙故欲建成近代的民族國家必須剷除封建的殘存由國家進達為世界群體的過程上則有類似封建的民族國家亦始為推進國家以成世界群體之動力終為建成世界的和平社會之障礙然強族的封建有演進為聯邦的統一民族國家之一格故民族國家亦可演進為聯邦的世界群體而佛教的和平國際之運動亦即以聯邦世界為目標蓋人類初時生死於家族群體中雞鳴犬吠相聞至老死不相往來家族即等於世界至進為封建時代藉天然之大山巨海為障隔自給自足人民之生死於國家群體中國家即等於世界在家與國間之強族的封建區域則等於今之所謂國家再進為民族國家時代則封建區域夷為中央政府統一下之地方政府而同時以民族的國與國間衝突或調協之結果經濟的政治的文化的交相涉入形成國際間不可離絕的密切關係遂不得不以聯邦的世界為趨向實現人類終極的世界群體在聯邦世界中則今日的民族國家亦降為世界聯邦政府統一下之地方政府無復民族對立的鬥爭現今全地球交通便利列強的經濟政治文化皆已形成世界關係民族鬥爭的結果無論勝負誰屬均為自殺故亟應有國際和平之建設至中國則猶有平內抗外以從半殖民地起為自主的統一的民族國家的需要其以鄉邑或學術職業地位政見宗教等等各種關係所集結之團體則為人類或出或入於其中之構成社會雖亦有群體與分子之協力的和合關係而可隨宜以出入離合故異本然之社會至分裂為階級對立之組織尤為出於本然社會陷入病態之時失去了全社會協力的和合關係乃成分立的抗爭此種抗爭雖或可成為進化而亦可成為退化且在當時總是成為社會文化力的分崩與消失故終以能銷融弭解為上策由此對於隱伏在各民族國家間之國際的階級對抗鬥爭尤有闡明佛教和平本質建設和平國際之需要然此佛教和平國際應從怎樣的途徑而為組織以什麼為切要的工作吾意當徵集現居東方第一大都市之上海的各國佛教徒重要分子開發起人會先成立佛教和平國際籌備處發揚佛教和平真理廣徵集世界各國佛教徒之抱此弘願者參加發起俟亞歐美各國佛教徒均有重要分子為發起人後乃定期召開成立大會成立佛教和平國際本部而於有同志佛教徒三十人以上之各國分設支部每年擇於有支部各國輪流開代表大會一次以議決施行各種建設和平國際之工作至工作之內容自應以闡發佛教和平勝義應用之以為非暴寡非凌弱非爭霸非侵掠的反戰鬥理論以萎折各強橫民族心理上瘋狂的戾氣兇燄服清涼散而平息嗔火同時亦實踐布施等六度四攝的菩薩方便行對於防禦或抵制各種掠奪攻戰的設施予以提倡資助更廣為救災濟苦種種慈行如王一亭菩薩等新近在上海創立之佛教黃卍字會必須聯合四眾各國佛教徒成為佛教的國際組織乃能發揮與紅十字會並駕齊驅或駕而上之的廣大功用要言之則本佛法緣生性空真實義發宣為人類和平福音學習修持種種方便行以實現大悲大慈普濟普利而已於此尤所盼望者則於佛教教義上今不惟漢藏已能交換研究翻譯而日本暹羅錫蘭緬甸以及歐美等佛徒亦已能與中國佛徒為個人的或團體的互相往來研習特猶須速組聯合研究宣傳之機關耳然尤要者乃在宣揚佛教和平之真理攜手共作各種和平國際之實地行動從事業上以表現佛教之和平意趣中日兩國佛教尤有同文之密切連繫日本昔嘗學習中國之佛教中國今亦多譯日文之佛學而在此中日國交衝突緊張之情勢上中日佛教徒若能從佛教和平精神之感應迴轉日本對於中國侵略的趨向俾中國民族有以復興自存進為平等和合的真正親善同心協力以融解國際的兩大對立鬥爭為世界人類的和平幸福而努力方能發揮佛教對於現代人類的實際功用日本佛徒曾誤責余露骨宣揚抗日譏為失去佛教精神故於此甚望日本佛徒能不失佛教精神以平等和合來協作國際的佛教和平之運動世人又每以政僧譏余然據孫中山先生之解釋政即眾人之事政治即管理眾人之事廣義的管理眾人之事當無有過於菩薩僧者亦唯菩薩僧乃為真正的更無私事而專管理眾人之事故不同聲聞僧少事少業少希望住而剴切的表示須多事多業多希望住余固未足為菩薩僧然志願所在則未嘗一日忘學菩薩僧也特患未能符政僧的名實又何患世人之稱為政僧願世之學菩薩學菩薩僧的佛徒皆蹶然興起以共修此建設和平國際的菩薩大行見海刊十八卷三期是日四十七歲滿作此回向慈母上生內院二六一二八在上海市佛學會
