body:
  text: 中國現時學僧應取之態度十八年十二月在閩南佛學院講學僧是指現時已受佛教教育的一班僧伽而言的其範圍限於中國故名中國學僧今中國的教育與實際生活不合宜已經識者道破原因是以前中國所有的教育制度太偏於階級觀念教育的出發點就是為士做官除此之外農工商等的生產工作差不多都是存了一種鄙視的心理所謂書中自有黃金屋書中自有千鍾祿視讀書為高尚於是凡受過教育的人俱成為四體不勤百事不為的寄生者這種現象在以前的中國社會制度之下還可以勉強適應但在生存競爭最利害的現在無論如何是不能不一反其道的了中國近數十年來的教育表面上觀察起來似乎已呈有很新的氣象然而比較各國則依舊未能脫離以前的文人習氣學校中出來的尤其是一些大學校裏頭出來的資格文憑一到手其惟一出路不是到處謀教員就是做政客以助長軍閥的勢焰彷彿一經受教育的人只能做教員做官做紳士似的在未曾受教育的時候本來還可以為低等生產能力的人一經受過教育不但不能為低等生產能力的人反而一變為社會之累為社會高等游民這種現象考之中國教育之實況在前此實在有這種不良的趨勢但在最近的將來也許會漸漸地一天一天地消滅下去本來教育原不過是人生生活中比較有意義的一種活動的事業是人人必需的一種工作怎麼能給那種階級所壟斷質言之教育既然是人生生活中的一種工作當然無論何人皆可讀書求知受教育同時當然無論你是受過大學教育或怎樣高貴的人統統都應當從事勞力勞心的實際生活所以在現代教育狀況比較完美的美國不但學生都要從事實際勞動就是一些大學教授也得在現實生活中操作這是我此番親自從美國考察到的他們雖然到處有汽車並不是專為物質上的享樂其目的是為時間上的經濟又前幾年曾到中國來講學的羅素居然離英倫數百里的一個山村中辦了一個理想的學校親自領帶著六七歲至十六七歲的學生在山村那里勞動工作在我去參觀的時候他的夫人剛剛在田野中回來還帶了一身泥濘這也是我親眼見到的歐美還有一種活潑的精神足以使我們十分慚愧的是讀書求知同生活勞動化並沒有時間性他們自從二十歲離了父母獨立生活之後一直到臨死為止天天總是在並行不悖地讀書求知同時也天天總是置身在生活勞動化中過那活潑有興趣的現實生活所謂學到老做到老生活到老同時還趣味到老因此每每有五六十歲的老年男女還活潑的在大學里做學生像這種精神在現代的中國不但在佛教僧伽中找不到即在中國教育界中也是遍覓不著的你們受佛教教育的學僧要想真正為一個現代的新佛徒須注意到現代的精神十數年來的中國佛教教育也曾以少數人的力量致力於此然而能力同效果依舊免不了像中國以前所有的文人習氣佛教教育中所造出來的一部分學僧以為不是去當教員或者辦報紙再不然就沒有事做只好向社會裏去浮沉關於社會實際的佛教勞動生活一點都不想去做因為這樣結果非常空虛非常危險現在佛教僧伽中一部分學僧對於佛教前途要想有一線光明希望的話則我老實告訴你們非將向來所有一切不良的文弱的姑息的舊習統統打破不可不但打破而已同時對於現實生活應明白他即是緣生無生的真相還要真真實實地帶了虔誠的性質去身體力行而使這些現實生活完全成為生活藝術化這樣不但不為社會所鄙視即在自己個人的日常生活也能更進一層底得到一種深的意味從實際上說國家社會所有的富強力完全在於人民各個分子的能力增加教育的可貴亦只是謀國家社會的富強力即國民能力的增加而已根據這種道理則出家的學僧既然不能離了國家社會而獨立生活對於國家社會的富強力當然要以個己的分子來盡其當盡的能力然後纔能不有負於國家社會如此如社會仍有人來輕視你們那是他們的輕薄這裏要談到你們學僧底態度了學僧求學應取的態度首先應當決定的一根據佛學的真理二適應現代的社會以此兩種目標來建新中國的佛教僧伽制度使這種新佛教僧伽制度築在人間世的基礎上面平常說佛法在世間不離世間覺要運用在世間作那應作之事這才能使佛教在世界人類中自然地有一種教化的力量此種教化的力量能夠運動成功更進一步即能成很普遍的佛教教化而使世界民眾皆有受佛教教化的機會復次求學的學僧要達到上述的目的是第一對於佛教的本身要有深切認識和信仰第二對於現代世界潮流的狀況也要把它的地位同價值有極深刻的明了和體驗養成了這種獨立不倚的智力便能深立在佛法的地位上來觀察社會適應社會行人所不能行做人所不能做的大無畏的大事業這種事業的種類可分有下列幾條一教育事業二宣傳事業三教務事業四慈善事業五其他社會公益等等學僧依著這幾個條件隨力隨分在一個地方佛寺或一個縣分教團碰到有這種機緣的時候應當去做一個首義者即使遇不到這種機緣也應當去創造出這種事業惟這種能力必須要在學僧時代養成可是這裏又要注意是這種知識能力的養成並不完全在死板書本裏頭是要在現實生活上練習經驗的小心罷你們將來是新佛教的新主人喲復次佛教教育中的學僧要能完整地做到這步田地還不能說已盡學僧的責任學僧須對於佛法有真正的修養還要從大乘的四攝六度等做去佛法中戒定慧三學為大小乘之所共行六度四攝則為菩薩之所特行然六度之於戒定慧不過增加布施忍辱二者而已至於精進乃通於諸度的就布施方面有三一財施肯犧牲自己金錢而為群眾謀利益者二法施以自己優美的知識貢獻於大眾者三無畏施見人在困難怖畏之中而能以方便善巧使其解脫者總之大乘布施之特點非是一人闔戶自守所能有的必須將佛法普遍到社會上去乃能有布施之事忍辱者甘願替受一切眾生之苦為己苦同時知其非佛正法不能使其離苦得樂須常以方便教化之這非忍辱者不能六度之所以難能可貴是在布施與忍辱二道例如菩薩發心純以利益眾生為職志倘若你智慧力量未曾圓滿之先所在皆遇到不如意的事在道心未充足的人一遇到這種打擊即灰心不能堅持到底又如本來好心為人而人反恩將讎報來反對你這時非忍辱不可所謂菩薩度生難行能行難忍能忍這並不是空談至於四攝法即是布施愛語利行同事也就是實行布施同忍辱的法則其意義可以不必細釋總之四攝法是菩薩在利他之時將其個己最圓滿的智慧有意降低地來俯物徇情誘導眾生平常說佛法中之四攝六度一方面對於自己有充分的修養所謂自利一方面對於社會群眾的公益去親切的實行所謂利他這兩種是應該懸為學僧的目標的佛法中所謂修行本來不是單指念佛修禪為修行菩薩萬行是要建設於眾生的一切事業社會實際生活之上的在佛教真正的意義即是淨佛國土假使修禪念佛而毀滅人事便成為外道的斷見小乘的沉空早為佛陀所呵向來僧伽不知在社會上作利群之事為修行而僅以參話頭念佛看經為修行實則大謬不然請以大乘所行三學之異乎小乘者以證明之菩薩所持之戒於攝律儀戒攝善法戒外更增一饒益有情戒即一舉手一投足之動機悉以利群為前提若不然者則犯戒禪定則耽受禪味為凡外住著寂靜為小乘而大乘禪定則在增加日常各種辦佛法事的能力使之堅忍與有鎮定的功夫智慧在小乘佛學中所講的僅能自悟片面的真諦之理菩薩的智慧不但知道全部真諦之理還要知道整個真俗不二之理所以說菩薩求智慧當於五明處求試思佛法的積極精神原來是這樣的自利利他的現在的僧伽究竟怎樣大足為求學的學僧深長思了在勞動生活的意義上有兩句話最為有知識人所歡喜道的是勞動神聖生活簡單若能看得勞動以為最高尚最神聖的那末自然以不勞動的閑暇階級為最卑陋最可恥了若談到生活簡單在佛教僧伽生活原是比任何人都簡單的就是在現在也還很簡單的但向來未免因生活簡單而流於懶惰若再加之以勞動神聖化則佛教僧伽中的學僧不但能做僧伽的模範還可以為社會改良的一個首倡者在此千萬別要誤會勿以為勞動就是跳蕩輕浮其實是有安靜忍耐的意味的學僧要以深沉的毅力一方面讀書求知一方面令生活勞動化群眾化使其一舉一動皆含有利益社會人群的意義則自然不為社會人群所詬病學僧於此應當再三注意上面所提出來的幾點不過是一個輪廓其餘各方面所藏蓄的意義還是要你們自己去思量研究認識體驗十八年十二月默如岫廬記見現代僧伽二卷九期
