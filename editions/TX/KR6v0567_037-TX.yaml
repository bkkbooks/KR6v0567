body:
  text: 居士學佛之程序十五年元旦在浙西彌勒閣作比年以思想學說之混亂及軍爭政變之頻仍民生益以凋敝人心陷於煩悶覺世間之無怙謀解脫之不遑種種似宗教非宗教之旁門邪道遂漸繁興而夙具善根者因之發心學佛亦非少數風氣一開從習彌眾然或盲從他人以附和自無中心之所主或好奇趨時以標榜惟任妄情之所馳或徒託佛以逃世或更藉佛以沽譽斯由學無程序憑虛邁往故雖值至平極正之佛法致仍流入歧途難獲良效竊謂佛法之近益人世者即在五戒十善斯本與儒者人倫之常德相準而亦與諸教諸學之明哲賢聖所期者不違第佛之戒善流出於最上清淨之大圓覺海故即由戒善可上階出世解脫遙達無上菩提使近為人中之賢哲遠引佛果之聖德也語云白刃易蹈中庸難能今之學佛者每不能篤於信解戒善而好騖浮夸殆亦由乎是夫居士學佛與出家僧眾異出家僧眾乃少數人之住持佛教專務內修外宏者也而居士學佛則期以普及乎全人類風俗因以淳良社會由之清寧者也由遵行人倫道德養成人格而漸修十善菩薩行者也故茲不辭庸拙請一言居士學佛之程序焉一有普通學識之人或因人勸導或因事感懷將發生修學佛法信從佛教之心時須先漸次請取佛學門徑諸書籍若商務印書館之佛學易解佛學大綱印光文鈔武昌佛經流通處之釋迦一代記佛學導言覺社叢書選本佛教問答大乘教義上海佛教居士林之釋迦牟尼佛略傳唯識方便談唯識易簡唯識三十論紀聞世界教育示準宏道居士論佛書稿第一第二集佛法萬能中之科學化佛教初學課本註解百喻經淺釋佛學寓言了凡四訓戒殺放生集戒淫拔苦集初機淨業指南往生安樂土法門略說龍舒淨土文蓮池大師竹窗初筆二筆三筆上海醫學書局之佛學撮要入佛答問類編拙著之佛教各宗派源流道學論衡唯識新論佛乘宗要論人生觀的科學大乘與人間文化廬山講演集繆鳳林之唯識今釋景昌極之佛法淺釋佛法與進化論武昌佛學院之印度中華各地佛史及上海居士林各期林刊與各期海潮音月刊等涉略研讀數月可以卒業由是認識佛教大概之真相三世因果五趣升沉生死之輪迴涅槃之解脫既經完全肯定則信心自然生起如是信心乃由勝解樂欲而發是真信而非迷信庶免盲從偏蔽之弊二既由瞭知佛法大概之真相生起信崇之念則當進一步以求堅定此信心從一大德沙門乞受皈依佛法僧寶之三皈此受三皈即為將內心信崇佛法僧之真意公布於世出世間聖凡大眾之公布儀式經此公布之後世出世間聖凡大眾即公認為信佛徒眾中之一分子而己身已為從佛法中所化生之一佛教徒的新人格亦因之確定經此公布皈佛法僧之一階級最關要者在捨邪歸正云何歸正既從此唯以佛為師以佛法為學以修佛法之僧為友換言之即從三寶中新生得一新身命如赤子之完全皈投於三寶慈懷中也故云皈命三寶云何捨邪外之則永捨世間種種非清淨非解脫非正覺之邪教邪說邪師邪友及所起邪行故受皈後應持純正之佛教徒態度處處高標佛教特勝之點而不與異道及流俗苟同信心乃能純潔內之則漸捨世俗之慳貪等心能去奢節慾而以所餘修植福田福田有三一曰恩田對於若父母等有恩者不吝財力以為報酬二曰敬田對於崇佛宏法供僧以尊奉有德之事不吝財力以為布施三曰悲田對於世人乃至畜生等遇其種種艱難困苦之事不吝財力以為濟度故受皈後應即成為一棄善好施之人三由受皈行施之善信純熟審己之所能行持者進從大德沙門乞受持五戒五戒者人道之綱紀心德之根本也然受五戒不必一時皆受蓋在家居士處於習俗之中復關職業之別或受持一戒若不殺生若不偷盜若不邪淫若不妄語若不飲酒吸鴉片等均可一戒既能完全受持進受二戒若不殺生不偷盜若不偷盜不邪淫若不邪淫不妄語若不妄語不煙酒若不煙酒不殺生等均可能持二戒清淨進受三戒能持三戒清淨進受四戒能持四戒清淨乃進而完全受持五戒此之受持戒條貴在實行非可以務名之心出之妄云吾能受持幾戒或全持五戒而實際上或故犯覆藏或誤犯而不懺已受而不持譬之知法犯法罪加一等又不受而行殺等不過惡行受而毀戒又加一毀佛戒法之罪及欺罔佛聖誑取名聞之罪也故受戒之前大須審慎受戒之後時切檢點每日當立一所受戒條之持犯格而審查之一日能持淨無犯則可紀功如稍有所犯則當發露勤求懺悔久之純潔無疵則心喜身泰即有君子坦蕩蕩之樂雖處人世無異天堂如已受此戒而自審不能堅持者則須重向一大德沙門當眾公布退除免招破壞佛戒之大愆也此受五戒重在止惡行善之四字所戒除之殺等止為止惡在於行善即為儒家仁義禮智信之五德唯佛法尤重止惡蓋能止惡而行善則為無惡之純善雖行善而不能謹於止惡則不成無漏清淨之善其程度僅等於但受三皈者之隨喜行善而已故止惡二字為五戒較三皈進一步之特徵居士之學佛者不可不知也誠能集合受持五戒之人而成一家一鄉一邑一國之群眾則眷屬未有不和樂鄰里未有不仁美風俗未有不淳善社會未有不安寧由身修而家齊而國治而天下平庶可徵之行實耳竊願居士之學佛及居士之提倡佛教者能以此交相勉勵激勸而深深注意焉四能受五戒恆持清淨則為人中賢聖更進一步當短期學習佛所行之綱略受持八關齋戒關者限期關約之意亦關閉一切惡行之義故受持八齋戒法最短者期以一日一夜稍長則二日二夜或七日七夜乃至百日百夜在行者隨意期約在乞受時向大德沙門將願受齋戒若干期日夜當眾陳告由大德依法授與之後則在期約之內居於佛寺或淨室中等同短期出家全屏世間一切習染嗜好恭對三寶凝攝六根晝夜精進無間如佛盡形壽不殺不盜不淫完全斷淫非但不邪淫也不妄語不飲酒不香花嚴飾服壞色縵衣不坐高廣大床不持金銀財寶及過往歌舞觀聽并持不過午時之齋此之持齋謂不過午食非但蔬食而已而行者亦於所約定之期限內如是行持自一日夜以至百日夜關閉諸惡止息遊戲脫離俗染節減食睡近之則成為新濯新浴之一高尚嚴潔的新人格遠之則上通於如來清淨法界海流在常為職業所纏而可短期靜修者猶為特勝之方便也此短期精進之所行其功力每有勝過於持五戒數年者故此亦為居士持戒之加行居士應曰近事士近事女今從中國習慣之稱呼姑仍名居士實則居士乃隱居不仕之士或素封端居之士非必學佛者之稱也雖未受五戒或未受三皈者亦可行之然以已能受持五戒者用為短期加行行之為更有功效也五能長守五戒或短持八關齋戒矣若更求增進則當淨意地之煩惱毒而進持心戒此即崇行十善身不殺盜淫口不妄言惡口兩舌綺語意不貪瞋癡是也止身惡同於五戒止口惡則別開出兩舌惡口綺語三條益加嚴密淨除意惡則為十善行不共五戒之特勝點然十善行乃眾聖之大本萬德之宏綱枝條無量繁細難盡二地菩薩纔能持淨至成佛時乃能圓滿凡僧不易精嚴何況居士故當就其中之尤重者標舉為相俾可遵從故當向菩薩沙門乞受梵網之十重戒而嚴持之可也推而廣之則由攝律儀而攝善法也而饒益有情也菩薩萬行胥在乎是惟智者之超然自達而已六第一第二在養成信解第三第四第五在習行戒善夫學佛之道以起信為母而持戒為基信具戒就則本立而道生乃可進修定慧定慧若非有真信淨戒貫持其中則定未有不為雜魔之邪定慧未有不為縛染之狂慧也外道旁門之流唯以邪定陷人世智辯聰之輩每將狂慧惑世是皆無上來信根慧根之故也修習禪定即修止觀聖教中向以不淨慈悲緣起數息念佛五種止觀為方便此中不淨慈悲緣起三觀分別對治貪瞋癡三惑修之匪易數息兼治昏亂為修定之要門念佛總伏雜染乃離障之捷徑今以華土之傳習可更加禮佛稱名誦經參話持咒之四種前所云念佛實為凝心以觀念佛之功德相好為法門此於念佛中別開出禮佛稱名二門禮佛即嚴供經像常課或定期勤行禮拜禮拜時觀念佛等功德相好三業恭敬久之定心現前亦為修念佛三昧稱名念佛即口稱佛菩薩等名號而心維其勝德出於無量壽佛經及佛說阿彌陀經之建立所謂執持阿彌陀佛等名號若一日乃至七日而獲一心不亂之三昧者是也約不淨慈悲緣起三觀之精意而為誦經參話頭二門以誦經既能照悉心中煩惱分別漸伏貪瞋癡等而參話頭尤能使貪瞋不行直搗愚癡也誦經即常誦般若心經法華經等之一經如因誦法華經而得定即為法華三昧等參話頭即抱持父母未生前本來面目等一句話頭窮參力究等持咒在通常之照音稱誦殆與誦念經佛無異其受真言密教之傳授依一定之儀軌設特立之壇場身手結印心觀字種同時口誦真言三業玄密相應行者因心與本尊之果德同融於六大無礙之交加相持中則更能總攝前來諸觀而速疾成就也上之各種止觀或按日為定時數數之常課或約期為閉關專修之加行則在乎行者之自擇其宜耳行至情死智生皆能定慧俱獲以先有信解與戒善為基本故也此時更當廣研聖教經論多問深思熏開勝慧庶善識位次離魔邪上慢似道法愛諸過上上昇進於解脫之聖道中不致滯誤若阿含寶積般若深密楞伽華嚴等經與俱舍成實中觀成唯識瑜伽師地等論皆勝義之結晶前聖之鴻式也古今諸德之疏註及拙著之起信論略釋別說唯識釋唯摩講義楞嚴研究楞伽義記法華講義等皆可參考資證助發玄悟由是信解融貫定慧交修菩提之心於是開發七上來解行無懈可期果證若於生死流轉中未能不佈而又現身中未登三乘聖地則今有一捨勢須於五趣中更受後有難免隔蘊之迷蹉跎耽誤甚或惡緣所逼展轉沉淪則不可不求他力之淨緣增上上聖之大願攝持俾盡此身之報即往淨土而生此則依彌勒以求生兜率內院依彌陀以求生西方極樂之法門尚也就今盛行之求生極樂以言既具前來所修信行已具但加發一依恃阿彌陀佛之願力專心一意以臨命終時仗佛接引往生彼土而已加習彌陀等經確信必有彌陀等土之可往生及專持彌陀佛名則信願行尤為一貫耳八若雖未能現登三乘聖地而能堅發深固大菩提心悲憫五趣有情誓於生死流轉中廣為濟拔漸由十信進趣三賢等菩薩行位於長劫中修菩薩一切難行之行憑勝解力及大願力不生恐怖不畏艱難則可依釋迦本師行菩薩道之本生所行為師法恆磨勵以修六度勤策發而習四攝譬如火中優缽羅花尤屬難能可貴若怡山發願文所云近之矣丙寅元旦釋太虛草於浙西彌勒閣中見海刊七卷二期附居士學佛商榷或曰近見居家士女學佛程序中有夫居家士女與出家僧眾異出家僧眾乃少數之住持佛教專務內修外弘者而居家士女學佛則期以普及乎全人類風俗因以淳良社會由之清寧者也然則普及佛教詎非出家之責內修外弘豈無在家之分舍種姓而論階級似非佛行平等之意而易起在家者之反感緇素對壘僧勢益孤本欲護之恐反以害之合之尚感力之不足分之則更無能為役況感情一動不免互相摧毀乎越軌之舉自應糾正防微杜漸似可不必且亦不能也答曰凡制度之立皆所以軌常人而非以拘非常人也昔維摩詰經序嘗云釋尊御世從之者賢聖濟濟皆出家眾而在家信徒則唯供養修福耳此非佛法普及之道於是與維摩詰及三乘聖眾同以大悲心願演此妙法俾在家而未能出家者亦知可以自奮於菩薩之行此其補偏救弊亦何常之有民八支那內學院章初發布太炎居士序云居士學佛得人為盛而易流於邪騖大意如此察之比年來之現象竊歎為知言曩者與竟無居士論作師與夫佛教正信會佛教人乘正法論及此居士學佛程序乃皆本七眾律儀佛制示在家眾學佛規程然云世之禮法為群眾設佛之律儀亦然故瑜伽云由律儀所攝持令眾和合如有一二鉅人長德遠若維摩詰傅大士現通說法四眾傾服近如楊仁山居士刻經弘法竹禪和尚嘗獻金供養納頭禮拜如此高賢勝事世偶一見其熟能非之則常制中亦已為非常者闢有迴翔餘地矣若必憑我見法執而立異則雖佛律儀視之蔑如又何有於居士學佛程序中國民族性習豪邁不羈而短謹循程轍其入佛法亦然禪宗之曾盛於中國者以此律密性相之消沉者亦以此而頃之騖趨密宗者亦喜其頓超而檢束蕩然耳然非養成守分篤實之風民族將不救而佛教亦焉託以興乎故中國人之學佛不愁其無一二超邁之豪傑而慮鮮能謹於常制也至普及佛教詎非出家之責內修外弘豈無在家之分舍種姓而論階級似非佛法平等則不免有所誤會蓋謂出家非普及之制非謂出家眾不負普及佛法於人世之責任此正外弘之職務豈曰無之然但使人人皆信佛非使人人皆出家則普及中之大多數必仍為在家眾可知也在家眾於佛法之修學弘布取其不改業務而平易近人故較能普及人類設舍其業務而專為佛法之內修外弘復何異乎出家眾而不遵佛制出家乎故於此有一先決問題即今後之佛教要不要有出家僧之存在是也若認為不需要則不妨逕廢除之若認為需要則出家與在家之各安分宜正所以各勤其職而合作成事也在家者依律儀之程序皆可出家出家者亦可依法捨律還俗何有階級不平等之事如以各安分宜為對壘交遍涉入為圓通則法界混融何緇何素自亦無僧無愛無成無毀安所用其感情之摧毀然若知佛律以大悲心為護庸眾方便施設則悲護庸眾故應不昌言破壞常制歟見海刊十五卷二期
