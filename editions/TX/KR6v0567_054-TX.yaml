body:
  text: 告全世界佛教徒三十四年九月世界由戰爭恢復到和平了在全世界人類的歡欣慶祝中我全世界的佛教同人回思十五年來或被帝國主義軍閥法西斯納粹的魔鬼們裹脅著而掀起瘋狂的侵略戰爭或為民族自衛民主自由而共同聯合著作艱苦的抵抗戰爭雙方殺傷的身命摧毀的物資莫可算計我們在佛陀的因果正法前平等慈悲前前者當如何的慚愧懺悔後者當如何的痛定思痛務使這一次戰爭為人類文明的最後戰爭這一次和平為世界安全的永久和平啊佛法就是佛所覺悟說明的全宇宙一切事事物物因果法則但佛對於因果法則不惟解釋而尤在能從自身的實驗指導一切眾生革掉擾害的惡因而消滅困苦的惡果遵循因果法則而改變因果所以佛教應是世界上杜絕戰爭永保和平的最有效辦法佛教徒也應是人類中消滅戰爭創造和平的最努力份子現在全世界最流行的文化可以說統是科學的工業的但仍以各民族的歷史文化為骨架歐美澳各民族文化可以基督教廣義的為一研究線索亞西北和非洲各民族文化可以回教為一研究線索而佛教曾刱行於印度阿富汗波斯等迄今猶為錫蘭緬甸暹羅安南中國包括臺灣西藏蒙古朝鮮日本的民族文化其關涉不僅宗教信仰而是風俗政治文學美術思想行為的全生活且西藏蒙古日本錫蘭緬甸等文字亦由佛教產生故亞東南各民族文化又應以佛教為一研究線索貫通三線索研究的各民族歷史文化而融合現代的科學工業乃能釀造全世界人類的永久和平由此亞東南各民族尤當以佛教加強其聯合以聯合的力量來共同努力發揚佛教以期世界永久和平作非常有力的偉大貢獻緬甸日本印度錫蘭等我都是訪問過的都有著成千成萬的佛教兄弟尤其日本的名山古剎佛校僧林我都受過優渥的招待不惟見到現代日本佛教徒服務社會的發揚學術的種種進步的新興事業并見到傳自中國的許多古德淳風彌漫充沛在日本民間所以中日佛教徒尤應密切聯合一方面肅清魔鬼們遺留的毒素一方面發揚最澈底自由平等博愛民主精神的大乘佛教文化努力於人類真正和平的推進誠如八月十四日蔣主席的廣播所說全世界永久和平是建築在人類平等自由和博愛互助的合作基礎之上我門要向著民主與合作的大道上邁進這民主與合作的大道是各民族一切優秀文化的結晶也是大乘佛教的真髓我曾在廬山召開過一次世界佛教聯合會籌備會議因戰爭的魔障而久久停頓現在魔障掃除了再來開始的加緊籌備希望不久的將來能夠在中華民國首都的南京邀開一全世界佛教徒聯合會議讓我們消滅戰爭刱造和平的最努力份子應用杜絕戰爭永保和平的最有效辦法參加全世界厭惡戰爭愛好和平的人們使這一次戰爭成為最後的戰爭這一次和平成為永久的和平全世界佛教同仁奮起奮起見海刊二十六卷第十期
