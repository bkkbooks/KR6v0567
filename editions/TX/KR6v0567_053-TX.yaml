body:
  text: 佛教徒應參預中國和世界的新文化建設三十二年在漢藏教理院講佛法在世間不離世間覺即是說佛的教法雖是佛智證明的真理而存在世間則是觀察眾生之機宜事實而施設的所以佛經是契理契機的法不僅合乎個別的千差萬別之機另外還有時代機境要針對當時一般的思潮而隨順攝受或破斥這才有佛法站在這種意義上看種種佛教的經論不但要明了現有的經論上怎樣說還要進一步瞭解其所以說此經論之對於當時的時機怎樣比方你去研究龍樹學不但明白其已有之論義還要知道當時印度佛教教內教外之時代思想怎樣龍樹又是怎樣起而破斥或攝受以應那時之思潮而說明大乘使整個佛法復興起來後來到無著時代或玄奘至印度的時代又是如何再來觀察中國唐朝以前的時代當時佛教教內教外的思想如何佛教怎樣會與中國原有的思想發生密切關係如何會使當時思想界受其影響如何會發達興盛到那樣程度由是應知我們處於現在的時代要使佛學昌明在現代的中國和全世界就得先要觀察往古各種主要的時機是如何適應之而從佛法的原則上去推行發展再觀察到現在中國的思想界如何最有力的思潮是什麼世界各國的思潮又是如何將來的中國和世界所需要的是什麼應如何攝受或折服去宣揚佛法如何能夠使佛法作為中國或世界思想主要有力的指導和因素或者以佛教來糾正他們思想上的錯誤或增進發揚其合宜的地方此實為現在有志弘法者所應當考慮思想到的此雖非求學諸人的學力就能做到但在修學的方向上不得不如此現在的中國是抗戰時期世界是戰爭時代佛教徒根據其原有的基礎用不出什麼力量不能有何貢獻但在另一種趨勢上我們目前有兩點事情可做而仍未能做的現在的中國不但要抗戰而且要建國如在抗戰期中廢除不平等條約而使處於平等地位在這種建設新中國的趨向上便發生了一種新思潮談到什麼是建設新文化之主要思想同時世界人士也在考慮到建設戰後的和平新世界之主要文化是什麼大概思潮是要比現實早些如現在便想到抗戰以後如何建設新中國戰後如何建設更進步的永久和平世界那麼佛教在抗戰戰爭中雖無能為力但在建設新中國文化和建設世界永久和平文化的兩種中說佛教如能應用到人間以教化眾生應注意如何使佛教成為此二種文化之主要思想最少要能參加進去作為構成的因素切勿聽其落伍於時代之後為一種古物當使其成為活動有力的領導角色或要素談到現在中國建設中的新文化固為三民主義但三民主義僅是一種原則原則是要集合多種要素而構成的現在構成這文化的一種是中國故有的儒家思想另外的即是近代西洋的科學哲學和基督教等之學術文明由此近來所謂新儒家的思想漸為抬頭興盛過去以佛教學成為宋明學的新儒家思想現在以西洋近代學術成為建國的新儒家思想了在這種新儒家中或兼容道家的思想大概仍排斥佛教縱使不排斥佛教也都置之不提所以我們要注意現在的佛法在建設新中國文化思潮中是否已被排在外或佛學是否於新中國文化的建設上曾經發生了關係其實佛學於此不但不能作領導思想而且連參加的資格都沒有完全被排擠於建設新文化之外不但於抗戰中無多辦法和貢獻而在建設新中國文化中還是不曾趕上活動和參加的機會現時固在苦難中過生活即將來亦恐仍被踏在國民腳底下而作無用之物現在的中國佛教徒亟需注意此點不僅學些古來的大乘小乘和空有顯密禪淨等宗的辯論即足要將佛法爭得為中國的主要思潮如何去領導轉移而使其與佛教相宜最少亦要能作為新中國文化的因素之一不要使其這樣被抹殺了現在世界上最優秀的學者多已考慮或討論到怎樣建立戰後的世界永久和平在其餘的政論家哲學家和天主基督等教曾向這方面研究或提議的甚多但在各處的佛教徒似尚無有力之表示本來關於建設世界永久和平正是我們根據佛教所應作而最能作的事業不過這並不是只站在佛法說的還要明白了解於現在世界的思想和潮流再應用完滿佛法的道理去綜合批判而說明如說造成此次世界戰爭之原因是什麼如何能真正奠定永久和平之基石去人類戰爭病根而使非為暫時息戰的和平辦法應如何如果現在之經濟政治教育等制度和思想若不去除其病源將來則必再起戰爭有了這種觀察之後再來觀察佛教看有什麼解救的方法是否佛法能負擔此種責任假使佛法真能為戰後世界和平作有用的指導思想則能弘揚於全世界使全人類獲得真實利益而佛教亦為切於實際功用不是慈悲救人救世的空談了從這些問題去研究是現在修學佛法有志弘揚者所必要注意的即是說一方面要貫通佛法真能救世的道理將佛法的根本學理思想使他格外地充實另一方面要使佛教的教化力如何能實現於人類世界總結上面說的不外乎兩種一種我們是中國人當如何在新中國的文化思潮中而昌明佛教思想第二種即如何使佛法能作戰後重建世界和平的主要思想或其因素這便是現代有志弘揚佛法者所應努力的兩大目標了參記見海刊二十四卷九期
