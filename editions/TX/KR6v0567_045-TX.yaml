body:
  text: 婦女學佛之規範十五年九月為閩南佛化新青年會新嘉坡婦女宣傳部講釋迦牟尼佛在世時每次法會中之聽眾各種俱有每部佛經開講前必先敘到會之大眾如諸大菩薩及聲聞緣覺天龍八部比丘比丘尼優婆塞優婆夷等不過比丘為佛當日常隨之眾故許多經典都對比丘眾而說但一種法會之開始各有其因緣以為之主如維摩詰係以居士為主人王護國經係以國王為主密宗大毗廬遮那經係以金剛神為主日光童子經係以少年為主月上女經為童子講玉耶女經則為婦女講勝鬘夫人經則為國王后妃講十六觀經則為韋提希夫人講可見佛法廣大無所不包固無分乎男女也今日有此特別之會彷彿若佛當時之婦女法會者然應從婦女之機而講婦女學佛之佛法婦女學佛以在家為善即佛在世時對於婦女之學佛亦本此旨因為出家修行男子且不易何況女子故昔日佛說法廿餘年尚無尼眾後佛之姨母名波闍波提者再三懇求出家佛始為之剃度授戒繼而耶輸陀羅亦在三懇求為比丘尼佛恐彼等修持不謹特制許多戒律以規範之是為印度婦女出家為尼之始其後漢明帝時摩騰竺法蘭傳佛法到中國有廢后名陰夫人者曾首先出家為尼而婦女隨之出家者頗眾故在座之比丘尼眾應知為尼修行甚為不易當深惕勵實以在家修持為佳今日會中以在家學佛之婦女為多當更進言其道佛在印度時有居士名維摩詰者最著名彼有一女神通智慧較維摩詰更大幾乎不能與之相對佛說此女是一位大菩薩乃現童女身來度一切童子者又有一天女常在維摩詰室中居士病佛命舍利弗阿難等去問病俱不能與天女比勝可見婦女中能發大心都一樣的可以超勝一切也佛在世時有一人家取一新婦此婦乃紳士家之女種族尊貴相貌美麗因此到丈夫家來很看不起丈夫而對於翁姑常加以非禮可巧此人家均信佛見新婦如此亦不之較某日請佛在家說法新婦聞法後頓改昔行受佛皈戒孝親敬夫奉法甚謹由此觀之平常人家如婦女能明佛法便能成為良善家庭之良好婦女矣現在有許多在家學佛之婦女平時對於佛僧常去供養禮拜此為修福之基礎所行甚善另有一般婦女以為我無錢不能去學佛因無力去供養佛及僧也實則不然請舉一故事為證佛在世時有一苦婦人見許多富家婦女去供養佛自己覺得很慚愧後盡其所有之錢去買油點燈在半夜時供養佛前而發誓曰願將來我得智慧與佛無異再以所得之智慧普照世界之一切黑暗誓畢歸寢次晨鄰人見燈光燦耀詫而問佛佛曰此燈為某苦婦人所點因其發心至誠故光明特大縱有聲聞羅漢之神通亦不能息此婦人以至誠發心故來世當成燈光如來由此故事觀之只要發心供佛至誠所感無論富厚貧苦均能學佛成佛現在信佛人多念佛以求往生西方極樂世界此往生法門何自始乎蓋佛在世時某國王有一太子忤逆不孝幽囚其父而自作皇帝其母異常悲痛發誓云此世界不好道德衰微故有此忤逆不孝之子生於我家演出逆倫之事願求一很好之世界以便臨終往生彼處遂請釋迦牟尼佛到宮說法佛知其心願以神通力為顯出十方美妙之世界伊見之願生西方之阿彌陀佛國乃為說往生之法後彼忤逆之太子亦改前行實其母發願之所致自往生法門傳出後以念佛生於極樂淨土者為數無量而推原其始則一婦女之願力所造成可見婦女學佛之要點須有懇切之願力乃可成辦上來所講均為婦女學佛之規範應仿古人之行為而為佛教之正信教徒信佛教後不能再信其他之邪魔外道須切實遵行佛說之三皈五戒發長遠之菩提心以冀得到佛之功德智慧願今日在座之大眾勉力行之寧達蘊釋廣伶同記見海刊七卷十期
