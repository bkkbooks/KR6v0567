body:
  text: 漢藏教理院訓條訓教務處本院學風須實現於整齊嚴肅之各規則中務須督同教員學監隨時訓導學眾切實遵照而行其最能遵行者按月記功加入成績其誤犯者記過訓改故犯屢犯者罰革不貸以重公宜訓事務處本院之買辦巡山佃工亦須每日訓教以初小佛學課起其佛學信心恭敬和順在外尤不可與佃客及地方人妄生惡感或荒棄職務其餘各廚茶雜役除隨時訓導克盡其職務之外并教以信佛及禮貌為要訓教務主任滿智應領導教職員及學生等對於余之佛學言行作一番深刻的系統的研究因默察尚缺明澈訓事務主任超一應領導全院員生戒浮囂戒急躁須沉靜安詳須忍耐溫和訓全體教職員及學生本院員生全體一不得攻訐各人過去之私惡二不得分結各個小組之私黨三須有相勉相助之公德四須成全院平等和合之公團訓員生全體本院員生全體戒奢華戒驕逸須儉樸須謙恭訓學眾注意有規則之運動注意能生產之勞作見漢藏教理院開學紀念特刊
