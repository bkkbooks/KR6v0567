body:
  text: 建設適應時代之中國佛教十九年十月在四川省佛教會講現代潮流所趨政治與教化皆各發生意外變動據鄙見所及似有研討之必要但佛法之流行於世間以眾生世界為依止故往往因時因地因人而不同今中國之政教既有時代之變遷而佛教亦應隨之而一變其往時之習慣始能適應社會而生存發達茲分二節言之一教化環境之變遷中國自唐宋以來之教化情形大概可分為讀書之士人階級與不讀書之農工商階級而佛老二教則由寺觀僧道代表之僧道稱為方外殆視同化外之人士人讀孔孟之書以佐君澤民為唯一之目標而處於司掌政治與教化之地位唯少數功成身退或思想極高之士夫始對於佛法留心及之由此佛教亦唯圓頓教理與禪宗為投機而負責宏法之僧伽遂亦唯以提倡且參究此超佛越祖之向上一著為研究然不讀書之農工商與婦稚則信仰三教混合之通俗神教而信仰佛教亦與信仰神教毫無異致此方面佛教之表現於世者為延生度亡消災植福之種種經懺香火法門在當時之士夫亦認此種法門足以範圍民心為政治上之一種輔助故其保護亦極周至而唐宋以來之佛法為適合以上二種之教化環境乃以禪宗及應赴為流行之佛化然在最近二三十年以內之情形則大不然海禁既開交通遍達社會人心因受外來之政治宗教科學哲學及其他一切思想風俗之影響對於以前之教化已失其信仰之作用此不特對於佛教如此而以古聖先賢為模範之儒教尤極其衰落蓋今以全國民眾應具之相當知識技能為教育農工商業軍事皆各分別施與專門之教育以期全國人民與世界各民族並駕齊驅與前來所講之二種教化迥然不同前之二種一則太高言必聖賢為一般普通國民所難奉行一則太低為現代一般稍具國民常識者所難信受故以前二種教化不能施之現代今欲適合現代潮流以應人群思想之所要求者應提倡包括五乘之大乘漸教即人乘天乘聲聞乘緣覺乘菩薩乘也從大乘漸教上去講明性相之境從此境上生起大乘信心此心即無我大悲之菩提心據此心而修學一切法門則皆為菩薩行矣在出家方面以戒律為先作為身心上之訓練至戒行有其基礎然後精研教理修習禪關以養成住持佛法之僧寶資格將此大乘漸教普及民眾首應使社會上一般人士從此取得一個做人方針以十善行轉相化導以增進人類之道德而造成安樂之世界誠能如此無間進修與盡量宣傳在大乘位上即為十信等菩薩之位果能依此建立僧寶提高民德則佛法日見昌明社會日益安靜矣此因教化之環境改變故宏教方針亦應取其所宜而適合者二政治環境之變遷在前中國掌管或參政治者約分三類一為帝王二為官吏三為紳士其餘占國民百分九十五之農工商婦女等皆不能與聞公事且認國家社會與個人毫無關係但求一身一家之安全而已對此種人民之教化則為三教混同之教化存在其中之佛教亦只以住在寺院具有外表僧相之出家人為其代表故在寺院之出家人亦唯以住持或職事等專辦一寺一院事務其清眾等皆各顧一身而不與聞寺院公務但求個人之安閒舒適為目的此適與以前國家政治下之平民只顧身家之觀念如出一轍從不知發心為一縣一省乃至一國之教化有所企圖致為最近主張民治制度社會生活之一般人士所攻訐殊不知此種只顧身家之情況并非一般僧眾有意如此乃由以前政治環境之所造成但現在之政治環境已變僧眾對此當大大覺悟應即改變其舊來之處世方法以圖生存發達以現在國民對於國事皆應有參與政治之行動實施此種權利首應有各種團體之組織其組織方法或因地方區別而組織者或以職業差殊而組織者國民對於國家政治既有如上之變遷我寺院僧眾亦應急起直追組成教團以施教化方足以代表佛教住持佛法以前之在家徒眾毫無表見者至今亦應為佛教團體之組織出家者為佛教住持僧在家者為佛教正信會將此兩部聯合起來由縣而省由省而全國即可構成一整個的佛教團體團體堅固雖足禦侮自存尚不足以言振興發達故更須為內部的切實整理出家眾之幼年者別為學僧設律儀院教理院以教養之中年而有宏法布教之本能者別為職僧設布教所等以大乘佛化之精神宏布於民國並辦理社會慈善等事業其年高德長者別為德僧俾可安閒自修以為後學佛徒之模範使寺院皆成為住僧之修學場所與當地之教化機關更有在家之正信會輔揚法化則佛法便可深入人心激發一般有國民常識者之大乘正信佛教始能安固昌盛非然者社會人士必繼續不斷的摧殘破壞且民眾皆各組有團體以之侵凌壓迫專顧一身一家之寺院僧徒佛教前途危險何堪設想佛法是應普及而非專利的是應實行而非空談的願諸同志勉之克全記見西來講演集附註西來講演集原題在四川省佛教會演說集作佛教會為今時之必要和責任今改題
