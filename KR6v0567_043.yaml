body:
  text: 學佛的下手方便十九年五月在華北居士林講太虛不來北平已有四年去歲從歐美歸國覺得國內的政局猶未安穩社會的紛擾還未平定佛教組織也未健全不無遺憾然而從全世界潮流所趨人心所向世界非無大同之可能佛法也負有促成的責任今日就北平佛教會及華北居士林聯合歡迎會上於感謝諸位盛意之餘謹將學佛的下手方便略略述説一回佛陀應世法門雖無量種舉其綱領不出兩點一起三寶之信三寶就是佛法僧信的次第可由法而起狹義的法就是名句文之能詮及其所詮之理就廣義的法而言就是正確的普遍的透徹的智慧所明了的宇宙萬有真相然此真相是本來如是的非任何人所能創作的如現在的科學家所發明的原理及定律並不是發明家的造作只是他有智慧將它顯示了出來所以當未曾發明的時候並非沒有這原理及定律但沒有人知道罷了所以佛説的諸法性相也是由有智慧者顯示出來的今藉以顯了諸法性相的狹義的就是經論教典這類雖屬於名句文義但也就是顯示事事物物的真實性相的所以法的本源在於宇宙萬有的真相信法不可參加任何意見當以實事求是的態度法是如何就説明它是如何信它是如何這種態度信法才能得到諸法的真相但是以什麼標準來研究呢佛説有四種可依不可依的條件第一是依法不依人只要這人所講的理是通達的那末他雖是小兒或其他非人所説的都應當信服的再進一步説能詮的名句文也不過表現所詮義理的工具那麼工具當然有勝劣不同不能執文而廢義所以要求一切事物的真相第二當依義不依語但所顯之義也有究竟與不究竟顯了與不顯了的差別所以進而言之第三當依了義不當依不了義但知道究竟了義還是屬於識心分別未能親證諸法實相所以要親證到諸法的實相更當依轉識所成的智然後方可親證諸法實相故再進一步第四當依智不依識如此剝蕉抽繭重重深進才能證明諸法實相才名真信法的人佛家信法態度是無我無私無黨無偏的所以用學者的態度及科學的精神研究事物的真相也可以名為信法者然學者信法所用的最後的工具不出於五官佛典名為五根眼耳鼻舌身的感覺和經驗意識憑此分析觀察所得的判斷早不是事物的真相而且五官的感覺各各隔離為眼所見的決不是鼻嗅的鼻所嗅的也不是耳聞的只是各得其部分的感覺例如一朵花眼所見的是鮮紅的顏色鼻所嗅的是濃馥的香氣乃至身所觸的是柔滑的質體如是各別得花的部分但花的全體卻不能同時感覺得到由此可見只依據五根所觀察的事物真相也不是原來宇宙的真相所以要證得宇宙之真相當以圓滿的智慧證知但圓滿的智慧者究屬有無若屬於無那末我們永久不能得宇宙之真相如有圓滿智慧者我們就當信仰他所以願求得宇宙究竟真相就當以佛為師所以第二步就當由信法而信佛這由信法而信佛就不是一般普通學者所能作到的了因為這是起超人要求的既皈依佛後就成佛的弟子故不復是研究佛學的普通學者而是唯以佛為師的佛弟子了然信佛者目為佛的弟子猶沒有在家出家之分既已信法信佛而更進一步覺得須有住持佛法的教團使佛法永久住世以作宏法利生的事業未聞的使聞未信的使信未解的使解凡一切未覺的使覺悟所以第三就要加入教團而信僧梵語僧伽此云和合衆能依持出家律制而修己教人者名出家衆亦名佛教住持僧其未能加入出家衆而親近出家衆者則有在家之佛弟子於是佛法能流布世間既信法信佛又能信僧以住持佛法然後佛教才能具體成立以僧為教團之中堅分子然後可荷擔佛法傳播於世界人類二修六度之行六度之行可就兩方面言之甲自利六度行第一步要布施一切就是要將本人所有的家眷財産一切物件都能施捨然專事施捨而身心無所操持必至橫決所以第二當堅持戒律此施戒二度為出俗因然沒有強毅忍耐力繼之仍易為環境轉移所以第三當行忍辱忍辱猶有退滯而未能勤修衆善所以第四當行精進此忍進二度為防退因此上四度猶多屬散心修持不能將心力集中於聞思境觀察深入所以第五當行禪定若味著定境於相似法起增上慢不能照破則毀前功尤障深慧所以第六更當修行般若此定慧二度為不壞因不退不壞於佛法之自利行方得成就乙利他六度行首當以財法布施乃與他人接近進之更能持身清正一切所行皆以衆人饒益為前提行此施戒二度是為利他之攝化因以非施戒當先即不能有利他之機會然攝受教化中必難免根劣之輩反恩為怨妄加毀辱故須容忍而安處之並須奮勵精進勤加化導乃能使已攝化者不致退滯而獲增益行此忍進二度是為利他之荷負因攝化荷負苟非身離勞悴而內心常得禪定法喜之滋養則疲倦困憊襲之不能持久故須常修禪定以養成辦事之堪能力常修般若以充實明理之勝解力行此定慧二度是為利他之成辦因能充足三寶之信心能踐行六度之行誼則使人心進善政治清明社會安樂世界和平皆不為難事矣胡繼歐記見海刊十一卷第五期附注原題在華北居士林講演詞今改題
