body:
  text: 研究佛學之目的及方法十八年冬月在世界佛學院研究部講研究佛學以何為目的又以何種方法能達到此目的目的就是自利利他在自利利他中所得到的三德真實愚自利斷德所斷之本在智德異熟愚利他恩德斷德即是平常所謂了生脫死單屬自利以平常人皆畏死死了不能斷滅又要生死死生生總斷不了死苦以死了不能斷滅又要生生了又要受種種生苦以生而有死又不得不死因為苟延此死遂造貪瞋癡殺盜淫起種種的煩惱致成更加增盛的生死苦於是六時中所感覺的無一不是苦了此苦皆基於死苦由死而逼迫身心流轉不已以有此死苦我們想作一種永久的功德就不能即身成功一死之後生前所作的點點功德全盤拋棄世人要想得到自利上的要求因為有死苦的逼迫都不能夠要解除種種逼迫的苦實為人之大目的如世人所求所作無一不是由苦而動如腹覺飢苦就要去作食身感寒苦就要去謀衣為避風雨虎狼等苦就要去構舍造屋感覺自己欲望不滿足的苦就要起革命大家若無死苦的逼迫慢慢的總可想一種好的方法來解除他可是不久又要死了在世人之種種的救濟方法所謂頭痛醫頭足痛醫足日日調護免死可是終久要死上來是謂世人不得解除此死苦的方法依佛法上言現在要解脫此苦得永久的安樂就要由了生而得脫死如何了生進一步觀此死苦果何而來耶倘若是上帝造的或自然生的那就無法去解脫他了依佛法講也不是上帝造也不是自然生乃由因緣和合而生以是觀十二緣起支就可為解脫此死苦的方法了以無明業愛取有而有生死此有直接取生的力量有限故不久即死有者能有後來生了又死之苦果者如地中穀種經愛取水土的滋養已發出芽頭而尚未出生地面不久就生長出來了識名色六入觸受種由業攝植滋助成感生死種此業由無明所發即吾人現前第六識心上之二種無明一真實愚二異熟愚真實愚謂對于諸法的真實相不能明了即是不了生空法空不明衆生緣生性空而起人我執不明諸法亦由衆緣生故空無自性而起法執有此愚故對于諸法真實之理不明曰愚平常所謂了生脫死就是要了知生之真實相所謂緣生性空是説從衆緣所生之人生宇宙本來空無自性若爾更何死之可得我們既見到無死亦即不想種種之下劣方法來苟延生命了異熟愚謂不明業報之身心世界是由前之無明業等而成的異熟而妄於此中執我執法曰異熟愚有此二種無明即發有漏業招生死等苦以由此二種無明斷故不發有限業招有限生若有限之生無則限盡之死亦無而生死之不斷即是於有限生上起有限心造有限業之所致能將此二種無明變為二明即是了生以了生故則死自脫真能了知衆緣所生若人若法之性空實相即可解脫死苦名曰斷德此德在小乘阿羅漢等但脫分段死曰擇滅涅槃單屬自利若究竟得脫分段變易二死者唯佛果所謂無住涅槃即是將無明有漏等苦滅除乾乾淨淨得到永遠真正圓滿的安樂曰涅槃智德可通二利與斷恩德有密切之關係智為能斷之智能夠了知生相解脫死苦得永久的安樂皆由智德而在自利上亦通本後二智以在能斷執障上説皆名自利智然能斷所知障之智即能利他能斷所知障者謂對于世出世應當了知的諸法相性而能了知法華經云佛之知見而開示有情皆令悟入即是利他智若于衆生無大悲心則唯自利而不能得成此利他智然大乘菩薩在初發心時即非為自己而求安樂是為大乘之不共智恩德之立場在大悲大願以己能成利他智故能盡未來際利樂衆生永遠為衆生作一切恩德謂自己能解脫一切苦復能盡知諸法實相開示衆生令解脫一切苦所謂恩被群品若未得佛智即非恩德雖菩薩度生猶以利他成自利研究佛學所要達到的目的就是自利利他的三德要成就此三德就要發大悲大願之大乘菩提心所謂因果相應若根本上無大悲心無論如何亦不能達到此目的縱得小乘涅槃不過斷智二德的少分從佛所説的一切學説曰佛學斷障證果是很長的一條路不是一天能走得到的現在研究佛學所要達到的最近目的是什麼此目的有三種一正見如眼二正信如手三正戒如足人有手足就可以活動作事取物行路若無眼取物行路必遭危險以致傷身失命由正見而生正信正戒信無正見則成見取戒無正見則成戒取見不正即成身見邊見邪見我們現在身心所現行的皆是迷執不可依他來求正見必須依佛菩薩得正見以後所説的聖教三藏教典由研究此聖教來成就我們的正見正見成就後正信正戒自然成就正見即是眼眼有五種一肉眼二天眼三慧眼四法眼五佛眼瑜伽攝為二眼世間平常人作事依肉眼去見天眼是定中所成功的對于除異熟愚亦可有益然對于究竟解脫生死苦上則無助肉眼助平常作一切事雖有益然不但求不到究竟安樂往往反而造煩惱業增生死苦天眼在天以下之異熟報上雖稍能明白而在天之本報上仍不能夠明白那末此二眼當然不能依他來除生死苦了證得二空無相真如曰慧眼能見諸法之無量差別曰法眼對于宇宙萬有一時普及一切即一一即一切差別無量無量差別同時而見曰佛眼此三眼以無漏清淨慧為體我們現在所有者唯肉眼若依此眼去作事反增染業天眼又未得到即或得到亦不能達到了脫生死苦的目的慧眼在小乘初果大乘初地始得佛眼八地菩薩方得法眼分二種一至教法眼二自證法眼至教法眼由聞思慧研究三藏聖教成就自己之理解所謂虛心受教即聞成就由聞而思再加以定等修習即成就正見有此正見即可自利利他十信十住十行十向四加行諸位皆依此至教法眼不爾就如盲人騎瞎馬其害無窮矣自證法眼亦初地方得我們現在急要成就者即法眼中至教法眼之一分是曰正法眼藏此正法眼具一切佛學之正法無漏功德曰藏我們要達到此至教法眼的正見依正見為自利利他之基本依佛法論正見未得雖然自利利他其實是自害害他研究佛學的方法依涅槃經略出四種為標準一依法不依人二依義不依語三依了義不依不了義四依智不依識語至教法了義佛法義識不了義自證智依法不依人者法謂一切法之本來真實相當依持正法苟于正法不合就是佛説的亦在所不從因為魔王亦可現佛身而説法現在研究佛法亦當要依翻譯來的經論為標準因為經是佛言西域各大師造論皆根據佛説之經而造的中國諸師往往多臆説故不可依為正量依義不依語者能詮所詮皆是法又能詮是語所詮是義實有其事曰義但有言説曰語同是一語不應當固執其語就決定是對的當進觀其所詮的義以義實語勿執語取義依了義不依不了義者究竟顯了謂之了義同是一義更須觀其究竟不究竟顯了不顯了佛陀説法如對人治病應症與藥不必凡是佛説的皆可執為究竟了義亦有不了義的是故盲從者非是依智不依識者謂四加行以前所修皆是依諸佛至人共同所證所説之教義所謂似文似義似言乃至觀空仍是識變要依能證真如二空智者所説之法為依勿隨情識之説又當求入真見道依自真智勿依於思識分別佛法傳到中國幾千年大德代出分鏕揚化各樹門庭然所造論不似印度諸師根據堅確條例精嚴每本自意取喻一時故我們不要在宗派上著手而直接從印度所譯來之經律與論去著手研究先明依法不依人所依之法是諸佛聖人共證共説之法欲依此法必須從佛及菩薩等所説經律論為根本如是研究圓滿方有正見而後以抉擇中國古德各宗派之所説對于古德之宗派明白了解復對於外學加以研究即成為濟度一切衆生之無量方便法門矣紹奘記見海刊十卷十二期
