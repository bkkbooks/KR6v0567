body:
  text: 從巴利語系佛教說到今菩薩行二十九年六月在漢藏教理院講一從史的觀點否定南傳北傳的名稱甲阿育王的傳播佛教是向西方發展的乙北傳的有小乘而南傳的也有大乘二巴利語系佛教確立之推測甲巴利語三藏編集者及其文體的遞邅乙巴利語是印度大衆化通俗化的語言丙梵語巴利語為印錫等地各種語文的主源丁南方佛教由復雜轉變為單純的推測戊印越等地也有巴利文佛教三錫緬暹佛教的近況甲緬暹民衆以作僧為榮的風氣乙緬暹人民對僧教已漸疏遠的近因丙六十年前的錫蘭佛教也是和現在中國佛教一樣的衰敗丁錫蘭的佛教從黑暗中走向光明之路四行上判別的小乘大乘甲中國是大乘教理小乘行的佛教乙錫蘭是小乘教理大乘行的佛教丙行的大小乘比教的大小乘為重要五復興中國佛教應實踐今菩薩行甲我們要實踐大乘教來幹今菩薩行乙佛教不能與廣大的民衆疏遠丙修今菩薩行復興中國佛教我剛從南方的緬印錫等佛教國訪問歸來故現在我就從這次訪問所得的觀感上說起一從史的觀點否定南傳北傳的名稱佛教近年在西洋人的研究和日本人的承流接響中有所謂南傳佛教和北傳佛教的分別前者是小乘教的傳承後者是大乘教的傳承這種名稱和說法並非古來所有而是近代的佛教史家所創造現在我覺得有加以糾正的必要姑從印度地理歷史風尚種種的觀點上來指出其錯誤甲阿育王的傳播佛教是向四方發展的考釋迦佛教是生於中印度到了阿育王時代才普遍地傳播於整個的五印度同時并向印度以南的錫蘭及南洋群島東鄰的緬滇北方的新疆西方的波斯西北的阿富汗并輾轉由亞西以及歐東也曾有佛教傳入東北的中國則如秦始皇時曾有室利防等來華傳法之說四方平均的發展傳播到全亞的海陸但後來因各方環境的種種關係波斯阿富汗新疆爪哇乃至印度本土等處之佛教趨於消滅而阿育王後的印度和傳布中國西藏等地的佛教發生種種沿革改變另成別種的風尚宗派使阿育王原傳的佛教發生變化唯有錫緬等地能夠保持阿育王時代傳去的佛教而生存發展所以到現在還保守著上座部佛教的原狀故從歷史上看來阿育王時代的佛教是向東西南北同樣的發展傳播並非局限於南傳錫蘭這是無所容疑的故南傳小乘北傳大乘的名稱錯誤是不用說的了乙北傳的有小乘而南傳的也有大乘復次北印度的迦濕彌羅國現在的克什米爾是小乘薩婆多部一切有部底大本營它是小乘最發達的地方從歷史的記載和地理上的位置看來北傳佛教北印度或印度以北所流傳之佛教也有小乘是可斷言空宗的龍樹菩薩雖然是中印度人而他的繼承者提婆菩薩卻是南印度的所以空宗比較盛行南印度大乘密宗的咒典據說就是龍樹菩薩在南印度的鐵塔中開發出來禪宗在中國也有南天竺一乘宗之稱而達磨初祖是從南印度出發航海到廣州經金陵而轉去嵩山少林寺面壁中國翻譯密典最多的不空三藏曾有一個時期住錫蘭數年研究大乘顯密的教義密宗在南洋群島曾有過相當的勢力唐以後因回教的侵入佛教因之滅亡遂成為回教的教區爪哇婆羅洲等處現在尚多佛教的古蹟該項古蹟大約是中國晚唐前後南印度密宗盛行傳播至此的遺物故從這種種關係上說來南方南印度及南洋佛教不獨單是傳的小乘教且曾傳有大乘空宗禪宗密宗尤其中國如法顯義淨等久住錫蘭來自南印度南洋的高僧更是多不勝計所以中國的佛教從南方來的決不減於北方所傳我們既從史的觀察把南北二傳的佛教打量了一遍知道所謂南傳佛教是小乘北傳佛教是大乘這種的稱謂是不確當的不過在阿育王時代所傳的佛教到錫緬後能繼續保存著原狀其餘各地方或改變了或滅亡了或因在時間上非為阿育王時代所傳去故另成小大顯密復雜的佛教所以這於流傳的時間上或有關係絶對不是地理上之有南傳北傳二巴利語系佛教確立之推測錫蘭位於印度的南方緬甸暹羅位於印度的東南方這南方的佛教是為巴利語三藏的佛教這在他們自己稱是上座部的佛教也就是迦葉阿難傳下的正統派的佛教甲巴利語三藏編集者及其文體的遞邅巴利語的原來文體久已失傳現在流傳的巴利語三藏是將巴利語用錫蘭字母拼成的所以應該稱為巴利語三藏這種巴利語三藏的編定者是和我國法顯法師同時的覺音尊者他是印度人法顯法師在錫蘭留學尊者同時也在該處弘法他編定巴利語三藏造有清淨道論對巴利語三藏都加以詳細的解釋以成立其組織之體系後人奉此論為研究巴利語佛教必讀的要典巴利語三藏經律論的內容和分量重要的除多了一部清淨道論外其他的部份大致與我國所有的四阿含經四分律六足論等相同巴利語三藏以前用錫蘭文寫成後來也用緬甸或暹羅文寫的現在已有英文寫成的不過還是以錫蘭文的為本乙巴利語是印度大衆化通俗化的語言巴利語是印度大衆化通俗化的語言梵文如我國的文言文巴利文等於我國的語體文而佛陀當時運用巴利語向群衆說教不外是用印度最通用的語言使高深的佛理個個都可以聽得懂迦葉阿難的結集以至阿育王時大德們的傳教都用巴利語也不外此所以我們現在利用語體文作宣傳的工具不失為契機的一種方便近六十年印度已有人注意到全國語文統一的問題波羅奈有一個全國語言統一學會他們很想把興都語成為國語據說興都語與巴利語頗為相近而巴利語與梵語亦相去不遠為了適應時代的需求我們知道巴利語在印錫緬等地是何等重要丙梵語巴利語為印錫等地各種語文的主源印度的語言文字雖然很多但大都是梵語巴利語的支流所以可代表印度語就是錫緬暹及西藏尼泊爾中國邊境擺夷的語言文字也都是從梵語巴利語演變而成的故可稱梵語巴利語為由遠東流布近東多種語言文字的主源故在近東如緬暹藏等地的文化可名之為印度語系的文化而在錫緬暹等地的佛教也可稱之謂巴利語系的佛教丁南方佛教由復雜轉變為單純的推測在錫蘭的佛教徒他們只承認阿育王傳去而由覺音尊者所編集單純底巴利語三藏佛教而事實上現在錫緬暹除了巴利語三藏佛教外也是沒有其他佛教的傳留但我們根據歷史的觀察錫蘭和南洋的佛教確是曾經一度有大乘顯密空禪諸宗的傳行並不是如現在這麼單純的小乘三藏至於錫蘭及南洋為什麼會從小大顯密分流的佛教南印度及南洋變為消滅錫蘭變為現在的純小乘呢這個問題尚難在歷史上得到確據的說明我們只能從推測得之在錫蘭的佛教大概曾經一個時期由於有力的國王因篤信覺音尊者編定的巴利語三藏故決定巴利語三藏為佛教的正統他種小乘派及大乘顯密空有等宗派概加以抑制或排斥所以便成為現在極單純的巴利語系的小乘三藏錫蘭經此有力者弘揚而確定後緬甸也受影響隨而確定暹羅因建國較遲故佛教之傳亦隨錫緬而入也同是傳承覺音尊者的巴利語系佛教戊印越等地也有巴利文佛教現在巴利語系的佛教極明顯的傳播地點是錫緬暹三地可是亦旁兼傳布於印度越南等地很多人以為印度現在已經沒有佛教縱然有的也不外是由錫緬佛教士的反哺我這次親自到印度受過加爾各答的孟加拉省佛教會的開會歡迎才發現這是一種錯誤原來孟加拉省與緬甸毗連的山嶽地帶佛教很盛行該省一般的宗教信仰回教占第一位佛教第二印度教第三基督教第四近已依巴利語把經律二藏譯成孟加拉語論藏尚未譯成其所傳的佛教完全和緬甸相同孟加拉之能夠把佛教保全大概因與緬境毗鄰或因僻居山區古時印度教回教的勢力不能深入以摧滅佛教的關係其他如雲南邊界的擺夷也傳巴利語的佛教越南在法國統治下的五國聯邦南中北三圻為中文系的佛教而高棉老撾二國的佛教也是屬於巴利語系的由是我們可以知道巴利語系佛教的教區了現在可定稱巴利語系佛教梵語系佛教梵巴合流華文系佛教並把這三系佛教的教區布列如下緬甸孟加拉巴利語系佛教錫蘭高棉暹羅老撾尼泊爾梵語系佛教西藏康青甘寧及晉冀遼吉蒙古梵朝鮮合流華文系佛教中國日本巴安南三錫緬暹佛教的近況甲緬暹民衆以作僧為榮的風氣現在錫緬暹佛教的狀況如何我想都是大家願意知道的緬甸和暹羅不特以佛教為國教同時以佛教為全國唯一的文化歷代帝王皆篤信佛教都以興建寺院供養僧寶為榮所以養成了為僧是榮的風氣一般人民都很願意送他們的子弟去出家縱然不出家也要送入寺院受佛教的教育所以日常生活習慣的軌則個人的道德行為都以佛教為依歸一切的一切都離不了佛教正如中國人從前稍能讀書的子弟拜過孔夫子一般而能夠出家的有如考中了秀才入了學一樣他們之所以樂意送子弟去做和尚也許就是基於揚名聲顯父母的觀念吧聽說緬暹有不為僧無人嫁的風俗出家為僧在緬暹的狂熱由此可以想見了不過他們出家的時間並不限定是終身的出家後數月或數年都可以如法捨戒還俗錫蘭雖然同是以佛教為國教為民族文化對於出家也很重視但不像緬暹那麼普遍而沒有提倡捨戒還俗的風尚因為他們認為出家是極高尚的如果一旦還了俗就得被人輕視了這是錫蘭的人民不濫於出家和不輕易於還俗的關係故一般知識的水準比緬暹較為提高乙緬暹人民對僧教已漸疏遠的近因近來緬暹的佛教有著很大的變化和伏著很大的危機緬甸是英國的殖民地暹羅也和我國一樣受了歐美文明的影響他們貴族派遣弟子去西洋留學以適應現代的需求而取得高尚的地位所以脫離了僧寺的關係另設學校的教育這類學校所養成的青年每對佛教信念發生了搖動由於這種原因少年多數已漸漸和佛教疏遠不像從前那麼尊重的熱烈從這點看來緬暹佛教如無相當適應時代性環境性的革興辦法和有大人物出來支持則前途實在極為危險丙六十年前的錫蘭佛教也是和現在中國佛教一樣的衰敗錫蘭和暹緬的佛教從來就有其不同點現在更有很多差別的地方大家都知道近百年來殖民地之多海岸線據點之廣要首推英國了但是海上的霸王英國以前有荷蘭荷蘭以前有西班牙西班牙前則有葡萄牙現在葡人轄下的澳門就是中國明代的外人居留地所以葡萄牙在海外的勢力是最早發展的在我國明末的時候錫蘭曾受葡萄牙的侵占佛教大受其破壞僧衆逃散各方至今尚遺有葡人毀佛的痕跡葡人退出錫蘭後僧衆為傳持戒統到緬暹求法受戒以傳回被毀的佛教歸國現在錫蘭僧遂分成了緬甸派和暹羅派這是戒派不是法派英人統治錫蘭後佛教亦受到極大的打擊天主教既隨葡人來錫於前復有基督教跟著英人侵入於後錫蘭佛教受這外教底重重壓迫之下遂失去領導文化教育的高尚地位當時那種衰敗的情況實不亞於清末民初中國佛教的現狀丁錫蘭的佛教從黑暗中走上光明之路黑暗的反面就是光明我們能夠從黑暗中掙扎出來就可走上了光明之路近五六十年來的錫蘭因為産生了幾位道高德重的大德和有力的護法居士黑暗衰頽的佛教已走上光明復興之路了他們抓著了錫蘭佛教衰敗的癥點竭力提倡適應現代化的佛教興辦僧衆教育灌輸僧衆一般的常識以作國際宣傳和學校教師的方便這種朝氣蓬勃的現象我對于錫蘭的佛教前途覺有無窮的希望在錫蘭已有幾所巴利文系的佛教學院最大的是達磨波羅與一高僧所創辦的另一所是現今錫蘭首相與一高僧辦的另有一佛教通神學會初為一美國佛徒所辦極力倡辦教育在它主持下的學校每校自幼稚園到高等專門從百人至數千人已有三四百所校名都富有佛教的含義如名法王學校阿難陀學校等校中除所授普通學科外並灌輸佛教一般的常識訓練日常的佛教信仰儀則以期提高人民對佛教的信仰佛教青年會則注力於改進鄉村建設摩訶菩提會提倡慈善事業及工業如醫院紡織廠等及廣設國際宣傳機關巴利文系的佛教教育已遍布於錫蘭在哥倫布我曾見過兩所各有七八百名學生的學校並且還有幾個中國的學僧以錫蘭的人口和面積說來可以說是希有難得了因為錫蘭佛教的細胞布滿了社會各個階層大有上自首長下至庶民無不信受奉行之概現在的內閣總理即為佛教青年會的會長衛生部長即為佛教通神學會的會長所以對於社會事業都居於領導的聯合地位摩訶菩提會於對外則注重國際宣傳於國內則提高人民文化的水準興辦社會慈善事業改良農村經濟生産這一切的一切都適應著現代社會需求故官民對僧人恭敬對佛教普遍信仰從錫蘭僧衆的淨高化佛教的大衆化利他化的趨勢去觀察我覺得錫蘭的佛教前途比緬暹較為穩妥這因為已能夠與現代社會需要打成一片的關係緬暹如果還是滯在舊制度保守不前不肯學習錫蘭佛教改進的方法那末不久將來大有走上衰滅之路的可能性四行上判別的小乘大乘甲中國是大乘教理小乘行的佛教把錫緬暹等地佛教的近狀大略地說過了在這兒使我起了一點感想我們平常說中國西藏和日本流行的是大乘佛教錫緬暹等地流行的是小乘佛教這單是在教理上的判別而在大小乘的實踐實行上卻使我得到相反的認識日本和西藏的佛教都有他適應當地環境需要的發展我們暫且不去談它且就中國佛教來談吧中國佛教所說的是大乘理論但卻不能把它實踐起來不能把大乘的精神表現在行為上我國的佛徒包括出家在家的四衆都是偏向于自修自了大乘的經論雖有很多人在提倡和弘揚但所提倡所弘揚的也不外是自修自了的法門這種說大乘教行小乘行的現象在中國是普遍地存在如出家衆的參禪念佛者固然為的自修自了即在家的信衆也是偏重自修自了的傾向他們都以為學了佛就不要做人什麼事都心存消極不願意幹更有很多人以為學佛作了此殘生的尾閭他們都說把國家社會家庭一切的俗務都捨下才可以入佛修行這種不正確的思想已經深印在每個國民的心坎中這種錯覺是復興佛教的障礙物是歪曲了大乘佛教的真義所以我們可以說中國所說的雖是大乘教但所修的卻是小乘行乙錫蘭是小乘教理大乘行的佛教錫蘭緬甸暹羅同是傳的小乘教理而他們都能化民成俗使人民學三皈五戒人天善法舉國信行佛教成為人民的宗教但可惜緬甸和暹羅的佛教還是依賴於帝王提倡維護的遺制或歷來崇佛的風尚習慣有以致之如果日久沒有了外護的力量其自身失去了支撐的憑藉或將趨於衰敗之途所以緬暹佛教還有他的缺點存在我們亦暫置不談現在姑就錫蘭的佛教來說錫蘭的佛教四衆弟子七衆中他們沒有沙彌尼式叉摩那尼比丘尼故僅比丘沙彌優婆塞優婆夷四衆對內則深研教理篤行戒律不特緬暹等地的教徒欲求深造者要到錫蘭留學就是世界各國研究巴利語系佛教的學者亦無不蒞臨這佛國研討對外則廣作社會慈善文化教育宣傳等事業以利益國家社會乃至世界人群表現佛教慈悲博愛的精神所以他們所說雖是小乘教但所修的卻是大乘行緬甸和暹羅的小乘佛教單是供奉釋迦世尊的塑像在錫蘭除了供有釋尊外並都供有菩提薩埵筏彌勒菩薩聖像這也可為他們接近大乘行底暗示和表現他們並有多處僧俗教徒領袖曾表示願學習中國大乘理論丙行的大小乘比教的大小乘為重要從行的方面說大乘行不外乎六度四攝六度的第一度四攝的第一攝同是布施六度是自他兼利四攝則專為利他兼利利他就是大乘菩薩行錫蘭佛教所盛行所表現的無非是兼利利他的佛教如僧衆律儀嚴淨聞思精進通神學會等團體底濟世工作正是合符大衆行的條件所以我認為說錫蘭的佛教是小乘極為不當錫蘭應該是小乘教大乘行底佛教和中國大乘教小乘行底佛教適得其反同時我還以為大小乘的分野不應單在教理上著眼從實際的行為表現上來分別尤為重要五復興中國佛教應實踐今菩薩行甲我們要實踐大乘教來幹今菩薩行從錫緬等地的佛教回顧到中國的佛教我認為中國佛教衰敗的原因固然很多而最大的病源則為空談大乘不重實行行為與教理完全脫離關係所以革興中國佛教要洗除教徒好尚空談的習慣使理論浸入實驗的民衆化以現社會實在的情形和需要來說今後我國的佛教徒要從大乘佛教的理論上向國家民族世界人類實際地去體驗修學這大乘理論的實踐行動即所謂菩薩行而這菩薩行要能夠適應今時今地今人的實際需要故也可名為今菩薩行以簡別向來只唱高調名不符實的菩薩行今菩薩行的實行者要養成高尚的道德和品格精博優良的佛學和科學知識參加社會各部門的工作如出家衆可參加文化界教育慈善界等工作在家衆則政治界軍事界實業界金融界勞動界都去參加使國家社會民衆都得佛教徒之益佛教的細胞散布於社會每個階層全不和國家社會民衆疏遠分隔乙佛教不能與廣大的民衆疏遠佛教之與民衆如樹木之與土地樹木藉著土地支持滋養才可以生長繁榮佛教賴著民衆的信仰才可以存在興盛如果佛教失了廣大群衆的信仰就如樹木失了土地的憑藉一樣不能生長所以我們多作救世利人的事業使佛教在社會每個角落裡都起了作用方不致與民衆疏遠令他們因此對佛教生起信仰心和擁護心例如以一地的僧寺為教化的中心改善人民的生活風俗習慣提高民衆一般的教育增加農村的生産協助工業的發達興辦救濟貧病的醫院教養院等慈善事業一地如是各地佛教亦復如是則佛教復興庶乎在望丙修今菩薩行復興中國佛教在中國佛教界早就流行了在家菩薩出家菩薩的稱呼如稱新戒為新戒菩薩受戒較久的為老菩薩可是這些都是只尚空談有名無實的菩薩不足為我們修習今菩薩行的圭臬我們應要以集體分工來學觀世音菩薩為修今菩薩行的模範誰都知道觀世音菩薩是普門大士又是施無畏者他為著適應一切衆生的需求於一體中而現三十二應所謂應以將軍宰官身得度者即現將軍宰官身而為說法應以比丘優婆塞得度者即現比丘優婆塞而為說法乃至應以童男童女身得度者即現童男童女身而為說法他這種利生的善巧方法是我們修今菩薩行所必要模仿的我們以修今菩薩行的集團為主體每個或每組實踐今菩薩行的份子為應化身去適應今時今地今人的一切需要明顯地說我們每個單位分身的今菩薩行者集體聯合起來本著大乘菩薩的菩提心為主因大慈悲為根本實踐方便為門的萬行發揮救世無畏的精神以集團的一體而現分工的三十二應今菩薩行總之我們想復興中國的佛教樹立現代的中國佛教就得實現整興僧寺服務人群的今菩薩行唯賢演培達居合記見海刊二十一卷七號
