body:
  text: 在家衆之學佛方法十九年冬在宜昌佛學社講佛法之要素是般若智慧而此智慧在禪定中心方能現起今諸君應各靜心默念摩訶般若波羅密多佛法乃可聽受學佛之人在佛教中向有在家出家二衆其未出家曾經受過三皈五戒之優婆塞優婆夷為在家衆而沙彌比丘等為出家衆然出家衆乃將世間俗務完全闢開以專修佛法及辦理佛教事業者故其人祇有少數而難普及於是欲將佛法普及於世界在家衆亦有其責任故為諸君一講在家衆之學佛方法中國之佛教向來未普及於社會故唯以僧尼為佛教之代表而不知在家衆兼負有大半之責任至近來則已有少數之在家衆能實負其責任設立林會社團等故佛教已漸能流行到社會中去不可謂非佛教前途之一大轉機此因一般智識人士相次引入於佛法中作深切之研究故佛法得日見其發達矣學佛者首須了知如何是佛如何是佛教之大概心中方能生起皈依信崇之正信故其第一步須對佛與佛教有種認識在中國舊俗將敬神與信佛混一為談其實佛與神逈不相同在尋常所敬之神鬼或祖先若天地山川瀆嶽草木等神其崇奉之者皆中國向來之習慣或對於歷史上有功德之人而為之紀念者或謂神有操縱禍福之神權敬之則可趨吉避凶否則不利故不得不敬者在此種通俗之敬神信佛觀念上有以神為佛者有以佛為神者故信佛之人往往不知何者是佛所以在家衆之學佛須先將何者是佛認識清楚而去除其媚神佞神之迷信一佛佛之意義在各經論中有極詳盡之説明今再為略明佛是梵音佛陀之略在中國為覺者之意覺謂覺悟反顯平常之人雖有點知識而大部分不知不覺如處黑暗如我雖處身世界而世界之事不知甚多乃至本身之事亦多不知比如本身生從何來死從何去即號稱有智慧之人亦不明了故大致皆可説為不覺者因不覺悟故如盲子便生出許多錯誤的行動及苦的結果於是種種顛倒煩惱遂相因不絶然不覺者非永不能覺而且已有能覺之者之佛所謂佛者在人中曾經有過即二千餘年已前之印度的釋迦牟尼佛是佛有完全普遍而徹底的大覺悟近自一身遠至萬物之真相無不覺悟了知是為宇宙人生究竟完全之覺悟者然並非是造出萬物掌管世界之神而祇是得到宇宙萬有之究竟覺悟者佛當時所現的是人身得到大覺悟後亦與人無異由此可證明人人皆有得到覺悟之可能我們各人現雖暫時不覺然非究竟不能覺故佛證明一切人及衆生皆有成佛之可能性應去求覺悟而打破種種之疑惑顛倒以至於達到究竟之覺悟現在各人既皆認識自己有成佛的可能性然假使無已成佛者為其模範師導愷切告示則其可能性不易發揮而仍沒在不覺之中今欲從不覺中依覺悟之可能性以轉變成覺悟則當以佛為我之模範標準從如此求覺悟上發心信佛乃非感情上之迷信而是覺悟上之正信故一切佛法都要以摩訶般若為母般若之意義即大智慧依大慧得到大覺將無始無明完全除去乃能實現究竟安樂因煩惱痛苦之源即無明若欲解脫須從根源上將不覺破除成立正覺正覺確立即佛應如此認識佛而信佛二佛之教法信佛不能依佛之教法去行則仍不能將佛性發揮出來佛之教法約有二甲即為一切衆生説明宇宙人生之真理者此之真理本為如來大覺悟中之所證明其未覺悟人當然不能證明故須用名字言説講明出來此講明其理之言教等即為佛教如明各個人之生從何來死從何去等有十二因緣之理明世界衆生大概都不免於苦而其苦由貪等煩惱殺等惡業所集成非天與神所造若欲解脫須修對治煩惱之道等四諦之理由人以至於萬物皆是因緣所生各各無自體性故究其體性完全是空然亦不無由因緣和合而有之幻有遂顯非空非有即空即有空有不二之中道實相是為諸法實相之理此等真理世人於事實上猶不能證明須依教義以成為理解常去觀想修習乃能改變舊心理為新心理乙即為一切衆生開示實踐修證上之方法者此云法即四諦中之道諦約之就是六種過度之方法此方法是得到如來覺悟之最扼要之方法第一種謂各人各抱為我之見而生貪吝心遂以自私自利為中心向各方面去貪求不捨致成損害他人以至互相殘殺之種種惡行故佛以布施之法度除其貪欲慳吝若能將自己之身命財力完全犧牲出來利濟群衆是為由不覺心而轉成覺悟之第一步得到此種覺悟後則坦坦蕩蕩心無愧怍得大安樂矣此為布施度慳貪之方法第二謂佛常為衆人所説之好事惡事有或應去作或不應去作之分別應去作者當積極作去不應作者止息不作如此名持戒律謂將身心行動合於軌範合於理法如於視聽言動之時戒其非禮等此為持戒度犯律之方法第三謂尋常之人雖具慈心若遇猛利非理之事加於身則原來之慈悲心即不能安住遂起瞋恚乃至發生損害故須有忍辱心以保持慈悲心此為忍辱度瞋恚之方法第四精進者謂有進無退之意凡一舉一動皆以世界衆生之利益為前提其上三度之行在世人往往靡不有初鮮克有終故有懈怠放逸不能繼續致失圓滿故應將前之三度推之進步在止惡行善之時使身不惰百折不回悍勞忍苦精勤去作將很深很深之不覺心根本翻起以成究竟之覺悟是為精進度懈怠之方法第五有情之心皆為六塵所紛散混亂故清晰明徹之智慧不得現前如何方能使心有自主之力不被境奪則須修禪定禪定者即修靜坐然又不同他教之靜坐佛法之靜坐是將心力集中而使處於和平統一之地位在初練習時專心一境如將心寄托於氣息上氣息出入而心亦隨之出入是為入手方便之一種餘如中國人皆知道念阿彌陀佛將心力集中於一句阿彌陀佛上亦能得定總之修禪定者是將散亂心收縮凝結起來是為禪定度散亂之方法第六是般若度愚癡愚癡者即不覺之謂而人及衆生充滿了愚癡雖有小小知識亦在大黑暗之包圍中人事上須明了之處亦多不明了遑論萬有全景若欲達到全景明了須修佛智慧欲修佛智慧須以前之五度為基礎至散動心已變成靜定之心心之精神力也就宏大即能根據佛説之萬有真理去作實際考察如從十二緣起之理去觀察人生之根源等久之久之觀察之能力增加不必依佛説之理而自能了知再進一步親證宇宙人生之真相就是得真覺悟即能離去無明黑暗如是展轉增上到於究竟就是成佛三學之次第前來説信佛須先認清佛與佛教而佛教包括佛證的真理與實行的方法認識佛教到極處不但可學佛而且信得自己就是佛將此真真的信心表現出來即為皈依傳授佛法之僧而從修學以決定為真正信佛之弟子是謂第一步起正信既由大體之認識而起正信須更進求深切之了解依教理去研究到圓滿明徹是為第二步開圓解蓋欲修證佛之覺悟須以理解為先導為進取修行之方策更須求善知識之證明指導方免乖謬由圓解以修妙行則信解皆清淨而結果亦必清淨也第三步依圓解以修六度妙行在家衆可隨各人地位職業等之不同各適其宜以行如其力量僅及一家則為全家公益而無自私之心亦即為布施行若能推之親戚鄰里鄉黨以至一縣一省一國及全世界亦復如是此種修行且不須離開人世即在人世中就各人方便上去修行布施如此持戒亦然如在家有男女夫婦之關係故有配合之正理若違正理之邪行在所應止至持不殺不盜等戒蓋為人生道德之原則能行多少即修功多少在家戒中持一戒二戒均可然其標準有不同處如負有社會國家之責任者須以維持社會國家為標準任勞任怨以謀國家社會之全體利益否則即為犯戒以須隨各人之職業地位而行故今特講在家衆之學佛方法然就今中國一般國民所最需要者而講即為公民道德是要各人皆自知為國民之一份子時時要顧及全國人民之利益安樂如養成如此之國民道德果能學習佛教之菩薩修行則不難成就菩薩為法界衆生之利益而行我們若觀一舉一動皆與全國人民之休戚相關事事皆求與全國人民有益則自然而然便成就國民之公民道德此尤為今日一般在家衆學佛之要義克全記見海刊十二卷二期
