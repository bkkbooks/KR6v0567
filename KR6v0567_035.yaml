body:
  text: 正信會會員格言執持正法攝諸長幼謂深信佛教之正法以攝化若長若幼之群衆也此為總句本會會員皆應本此以行而總務部修持部部員尤須身體力行之一切治生諧偶雖獲俗利不以喜悅謂經營實業治理生産而能輕財樂施也本會會員皆所應行遊諸四衢饒益衆生謂作社會教育家公益家慈善家也本會慈濟團宣化團團員所應行入治正法救護一切謂政治家法律家軍事家等當存救世護民之心也本會護法社社員所應行入講論處導以大衆謂入諸學術研究院研究館講演會討論會等皆以大乘佛學融貫之也本會研究社社員應行入諸學堂誘開童蒙謂開辦小中大學教育青年啓發佛慧也本會宣化團團員所應行見正信一卷一期
