body:
  text: 示慧綸皈士法言十一年四月作一皈命以正其信皈命者謂舉其現報之形壽資具等盡投入於佛法僧海不復執我我所從此唯佛法僧為所依之主唯佛法僧為所歸之處決不因形壽資具之變遷退轉於佛法僧之信換言之則身可滅世界可壞佛法僧之信終不搖奪蓋佛法僧如海現報之身世如漚漚有存亡海無得失能如是皈命佛法僧者於佛教方成正信具佛法僧始為佛教故總謂之信佛教別謂之信佛法僧也然佛法僧有因中之理性有果上之事相因中之理性者各人寂然遍知靈然常覺之自心即佛遍知常覺中所現萬事萬物即法一心萬法調和融合即僧非遍知常覺則無心體非萬事萬物則無心相非調和融合則無心用故本心即佛法僧非佛法僧不明本心也果上之事相者自覺覺他覺行圓滿者曰佛若釋迦牟尼佛阿彌陀佛等是也依佛言教明理起行證果曰法若諸經論戒律儀軌規制是也仰果修因宏法度人之衆裔曰僧若諸菩薩緣覺聲聞比丘比丘尼沙彌沙彌尼是也非佛無以有教非法無以為教非僧無以傳教故佛教即佛法僧非佛法僧不成佛教也察果徵因由因致果依本心乃成佛教歸佛教乃明本心不執理以廢事不著相以昧性性相融徹事理成就是為皈命本心深信佛教二存敬以銷其情心佛在情如金在礦圓覺經云譬如銷金礦金非銷故有雖復本來金終以銷成就銷情之質唯六曰貪曰瞋曰癡曰慢曰疑曰不正見其根則為我癡我見我愛我慢故銷情者換言之即銷除我執而已然執情之積甚深其來罔覺欲銷除之者當於所皈命之無盡佛法僧海中專奉持一佛一法一僧拳拳服膺念念在心如每日稱誦釋迦牟尼佛名大方廣佛華嚴經名彌勒菩薩名等儼同面對常存恭敬令身語意三業不敢稍有懈放則久之久之情執漸銷而心覺明淨也三發心以宏其願心體本來廣大平等不可不開發之心用本來圓融自在不可不發揮之圓覺經云末世衆生欲求圓覺應當發心作如是言盡於虛空一切衆生我皆令入究竟圓覺於圓覺中無取證者除彼我人一切諸相如是發心不墮邪見故菩提薩埵通發之心即五大誓願是也所謂衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛果無上誓願成福智無窮誓願集此之深誓宏願橫盡虛空豎窮永劫無限無礙必發如是無限礙心乃能生生世世形形類類長時修行不住不著依此宏願為本如發此生誓達之願或命終時往生之願方無雜染四明理以軌其行瑜伽師地論菩薩地真實品明二真實四真實已又安立此真實義相當知即是無二所顯所言二者謂有非有此中有者謂所安立假說自性即是世間長時所執亦是世間一切戲論分別根本或謂為色受想行識或謂眼耳鼻舌身意或復謂為地水火風或謂色聲香味觸法或謂為善不善無記或謂生滅或謂緣生或謂過去未來現在或謂有為或謂無為或謂此世或謂他世或謂日月或復謂為所見所聞所覺所知所求所得意隨尋伺最後乃至或謂涅槃如是等類是謂世間共了諸法假說自性是名為有言非有者謂即諸色假說自性乃至涅槃假說自性無事無相假說所依一切都無假立言說依彼轉者皆無所有是名非有先所說有今說非有有及非有二俱遠離法相所攝真實性事諸法實相是名無二由無二故說名中道遠離二邊亦名無上佛世尊智於此真實已善清淨唯佛與佛乃能究盡諸菩薩智於此真實學道所顯右明遠離有及非有二邊契證中道無上真實之理又即此慧是諸菩薩能得無上正等菩提廣大方便何以故以諸菩薩處於生死彼彼生中修空勝解善能成熟一切佛法及諸有情又能如實了知生死不於生死以無常等行深心厭離若諸菩薩不能如實了知生死則不能於貪瞋癡等一切煩惱深心棄捨不能棄捨諸煩惱故便雜染心受諸生死由雜染心受生死故不能成熟一切佛法及諸有情若諸菩薩於生死以無常等行深心厭離是則速疾入般涅槃彼若速疾入般涅槃尚不能成熟一切佛法及諸有情況能證無上正等菩提又諸菩薩由習如是空勝解故即於涅槃不深怖畏亦於涅槃不多願樂若諸菩薩深怖涅槃即便於彼涅槃資糧不能圓滿由於涅槃深怖畏故不見涅槃勝利功德由不見故便於涅槃遠離一切清淨勝解若諸菩薩於其涅槃深住願樂是則速疾入般涅槃彼若速疾入般涅槃則便不能成熟佛法及諸有情當知此中若不如實了知生死即雜染心流轉生死若於生死深心厭離即便速疾入般涅槃若於涅槃深心怖畏即於能證涅槃資糧不能圓滿若於涅槃多住願樂即便速疾入般涅槃是諸菩薩於證無上正等菩提無大方便若能如實了知生死即無染心流轉生死若於生死不以無常等行深心厭離即不速疾入般涅槃若於涅槃不深怖畏即能圓滿涅槃資糧雖於涅槃見有微妙勝利功德而不深願速證涅槃是諸菩薩於證無上正等菩提有大方便是大方便依止最勝空性勝解是故菩薩修習學道所攝最勝空性勝解名為能證如來妙智廣大方便右明修勝空解不受生死不入涅槃是成佛大方便又諸菩薩由能深入法無我智於一切法離言自性如實知已達無少法及少品類可起分別唯取其事唯取真如不作是念此是唯事是唯真如但行於義如是菩薩行勝義故於一切法平等平等以真如慧如實觀察於一切處具平等見具平等心得最勝捨依止此捨於諸明處即種種學術處一切善巧勤修習時雖復遭遇一切劬勞一切苦難而不退轉速疾能令身無勞倦心無勞倦於諸善巧速能成辦得大念力不因善巧而自貢高亦於他所無有祕吝於諸善巧心無怯弱有所堪能所行無礙具足堅固甲鎧加行是諸菩薩於生死中如如流轉遭大苦難如是如是於其無上正等菩提堪能增長如如獲得尊貴殊勝如是如是於諸有情憍慢漸減如如證得智慧殊勝如是如是倍於他所難詰諍訟喧雜語論本惑隨惑犯禁現行能數觀衆深心棄捨如如功德展轉增長如是如是轉覆自善不求他知亦不希求利養恭敬如是等類菩薩所有衆多勝利是菩提分隨順菩提皆依彼智是故一切已得菩提當得今得皆依彼智除此更無若勝若劣右明入法無我善能成熟有情及佛功德又諸菩薩乘御如是無戲論理獲得如是衆多勝利為自成熟諸佛法故為成熟他三乘法故修行正行彼於如是修正行時於自身財遠離貪愛於諸衆生學離貪愛能捨身財唯為利益諸衆生故修布施行又能防護極善防護由身語等修學律儀性不樂惡性極賢善修持戒行又能忍他一切侵惱於行惡者能學堪忍性薄瞋忿不侵惱他修忍辱行又能勤修一切明處令其善巧為斷衆生一切疑難為惠衆生諸饒益事為自攝受一切智因修精進行又能於內安住其心令心善定於心安住常勤修學為淨修治四種梵住為能遊戲五種神通為能成立利衆生事為欲除遣精勤修學一切善巧所生勞倦修禪定行又性黠慧成極真智為極真智常勤修學為自當來般涅槃故修習大乘修般若行又諸菩薩即於如是修正行時於具功德諸有情所常樂現前供養恭敬於有德修敬行於具過失諸有情所常樂現前發起最勝悲心愍心隨能隨力令彼除斷所有過失於有過修悲行於己有怨諸有情所常起慈心隨能隨力無諂無誑作彼種種利益安樂令彼怨者意樂加行所有過失及怨嫌心自然除斷於有怨修慈行於己有恩諸有情所善知恩故若等若增現前酬報隨能隨力如法令其意望滿足雖無力能彼若求請即於彼彼所作事業示現殷重精勤營務終不頓止彼所悕求云何令彼知我無力非無欲樂於有恩修孝行如是等類當知名為菩薩乘御無戲論理依極真智修正加行右明依所明理正修六度等行此中之理皆人所應知者此中之事皆人所能行者能明此理以軌其行即是人中之菩薩矣皈不極則信不純信不純則敬不隆敬不隆則情不融情不融則心不普心不普則願不圓願不圓則理不契理不契則行不淨信純敬隆願圓行淨駕茲佛乘遊十方剎自運運他同登正覺勉厥始終努力毋懈佛二九四九年降誕日太虛見海刊三卷六期
