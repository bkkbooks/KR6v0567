body:
  text: 僧伽與政治問政而不干治覺群社三十五年七月作去年海潮音月刊曾刊出過宗教徒應有國大代表一文本年一二月間醒心曾寄余論應組佛教政黨一篇繼而在家出家少壯佛徒聒余倡導組織者不下十餘人間詢長老緇素則緘默持重大多不以為可余亦遲遲未決頃又有長春般若寺道源來書所言尤為激切同時得緬甸通訊則云緬僧在日軍侵緬前多數參加政治運動日軍侵入時且多參加軍事行動但聯合國勝利後緬政府則以僧律禁僧預政而戰前緬僧約為二十萬人今則纔七八萬人矣長老僧亦多還俗者不無昔盛今衰之感參政則易隨政治興敗其勢然也而錫蘭近亦以哥侖坡智嚴學寺少壯師生為主幹僧伽參政運動已成具體而微的政黨然老年僧長施主以其違比丘律咸極反對錫蘭如要保持比丘律自應超然政治之上且其地十分之八九的多數皆為佛教信徒佛教徒自能佔政治權優勢擁護佛教僧不參政其在國家與社會的地位反見尊崇但中國則僧受比丘律後即受菩薩律向以菩薩律為歸而藏僧喇嘛亦然其一部分喇嘛且為執行政治官吏僅不婚娶異俗官耳然超政遇政府與社會摧教易遭破滅從政亦易隨政府而倒二者利弊各關況今中國無論在政府在社會尚無在家佛徒集團足以擁護佛教則僧伽處此殊堪考慮今以多人對此問題的研討余遂不得不加以深思熟慮而於孫中山先生所說的政權治權得一解決曰問政而不干治孫先生謂政是眾人之事治是管理政治是眾人之事之管理又政權是人民有權議定政法治權是政府有能治理國民僧伽不得不是眾人之事中的眾人所以於眾人中的本人或同人的事不得不問要想問問眾人之事講講其所感之禍害痛苦所求之福利安樂不得不參加社會的地方的國家的合法集議眾人之事的會所所以對於有關之民眾社團及鄉區自治會議縣參議會省參議會國民代表大會均應參加一分子為本人同人全民眾人議論除苦得樂之辦法但所參預的以此各種議事場所為止亦即人民政權機關為止而執行五種治權的中央和地方機關概不干求參預換言之只參加選舉被選為議員決不干求作官運動作官將文官武將等這有數種要義一此只動口動筆為眾人祛惡成善除苦得樂以合於佛教慈悲化人本旨並不須直接用刑用兵去殺人殺敵犯佛戒二此只臨時出席會議平日各行其素不妨礙自修及弘教出席會議時個人亦仍可保持僧伽服儀三一般民眾多藉當選議員為進入從政服官的過渡僧伽當選議員或國大代表有此分限則免中央及地方官嫉忌疑懼四有此則對於佛徒痛苦事件可以呼救佛教有害事件可以防止興教利眾事件可以倡行佛法真理正義可以宣達五如此做議員而不做官不藉議員為做官則真可為民代表興利除弊易得多數選民六如此則佛法只用理論說服人化導人以攝取民眾信仰而不用任何威脅武力以強制人的教旨亦得以貫徹基此六重要義我們中國現階段的中國僧伽對於今所提出的議政而不干治願皆透徹了解切實踐行覺群社先辦週報後將擴充而辦日報皆期以此義而為佛教為民眾而服務名以覺群者僧的本義即為和諧合聚的群眾中山先生解釋民字亦為有組織之群眾團體故人必處在群體中乃有人的功用故須從自群覺起遍覺及他群乃盡自覺覺他之義亦即覺群社之為覺群社的社旨見覺群周報一卷一期
