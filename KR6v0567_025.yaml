body:
  text: 勉青年學僧二十七年一月作僧是住持佛教及寺產的集團此集團的本身有待於依法及律適時契機之整飭已為現今不可諱言之事然壯而老者垂垂待盡能承先啟後是在僧中青年分子尤在曾受相當教育而有相當學識之青年學僧故如何改善僧團以運用寺產而發展佛教唯青年學僧是望今值此中國民族及國際人類大奮鬥時代正青年學僧內本教義外應時宜以振興發揚之機會而默察靜觀所及雖有不少嘗盡力於救護看護工作頗為國內以至國外所稱歎然亦多一味消極逃避或反因此退失佛徒立場者則不能不舉下列各端以冀反省相勉一信解佛法及於佛法有修學者應較一般人有定力而無怖畏能鎮靜而不慌亂頃聞有從甲地急逃乙地不久由乙地欲逃回甲地者如此張惶躲避豈非平日於佛法無實信修之表露耶應如何愧奮以期養成堪忍之能力二暇時遇事為文頗能運用佛理以發揮者茲乃以心意不寧徒自悲歎竟至不能以身歷目擊之狀況感想描寫告人能如正平所作佛教教育與國防及從抗戰路線達到東亞和平等抑何寥寥無幾耶應知采佛法之藥救眾生之疫正為縝密研究之佛子應有功用菩提所緣緣苦眾生由大悲菩提心以流露為感發同情引生功德之真文豈可自餒三真正於佛法信修有心得者雖在作救護看護等慈濟工作亦必內充虔敬三寶不懈禪誦等精誠使人不覺崇信決不輕棄僧相以改投他界忘捨佛僧根本乃聞頗有青年學僧或逕入軍隊或另進學校反掩飾其為僧徒而恐師友或他人知之者但隨一時興奮情緒或求謀生出路則全失佛徒立場矣四能端居危地以照常研究修持者固堪嘉尚而處在後方較安地帶毫不關念戰區失地之慘痛情況仍懈怠荒嬉而無身心緊張之勤勇精進者則為麻木不仁之輩也民元為一大變動時期民十五六又為一大變動時期均有當時的青年學僧應付著余則今以衰朽在茲又一大變動時期到來應變的青年學僧何在見海刊十九卷二期
