body:
  text: 僧教育要建築在僧律儀之上十九年春在閩南佛學院講僧平常人當作出家人的姓其實不然梵語僧伽此云衆并有和合之義故所云之衆係有團結有組織有紀律有威儀有目的之社會而僧之特殊和合義又有理有事理則唯一即理和同證也事則有六所謂身和同住口和無諍意和無違見和同解利和同均戒和同遵是也理證為其目的事行為其方法要有此理事和合的精神可謂之僧失此則不得謂之僧僅可謂之雜亂的群衆而已故僧本身之構造全在於律儀而律儀之內心則惠捨堅忍勤勇定慧敬德救苦慈怨報恩諸德行是也對于一切衆生廣辦一切饒益之事如渴之施茶飢之施食病之施藥寒之施衣有怖畏者施以無畏無智慧者施以法慧甚至如捨身飼虎皆謂之惠捨也忍苦耐勞百折不回難學務學難行務行縱有他人侵惱迫害其心不瞋其容不慍如喬達摩之受謗終不以謗而損其精進常不輕之受辱終不以辱而損其知見乃謂之堅忍也勤者不怠勇者不怯果決有為一往無前瑜伽論云勤修一切明處令其善巧又如大般若經敘薩陀波崙之參曇無竭不懼寒熱不隨睡眠唯法是求唯法是行乃謂之勤勇也定以度散亂慧以遣愚癡無慧之定乃為枯定無定之慧乃為狂慧故吾人欲圓成大覺弘濟群生必須止觀雙運也品行優美者清淨無染者損己益人者自利利他者廣學多才者斷惑證真者成就三昧者具足總持者皆謂之有德吾人欲從凡入聖非謙下其心以敬崇有德者不可若時時見人之德不見人之失見己之失不見己之德自能進德修業日趨向上對于三寶尤要非常之渴仰非常之愛慕既降其慢益深其信如善財之南詢常啼之東行玄奘之西遊無著之北謁皆謂之敬德之所使也三界流轉無一不在苦難之中也所謂生老病死苦饑饉刀兵苦怨憎會苦求不得苦無量諸苦參差不一凡先覺者學佛行者有力量者務須以悲愍心方便拯拔以救世脫苦也怨者雖對我時懷仇恨然我若以怨報怨則禍患相續生生死死將無已時故論云於己有怨諸有情所常起慈心隨力隨能無諂無誑作彼種種利益安樂令彼怨者意樂加行所有過失及怨嫌心自然除斷如此乃謂之以慈化怨生我身之父母育我智之師長資我事之朋友乃至一切人等或以仁言誘誨我者或以資財資助我者或長養我色身者或增長我慧命者乃至親疏順逆之成就我功德者皆謂之有恩者對之不可不時思酬報如論云於己有恩諸有情所善知恩故若等若增現前酬報隨能隨力如法令其意望滿足雖無力能彼若求請即於彼彼所作事業示現殷重精勤營務終不頓止彼所希求云何令彼知我無力非無欲樂若能推此報恩之意則見吾人于佛教及社會皆曾受深重之恩凡與之有益之事悉應以報恩為前題則自不辭艱勞勇於服務如是種種善行為律儀內涵之精神要素故菩薩戒以攝善法為本質契之于一心施之于四體謂之依律儀戒發之于世間行之于社會謂之饒益有情戒今之為學僧者起心動念行止營謀不可不本于此也律謂紀律儀謂威儀個人則前後一貫群衆則彼此和合行動整齊形態嚴肅此為律儀之自相依此乃能使吾人改造身心變化氣質以構成僧伽之體格古人五夏以前專精戒律五夏以後方乃聽教習禪深有所以今西藏錫蘭等處之僧伽亦猶如此故僧教育所修一切自利利他之佛學皆須建築於律儀的基礎上也爾等學僧必先入僧數乃可受僧教育則對于構成僧之體格之律儀豈可須臾於不注意乎欲全國僧伽之精神感通意志團結而不相渙散離律儀又安可得之要知僧伽所有特殊之團結特殊之和合特殊之訓練特殊之作用悉本于律儀僧失律儀僧即非僧即不能受僧教育亦不能以如來之功德法財自利利他故云僧教育是建築在僧律儀之上也爾等學僧如有志欲使中國現今死氣沉沉之僧伽從佛法中復活起來將佛法濟世利人之活力深入一般民衆的心坎使民衆共霑佛法之利益以之造成人間的安樂淨土則爾等學僧非先自僧教育基礎的僧律儀力行不可勉之勉之慧童記見海刊十一卷三期
