body:
  text: 敬告亞洲佛教徒十四年夏作一緒言今因日本之佛教同袍開設東亞佛教大會萃亞洲各地之佛教領袖於一堂敦厚東亞佛教徒之交誼以協同研究及宣傳佛教教義發達佛教主義之社會事業與教化事業增高人類文化促進世界之和平洵盛舉也豫嘗發起世界佛教聯合會以宏揚正法救濟今世為主幸值勝會敬為我亞洲佛教同胞言其概略幸垂察焉二唯佛教能救今世今世何世一大戰爭之世也國家與國家戰爭而今後大患在敗亡諸國之復仇民族與民族戰爭而今後大患在弱小諸族之聯抗階級與階級戰爭而今後大患在勞苦諸級之反動此三端已令執持世界現狀之霸權國帝國主義優勝族資産級不能一日安矣況乎商界與工學軍政界也工界與商學軍政界也學界與工商軍政界也軍界與工商學政界也政界與工商軍學界也工與工商與商學與學軍與軍政與政也放眼觀之殆無一時一處不在搏激相戰傾軋相爭之中者殺機彌漫戾氣充塞農鬨於田舍工鬧於作場商攘擾于市集士鼓噪於學校官僚政客爭權利以相搗亂一事不能治一政不能施而國紀隳裂矣軍閥將領爭奪地盤以相雄長一地不能安一業不能成而民生塗炭矣地方與地方鬥則中央危矣團體與團體鬥則地方險矣家與家鬥則鄰里鄉黨荊棘矣人與人鬥則父子夫婦成蛇蝎矣盜賊遍于郊野虎狼生於衽席逐逐然此一妄身妄心不知如何而可發狂所至殆非人人趨於自殺不能止此固今世無歐無美無亞而不然之現象也禍患如此天災更從而迫之地震矣洪水矣大旱矣暴風矣誰實使之誰實為之而令人世窮促至於斯極耶表面言之則階級間之資本主義與國際間之霸權主義帝國主義實為攪亂乾坤之二條毒龍然此已為害乎其政之事而生乎其心者則由觀察生物動物為出發點之進化論以肥身蕃族之私欲所起競爭為進化唯一之母而以由私欲競爭所占到之富與強為進化唯一之果由是人人大發揮其私欲大施展其競爭各向所欲達到或富或強或富強之目的地猛進交爭利以求富之結果則少數人之資本階級成而多數勞苦者之怨愁鬱矣相角力以求強之結果則少數之霸權國家立而多數弱亡者之煩冤深矣世人眩惑於由物欲競爭所獲物産豐富軍械凶強之結果頌為現世之文明進化而不知實已淪墮人類於禽獸復以知覺過敏故不能安於自己造成之禽獸生活將遄化為枯骨強石矣嗟乎吾人遊於淪為禽獸將致枯強之人世如置身墟墓間悲從中來不自知其涕泗橫流之何從也故余嘗論今世文明與古文明之異點古文明或為人倫之仁義或為天神之敬修或為佛法之隨宜設化發達人生令成正覺而今世文明則為效法動物以競求滿足富與強之獸欲應字之曰獸欲之文明而已獸欲相率食人將盡嗟吾佛教同袍安得不悲愴以營救耶今世固可悲而須救矣然曰惟佛法能救之斯又何説耶且打倒資本主義不已有社會主義耶摧破帝國主義不已有無政府主義耶推翻競爭進化主義不已有互助和平主義耶曰唯唯否否是皆相進於亂以水救水以火救火名之曰益多而已以同出於貪瞋癡之毒而鼓動於殺盜淫之機也代表人道仁義之儒術則為獸欲吞噬之餘已奄奄無復生氣雖吾人為一世而蘄於治者祇在乎此然非取法其上不能得茲中也代表天道敬修之神教天基回道梵神等在今世人類猛烈之知識上彼唯藉盲情冥志所成立之信仰基礎固已破壞不能復存彼天神之自身在科學之推證與哲學之批評上先已失其根據復何能藉以挽回如狂潮怒瀾之獸欲而正之以人德耶故上窮天魔神梵下極方技雜藝皆無離過清淨之可依歸處唯無上正遍覺者之正法及解行此正法之衆為情感上意志上知識上種種方面皆無漏完美之可依歸處耳由之人人信業果報正身語意五常之性復而十善之行昌矣故唯佛教能救今世也三其責任在亞洲佛教徒唯佛教能救今世而佛教乃創立於亞洲流傳於亞洲至今日猶唯亞洲人能知之行之者也人能宏法非法宏人然唯能知能行者能宏傳之故欲恢昌佛教於亞洲而宏傳於歐美使造成獸欲世界之歐美人亦從佛化中而回復其人性其責非亞洲佛教徒任之其孰任之哉此望吾亞洲各地佛教徒皆自覺其責無旁貸任無他屬咸挺身以佛菩薩之導濟斯民為住世之唯一大事因緣也四亞洲佛教徒當如何通力合作耶亞洲各地中華之漢蒙藏之佛教徒日本之鮮台佛教徒大致皆大乘佛教暹羅之佛教徒印度緬甸安南南洋群島等佛教徒大致皆小乘佛教雖各地之風尚相異宗派不同而要從釋迦牟尼佛之法中流出探本溯源從佛口生從法化生親逾骨肉不可為某國某宗之習俗假名以離間之當同體釋迦菩薩牟尼佛陀之大悲本六和衆之義通力合作求無上智光以照破斯世之冥暗也茲分數條述之甲華日佛教之互解華包括蒙古西藏佛教徒有四短四長利濟社會事業及教化社會事業極不發達僅無識之侶與群衆所生薦亡求福等齋會經懺關係短一諸僧寺雖標別禪講相承有宗派源流之異但其內容或毫無實際若禪寺並不參禪等或混合鮮專精之修學若雖參禪學兼傳戒作經懺等短二習稱方外對於世事視若風馬牛之不相及為治國者所輕忽短三缺乏科學知識於代表現代之西洋思想鮮能了解呆板陳腐説法不能應當世之機短四其上者能隱遁山林刊落榮利岩洞茅蓬關房禪堂甘苦食淡持戒修定長一禪淨律講台賢性相咸無專主不嚴別門戶以相排斥長二不為國性所拘今佛教有泱泱獨立於世之大風合於佛教超世出俗之本質長三各宗之學理雖隋唐來已經華學之變化而未因近世思想文化之變遷尚能窺見佛教之純粹真相長四日包括臺灣朝鮮佛教徒有團體之組織能辦利濟及教化社會事業長一各宗有各宗本山支寺布教所及專門學校有教育專宗人才及宣傳專宗教義之機關雖博大精深者不多覯而於本宗宗義大致明白長二皆能愛國為國出力在國家同袍為重要國民長三對于代表現代之西洋文化思想已能充分容受且能用之研究佛學以適應現代思想長四個人持戒誦經習禪等自修漸為輕視而坐洞結茅閉關按此等行以西藏為最等苦行尤絶無行者騖外而不重內短一偏重各個宗派之系別而乏佛教全體之統一甚至十餘宗派有裂為十餘教之勢也雖有佛教聯合會之説僅為各宗派之聯絡不能組成一體為一宗派之利益時可脫離短二為國之心過重有將佛教作為國家一大機器中之一小機件之勢失佛教超國族而普遍於世界之精神短三全國學界以科學思想為重心故佛教徒亦以科學為本評判佛教之教理而失沒佛法超現代科學之殊勝義不能轉科學而反為科學轉所講佛學往往如水沖敗乳殆無乳味短四此華佛徒之四短即日佛徒之四長華佛徒之四長又日佛徒之四短今者華日佛徒往來漸密情感已通望於此四短四長間能互相了解取其所長補其所短則華日佛教徒乃真能化除隔閡攜手宏傳佛教於人世也乙印緬暹佛教徒之互學印度緬甸暹羅南洋餘處之佛教及佛教徒情況吾既不深知難致論議但其處皆係小乘教而應今之需決非可限於小乘故望印緬暹諸地佛教同袍能來華漢藏日留學而緬暹錫蘭等仍以佛教文化經國其化民成俗之人乘善法必別有開明宏道之處而華日佛教徒亦須前往留學以知其真相從往來留學而互知之後遂真能協同以有所作為也丙組為無國界之教團佛為王子其出家與出國之精神一貫古來欲界之根在家有家如繫獄囚故真正從佛修行荷傳佛法者必須出家今欲根擴充重纍尤在於國故出家兼須出國必有超出家國之精神始足以平視世界等視衆生荷擔佛法化齊人天借觀基督等人天小教一為何國之利用且受世詬病而落其教格況無上無際之佛教耶然若非組一超出國界而全無國界之教團則此超國界之精神無所歸寄易為國俗拘蔽以之自隘其量不能表顯獨立無依之勝相此吾所以有世界佛教聯合會之發起而望全亞佛教同袍皆能注意乎此也五如何進行以盡其責任甲教徒內人才之培育擬設一世界佛化大學以培育宏傳佛教之各方面人才茲製一表以明大意原理名數理化生心西洋各國文語科學院西洋系哲學院應用法政農工商醫文藝院應俗部教學院梵耶回道神等東洋系政學院孔老諸子等東洋各國文語文藝院世界佛化大學設印度及歐洲聲聞院小乘諸部經論設日本及中華教理系般若院法性中觀諸經論設中華及歐美瑜伽院法相唯識諸經論究真部設錫蘭及中華律儀院大小乘論律設中華及美洲行果系禪觀院禪淨台賢等設西藏及日本真言院乙人世上化利之施行佛教化俗事業一方法廣設學校編譯書籍編演戲劇集衆講演二場所城廂鄉鎮道路舟車軍營監獄工廠病院三勸善愛群守法勤業互助調身惜物和平誠信放生念佛四止惡弭兵息鬥戒盜戒淫戒奢戒煙戒賭正家正俗正禮佛教利世事業一救災援拯焚溺賑濟飢荒消防水火救治兵傷等二濟貧傳習工藝開墾荒地三扶困安養老耄保全貞節矜全殘廢等四利便施設燈明修造橋路義置舟渡等見海刊六卷六期
