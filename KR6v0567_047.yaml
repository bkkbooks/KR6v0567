body:
  text: 佛學會應注重於學二十四年十二月在廣州佛學會講各位都是佛學會的會員對於佛學當然已有相當的修學佛學雖差別無量而其宗旨是一貫整個的所謂歸源無二路方便有多門所以我現在要講的佛學也許就是各位已聽過的佛學會之學就是依佛法修學的學因為學然後才能産生出信心故信心實為學的第一結果因為學所以什麼是佛什麼是法什麼是佛子如何修行及其所成的種種功德都可以明晰清楚的知道但如何能明晰清楚的知道呢這就要隨時聽人演説佛法或者自己研讀佛經然後才能明白什麼是佛什麼是法什麼是佛子知道佛是世出世間最尊無上的大聖人法是佛所證所説的依之修行便可離苦得樂返妄歸真佛子是秉承佛法而行的行者也是現實人間的導師對於三寶有這樣的認識而後産生的信心方是堅固而有力量的正信這信仰所以成功還是由於學佛的結果所以學佛不但在行和證方面不容易學到即學到如此真正的信心亦是非常不容易佛學會之成立也就是適應此種需要學佛學到有真正的信心不容易者就因為這信心是由了解佛法而發生的因為正解的不容易所以正信亦難能了然而正解正信是學佛的首要譬如開門的鑰匙沒有鑰匙就走不進佛法的大門若沒有正解正信根本就談不上學佛所以正解正信是最重要的有了正解正信使可依之修習佛法的行門佛法的行門甚多廣言之有三十七道品乃至在家二衆之五戒十戒出家二衆之二百幾十戒或三百幾十戒都是修行的行門若收攝之這許多的行門都不出戒定慧三學淺顯的説就是我們平常念佛亦是修習戒定慧行念佛的人當然是諸惡莫作衆善奉行的善人這就是戒念茲在茲收散亂心專注一境就是定由於定把心力集中思維觀察到諸法的真理認識諸法的真相就是所發的智慧由是可知平常説的行門有五戒十善六度四攝皆不出戒定慧三學因此佛學會應注重於學由學而正解才生起信心此信心即非糊糊塗塗的迷信而是明明白白的正信由此正信所起的行當然也是正確的行由正行行到相當的時候就可以證到真理了所以學佛始於信終乎證都離不開一個學字平常所謂生到老學到老學佛亦是如此從最初皈依佛法信仰佛法學起一直學到證悟成佛為止都要在這學字上用工夫末了希望各位修學佛法由學入手先學到正信正解由正信解而求得正行和正果十二二十五大廠記見海刊十七卷三期
