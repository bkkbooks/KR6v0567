body:
  text: 去私戒懶為公服勞三十一年六月在漢藏教理院講在國民痼疾通病下當先去私戒懶才能趕上人程從佛教機關團體中實習為公服勞方可養成僧格此二語乃言現階段之一般國民在其日常生活中多勤於自私懶於為公此非國民之良好現象而是國民之痼疾通病亟應療治之者也其治之方法如何曰去私戒懶為公服勞而已國民之通病既是勤自私懶為公故須從去私下戒懶從為公下服勞此通病除去則可成為一個完全之人如昨日紀念的朱子橋將軍即是一個去私為公的完人僧本是和合衆不是散漫無條理無組織者此即是機關團體故須從此中實習為公服勞才能養成僧格此是最淺的去私戒懶為公服勞假使這最淺的去私為公都不能做到則不能作人更不能作出家人了出家人之為公服勞須在教團中實行之不過去私戒懶為公服勞八字若在佛法的意義上説還不僅止於此第一衆生所求在離苦得樂離苦得樂最簡便完善的方法就是去私戒懶為公服勞平常有句俗話説人不為私誰肯早起所以為公則無人肯動必須鞭策之而行然人生有不可避免的公衆事若在驅策下才肯去做則自生憂惱設法躲避結果又受人加以鞭策其苦更甚矣大概為公的人都能安然忍耐自不覺其苦為私的人除一己之外餘皆敵人個個礙其私行常時設法躲避作偽等因起憂愁故便成苦若能養成為公習慣勤於為公則心中光明坦白愈多做而愈感快樂古人云為善最樂即是這個意思到了佛菩薩的地位則是真實去私專為衆生在形式上雖有時受苦然以衆生之安樂為樂其內心中也就領受無限的快樂了去私而變為公勤於為公而去為公之懶自然能得很大的快樂所謂君子坦蕩蕩小人常戚戚者是也菩薩的心境三千大千世界無一芥子許非捨身命之處故能得最大安慰此即能究竟離苦得樂之最簡便完善的方法第二平常人説離惡成善轉惡為善或為善得樂作惡得苦在因上説轉惡成善則明顯地可以知道能為公去私則種種惡法如十不善及二十六隨煩惱等諸惡皆去貪瞋癡皆由自私而生懶惰放逸皆大隨煩惱故能去私戒懶餘諸煩惱支流自然斷除了為公服勞則慈悲不害無貪心等各種善行皆自然地能夠成就能勤勞則精進不放逸行捨等皆能具足此或從去私上成功或從為公上成功轉惡為善從淺近的行為上説凡為私的種種行為皆是惡凡去私為公的種種行為皆是善其餘之善惡定義很難確定此八字則為極明顯之定義故欲轉惡為善去私為公即是最切要之辦法第三破愚成智最切要者亦在此如一念為私則成各種自私自利只見小我由我生執使我永久獨一便成私蔽為私則不顧他人愚癡心深智慧則被其障蔽人之心性原是靈覺光明的現在之所以不靈覺光明即是為私所蔽故心性的靈覺失去則成為愚癡顛倒為私蔽時則不知為公勤於為私則癡上加癡為己所欲更增愚癡如是轉展增上愚癡益厚能反轉過來勤於為公則自然能生光明所謂私成蔽公生明者即是這個道理為公則私蔽不起心性本具的靈覺光明即能自然發現靈明的智慧來有的人雖不讀書不多從別人聞學而以坦白為公的心理去做公務心地自然光輝智慧清明有些人讀書雖少而能實踐力行為公的在靈覺光明中卻成就了很好的智慧佛法中的小乘不及菩薩以雖已去私尚不能積極為公依四弘誓願來講菩薩因為要度無量衆生故須斷一切煩惱學無量法門因學無量法門斷一切煩惱自然地就生起大智慧成無上佛果若不肯度衆生也就不肯多學故亦不能發大智慧勤求多學如牛吃草變成白乳若只為自私而求多學則唯增其私如毒蛇吃草變成毒汁是故要想生大智慧當依此去私戒懶為公服勞八個字去行果能實行不但可以成個好人而且可以成菩薩成佛佛法中説有出離心無我心大悲心三者缺一不可有出離心無無我心則不能出離三界缺大悲心則不能成佛欲圓具此三種心也不離此八字戒懶服勞即是出離向上的精進心向上而不是為公則不能出離修來修去都還是不離我執故能棄私為公則能成就無我心斷我執生起無我定慧徹底的棄私為公服勞亦即是大悲心斷法我執成就二空般若的智慧在去私上再加戒懶服勞圓滿大覺的智慧精進的為公自然同大菩薩諸佛一樣了平常説菩薩度生為自己未滿者上求到了佛果位則是無為而為己無所求而盡未來際化度衆生其私已完全去盡為公服勞已完全成熟即去私為公至於究竟了故此八字切近則做人遠者出離三界由菩薩而成佛從淺至深從粗至細徹上徹下一切皆由此八字中生起來在此處修學的人須依循此義去實行所學方能得益六月十八日正果記見三一七三佛化新聞
