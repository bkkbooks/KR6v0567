body:
  text: 律儀之研究在武昌佛學院講一以研究瑜伽菩薩地第十戒品二卷半為基本二以研究南山五大部上溯三要疏以窮四分律宗略疏已失三由研四分廣律而進究餘三律五論及唐宋所譯各律四參究大乘顯密及宋明古德關於律儀之經書而以梵網為歸五參攷儒家禮樂叢林清規及蒙藏日本之宗制以成佛教律儀之新建設如是研究次第明晰確能融小徹大會古適今探內採外研末究本而開建合於時世人心之律儀見之行履乃為實學非徒施於空言而已見海刊五卷九期附註節自律儀之原理之第四節餘文編入佛教救世主義
