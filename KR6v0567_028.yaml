body:
  text: 人工與佛學之新僧化文佛為解放家獄俾世人獲專心致力於超自然界圓寂圓覺之道順應天竺遺化成就一種苾芻僧制所謂外乞食以資色身內乞法以資慧身者是也傳至中國唐代百丈禪師易之以禪而農農而禪內外無乞於人之新僧化百丈既捨離律寺創設叢林自行其一日不作一日不食之勞動生活復率其仰德影從之徒衆服開荒力農之務其說法亦毫無死法繫綴人心唯以身作證使人人自開發無師之智常曰老僧在钁頭邊為大衆說法大衆亦當共同於钁頭邊自尋生活逮今叢林猶有出普之遺制然浸微矣或擁田財坐享現成或販佛法用糊身口又不能明理行道資慧命揚佛化遂致進退交病為世詬之所叢集非撥返之百丈僧其不復能為世之寶乎此豫乍得之新感覺謂須倡人工與佛學相倚之新僧化故將政治與宗法相倚之整理僧伽制度論突然中止其宣布第今不曰農禪而曰人工與佛學者以農者人工之一禪者佛學之一就百丈之農禪而廣之而實託百丈之農禪為本質務人工以安色身則貴簡朴修佛學以嚴法身則貴真至故其精神即不求乞之沙門行杜多行也茲列其梗概於下人工需要者衣食住醫之所出一開鑿山井二陶匠土石三採冶銅鐵四種植竹木棉麻五穀諸蔬衆藥五造作道路橋梁屋宇器皿工具農具文具六製布作衣七造食製藥廢除者一金錢二珍寶三絲革四煙酒五魚肉六舟車七偶像八其餘種種無用之器物佛學消極者一不殺不盜不不妄語不兩舌不惡口不綺語不貪不嗔不癡二絶諸華飾歌舞嬉戲三去嗜好四斷晚食積極者一調鍊身息二講求經義三修習禪定四參究心性五施行慈濟六宣揚佛法人工與佛學之新僧化每日公定時間十二時睡六小時作六小時三小時是人工兩小時是習禪一小時是說法其餘十二小時是自由時間隨喜施為每處從五六十人以上至五六百人為度有法堂有齊堂及大衆廚房有禪室及長連臥床有浴室有病僧院有老僧院有工場有農場有衣食藥物庫有器具什物庫有經像圖書館有編譯刊印館其餘若像設之宮殿間別之寮舍等一概無之故不得容留婦女過宿凡男子能依照人工與佛學之規定作務修行者由大衆和合許令同住同住中有不能依照人工與佛學之規定作務修行者由大衆和合擯令他去此在山林之寺院措施匪艱有能如說行者庶幾種種僧中之積污皆一洗空淨輔之以竿木隨身遇緣即宗之化或名利場裏塵勞隊中說法或三岔路口十字街頭等人或弄船江上或飛錫雲端不亦蕩蕩乎無能名哉見海刊一卷三期
