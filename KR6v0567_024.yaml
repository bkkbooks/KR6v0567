body:
  text: 現代學僧畢業後的出路二十年七月在北平彌勒院佛教學校講記得去年此時曾來貴校與各位見過一次光陰迅速轉瞬經年在這一年之內想各位的學問行持均有進步這都是辦學的人苦心孤詣教育有方與各位艱苦耐勞精進無怠之所致現將舉行畢業這是我不勝慶祝的按學問一道本無止境有何畢業之可言不過在辦學的一個結束修學的一個段落上假立這個名詞而已但是畢業後確有應當注意應當考慮之點即是前途的趨向與自己所學的運用這兩點若不預先注意考慮到了每以為畢業後無處可去歧路倣徨這是近來各處佛學校的學僧所感的痛苦實在是未經研究未經考慮之過我覺得現在受過僧教育的學僧前途趨向的路徑很多不一定拘拘於畢業後必得當講經的法師或任佛學的教員除此二途以為別無可走之路如此則立覺非常仄狹且必至不能圓滿何以故以所學的假使不夠宣傳教義而勉強從事在説法者每感於工具之不足在聽法者常患希望之未滿卒至兩相扞格各失本願這都是偏執於一條路徑不知圓融運用但知向高遠處去躐等而求不知向平坦處隨分而施之咎夫佛法之本旨在於利己利人果能本乎自己的菩提心隨力隨分作利人的事業則無處不是方便無處不是弘法不專在當法師而務名利恭敬也今就本分所在貢獻各種辦法以備各位畢業後之趨向如係回到鄉村的小廟即可就鄉村之情形凡與鄉村有益之事即幫同舉辦一方面對村人聯絡感情隨機與其講演如此無形中即將佛法灌輸於民衆了假如原在大寺院出家的畢業後回去或作當家或充執事須一面溫習所學一面相機弘化但不可操之太急倘若一定按照新法來作不顧事實不顧習慣必至惹動一般未受僧教育者的公憤或至不能相容如是不但所學的不能運用且轉致構怨遭謗此是應當注意的只是抱定自己菩提本願不忘卻所學不被舊習所轉善巧方便以期漸漸達到目的或不願回自己本廟蝸居欲向各地去參訪可到各處舊式叢林去看看須知舊式的叢林有多年的家風亦有很多可參學的他如或朝山拜佛或行腳挂單但是受過僧教育的須與未學過的不同蓋未學過之人朝山者但知頂禮泥菩薩挂單者但知討單混飯吃別無其他意義如爾等若到各處去朝山挂單可隨時隨地考查習俗觀摩道風遇機遇緣即可隨分宣布教化又或作佛團所辦的社會實業地方公益或辦佛教會等等機關均賴有出家人為之辦理主持蓋佛法之建立以世界衆生為依止故作資生事業乃是佛教的本分如現各處所辦孤兒院工藝廠等等亦須有出家人身體力行引導向佛化的道德方面作去如程度優良的於講經布教能擔當者自可隨緣去作或有志深造者須觀察其他佛學校所教之課程均優於我現在所學的亦可請求插入是為向上一步或以教理有所心得發願行持則須依自己根性擇一相當者致力專修如以念佛法門為相應則可覓一適宜處所而力行之推而至於其他諸法門亦無不如是或誦經持咒禮懺修觀等法皆是以上所講皆是自利利他的菩薩行自覺覺他的菩薩道隨便選擇而行總以不負所學為是如此則頭頭是道路路皆通決不致再起無路可去之感矣今當貴校舉行畢業之前乃聊致數言以作各位前途之借鏡台源記見海刊十二卷九期附注原題在北平彌勒院佛教學校之講詞今依學僧之路改題
