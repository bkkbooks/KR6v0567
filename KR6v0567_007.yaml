body:
  text: 學佛者應知行之要事在武昌佛學院講高者隱山靜修卑者賴佛求活惟以安受坐享為應分此我國僧尼數百年來之弊習而致佛化不揚為世詬病之大原因也豫有慨乎是宣化萌俗近歲人心丕變皈嚮漸多然細按察之新起之在家佛教徒衆仍不脫僧尼之弊習且有傾向日甚之勢此由未知學佛之正行八正道故不為凡夫之溺塵即為外道之逃世也今所應確知以實行者凡學佛之人無論在家出家皆不得以安受坐享為應分務必隨位隨力日作其資生利人事業不得荒廢偷惰以報諸佛衆人之恩德庶其滌除積垢而振發新光耳此其為事若何則應知職業志業之分是也學者志業也從吾志之所好以趨踐佛之淑吾身善吾心增進吾之德性達到吾之樂地者也故應以三皈之信五戒十善六度四攝之行為柢而毫忽不得藉此形儀名稱以為謀一家一身之生活計者而職業則於或家或國或社會或世界隨其勢位之所宜才力之所能任一工操一勞用與人衆交易其利以資一身一家之生活者也此因吾身藉家親國民之互助方得生養存活故吾應有以酬其益報其惠焉否則吾身於世即有所損既增他人之纍亦加自己之負墮落不免勝進奚冀故學佛之道即是完成人格之道第一須盡職業以報他人父母師友以及社會資吾生命之恩第二乃勤志業以淨自心進吾佛性之德必如是佛乃人人可學必如是人乃真真學佛何則世間資生事業皆與佛法不違背故學佛應自利利他故纍人負己是無業流氓故寄生偷活是邪命故巧取坐收是盜行故由是觀之出家者有出家者之家務事業即所謂宏法為家務利生是事業也在家人有在家人之家務事業即仕農工商各操一贍身養家利國益群之業也否則即為世之負債人更何能成就佛法中超世之志業哉佛學院學人記見海刊五卷三期附注廬山學題作對學人訓詞今仍原題
