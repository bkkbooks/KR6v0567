body:
  text: 告全球的佛學同志十七年十月在倫敦無線電台播講據個人對於佛學的研究及經驗深覺佛學不是某時代某方土某民族之一種文化思想所沿革而成乃是全宇宙事事物物的真實相被大圓覺悟之釋迦牟尼洞然證明了而説出來之全宇宙事事物物的真理因著各時代各方土各民族的機會不同隨根受益變成小乘大乘梵文華文以及某宗某派等區別其實佛法仍一味平等并不為任何時代任何方土任何民族之所拘礙亦不為任何解行任何文語任何宗派之所分裂一切含識皆有佛性凡研解信行佛法之一小部分者皆為從佛口生從法化生之佛子皆佛法中之同胞兄弟今日在座諸君如有研究或信養佛學者深願不為大乘小乘南方派北方派等名字分裂了亦不可為梵語波利語華文西藏文等名字割開了凡有關於佛法的任何文語宗派皆須靜氣平心的研究凡有關於佛法的任何個人群衆皆須寬度大量的融合在此時交通便利的地球上我們佛法中兄弟們皆當首先為人類做成天下一家四海兄弟的模範太虛此次到歐洲來就在訪求全球的佛學同志共作佛學的世界運動佛學的世界運動擬先從設立一世界佛學院起手徵求世界各國的佛學者共同來發起建設集合世界各文各派的佛學及佛學者作分門的與融貫的研究再傳布為世界人類共同信解之佛學這便是世界佛學院的主義太虛曾草有世界佛學院的計劃書此次過法國曾提出於兩次的講演會中頗得法國諸東方學者及佛教信徒之同情已開過世界佛學院之法國發起人會議議決先設立世界佛學院通訊處於東方博物院由該院院長阿甘先生等擔任其事并言如各國佛學者願將世界佛學院設於巴黎者即可捐出地基太虛在南京之中國佛學會及新加坡之中華佛教會亦已設中國佛學院之中國通訊處及南洋通訊處此次來英國知英國為歐洲研究佛學之先進故深願今日在座之佛學團體及佛學者對於作佛學之世界運動的世界佛學院共同來參加作發起人開一世界佛學院英國發起人會議在倫敦設立世界佛學院英國通訊處與各國的通訊處聯絡進行令世界佛學院之建設早日成功如有表同情者請與巴黎通訊處接洽或來敝寓作詳細討論這便是太虛對於今此盛會願貢獻的一點微意并謝貴會招待之厚誼見海刊九卷十一期附注原題在倫敦無線電中告全球的佛學同志今略題文末附世界佛學院建設計劃已見他處故略
