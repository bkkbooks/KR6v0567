body:
  text: 淡寧明敏二十一年八月在漢藏教理院開學訓詞今天為世界佛學苑之漢藏教理院開學日期太虛覺得非常榮幸承當地長官附近紳士冒雨來此而籌備各院董也到山不少本院雖粗具規模未臻完善但諸位竟能到這偏僻的山寺造成這莊嚴燦爛的開學典禮太虛謹先向諸位表示誠懇的感謝本院過去籌備期間所經過的艱難困苦方才何院護北衡已報告得很詳細了溝通漢藏文化使漢藏民族的感情日臻親善方才軍部和峽防局代表也説得很明晰了弘法須靠佛教僧徒本身的努力和精神的振作並希望本院多多發展本山富源馮縣長更言之綦切以上各位所説的希各學僧特別注意印度佛教的傳流今有三個系統而兩個屬於中國即中國本部與西藏其他一個就是錫蘭這三個系統可以表示三個時代不同的佛教第一小乘極盛的時代傳于錫蘭第二大乘盛行的時代傳於中國第三密宗興盛的時代傳於西藏雖然佛教發源於印度而現在印度本土的佛教可説是沒有了中國雖占兩個系統的地位但漢藏隔絶不能融貫這是我們中國佛教徒所當引以為恥的一件事太虛三年前講學歐美提倡發揚世界性的佛學創造更進一步的世界新文化而應付這新世界的人心旋與歐各邦學者有發起世界佛學苑之舉世界佛學苑章程裏曾有藏蒙佛學系的預定前年到四川恰逢劉軍長有派僧入康藏之舉又適武昌佛學院留藏學僧法尊等來函説可請昌都格西到中國來於是向重慶諸院董提議就在川東先成立一溝通漢藏佛學的漢藏教理院其間一切籌備經過我毫無盡力之處遲至開學的前兩天方抵重慶説來殊為抱愧但我既為本院的創議人今已來此自不能不負擔相當的責任就今天到會諸君的演説看來希望於各學僧者很大希望諸僧必須認清宗旨身體力行或能得到幾分之幾實現幾分之幾我為事緣所牽不能長與諸僧相互伴同修習特地拈淡寧明敏四字作為本院永久院訓也即是諸僧此後修學的標準今且拈來與諸僧咀嚼一番淡淡謂淡泊即淡於欲淡於欲在佛法就是尸波羅密即所謂持戒若不甘淡泊則貪欲心滋長放僻邪侈無所不為於是種種瞋恨鬥爭因之而起要除此種種不良惡行即要甘淡泊守清苦所以第一即談到淡字淡於欲的欲包含財色名食睡五欲必也能清能謹始能圓成淡練清如古人伯夷恥惡聲惡色之入耳目所以孟子謂為聖中之清必如此乃可沒有奢侈浮華謹即所謂不以善小而不為不以惡微而不斷從前曾參三省顏回四勿皆用的這謹慎工夫所以必清必謹乃能淡於所欲寧寧即寧靜即寧於心我們的心本有明覺之功用與轉變之大力但非做寧字的工夫不獲實現這寧字在佛法裏面就是禪波羅密即所謂修定圓覺經説無礙清淨慧皆由禪定生可見定心能發種種的明覺吾人因種種財色名食物欲環境包圍以致利令智昏心為形役不能轉物而為物轉這都是因為沒有寧靜工夫之所致即所謂無定力一個沒有定力的人不是散亂便是昏沉昏沉是墮在無記糊塗中去了好比我們老大的中國朝野上下只是一團雜亂無章沒有秩序的行動不是失之於散漫便是成了睡眠昏沉的狀態雖有廣大之領土與衆多之人民無能為力所以佛法教人須修習禪定所謂由戒生定由定發慧而定須修奢摩他止以成就之止即止一切散亂昏沉即是完成安定寧靜的要素而禮佛誦經持咒等誠敬的功夫中亦能達到寧定所以惟止惟誠乃能寧于心明明即明於理即般若波羅密所謂得慧本院宗旨為研究佛的教理佛的教即説明宇宙萬有緣生性空的真理吾人不能深觀遍照究竟正確的明了所以對於陳列眼前的一切形形色色各作不同之視察即有不同之答案有所見有所不見彼是此非相互水火不能得到真確究竟的明了此佛所以有教佛教即使我們究竟明此真理的不二法門但這種明了必由上面所説的淡於欲寧於心好好做去始能得來心經説的照見五蘊皆空即徹底的明於理必清必謹方能淡於欲惟止惟誠始能寧於心欲淡心寧始能實地明照於理佛法明理倣佛如科學證驗下來之結果但須將昏沉之心易為淡寧之心以達之此即佛法的般若工夫增上慧學所以深觀深照乃能明於理敏敏即敏於事猶云工作敏捷做事敏活在佛法勤學五明等種種方便無量功用前三字可説是理體此第四字才是事用談到敏字正所謂從體起用從根本智而成後得智的大方便用方便為究竟但須從勤與勞的兩方面雙管齊下的做去方能收到敏於事的好果何謂勤勤即勤快亦即奮迅勇猛如人看一本書或歪或睡走馬看花隨便入目結果只收得一種倣佛看過的效果這都是因為他們的不勤奮勤奮的人看書則不然看一本書必有一本書的長進好者隨即摘録難索解者即翻字典辭源如今諸僧在講堂聽講須帶紙筆墨硯應用的文具一字一字須傾耳肅聽心寓手應隨即録記所以勤在六度裏是精進波羅密在三十七道品裏是四正勤勤快之反面即懶惰懶惰的人也非不想求好但不能勤快而欲求好未免遇事只想圖僥幸享現成而墮落到偷盜的罪惡中去偷盜不一定要做強盜凡圖便宜使欺詐取巧揩油這都是偷盜這樣要想事業成就真所謂未之有也我們要想以佛法去救人救世尤其非勤不可但懶惰慣了自己雖要勤亦莫法去勤了所以我們要把慣懶換作習勤要日日去習勤何謂勞勞即勞苦孟軻所謂勞其筋骨餓其體膚是也能勞就能身心強健起來體力增加起來隨做一事都能心動身應如量及時以起諸生不要誤會以為勞心於寫字讀書就叫做勞須知凡一切日用所需衣食住行都要自身勞動去做現在的時代崇尚勤勞在中國的社會更宜以勤勞矯正痼疾在出家人尤其是讀書的出家人更宜勤而且勞方才馮縣長告訴我們的培植農林開闢園地都非勤勞不可不要以為勞動不是學須知這就是鍛煉身心的真學這才是你們真正的受用中國人往往誤解學字以為光是讀書罷了不錯讀書固然是學問的一種但修橋築牆砌路跑腿何一非切身之學復次敏於事是事情上的實際行動由行而知乃為真知亦為真學由真學一往直前去做必能得佛法的所謂悉地成就菩薩行從難行能行上行佛功德從無量勞苦中得不勞而獲直無意思財色淡戒度戒學淡於欲名食睡奢摩他止寧定度定學寧於心誠敬根本智院訓明慧度慧學明於理體理後得智理事無礙已生惡令斷未生惡令不生敏精施忍度方便學敏於事用事未生善令生已生善令增長末了希望各教職員各學生深切體會此四字之義從內心中發動實行之庶幾漢藏佛教有融洽一爐之時候漢藏民情有和洽一堂的機會懸目的以努力前赴全在各學僧身上岫廬記見海刊十三卷十期附注原題在世界佛學苑漢藏教理院開學訓詞今改題
