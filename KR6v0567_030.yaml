body:
  text: 僧尼應參加國民大會代表選舉二十五年五月在常州作國民大會代表選舉法公布後聞有婦女團體起而爭有婦女代表者余因索取選舉法而細閲之見其積極規定者即第三條中華民國人民年滿二十歲經公民宣誓者有選舉國民大會代表之權而年滿二十五歲即得為候選人其消極限制者即第四條一背叛國民政府經判決確定或尚在通緝中者二曾服公務而有貪污行為經判決確定或尚在通緝中者三褫奪公權者四禁治産者五有精神病者六吸用鴉片或其代用品者除此之外更無性別或宗教區別等之其他限制由此故年滿二十之婦女當然已在女公民之列而婦女之為律師醫師或女工等更可參加職業團體之代表選舉是故更不應另有婦女代表之選舉也若於此更有婦女團體代表之選舉則其反面豈不亦應另有男子代表選舉乎然由此乃確見僧尼等亦為區域選舉內之人民但年滿二十及經公民宣誓即得有選舉權若年滿二十五歲者即得為候選人而更無其他之限制是誠全國僧尼所應深切注意熱烈參加者也二十五年五月三十一日常州見海刊十七卷八期
