body:
  text: 清信士女之學佛以完成正信為要素二十四年十二月在廣州佛教居士林講以我觀察整個佛教所得的結果佛教自從印度傳至中國從中國復傳至日本等處在佛教史上雖分宗別派有各種宗派的區別但這是因佛法流傳到各時代各處所隨機緣之所宜而發生的決不是佛法本身原來有什麼差別所以各宗派的稱呼在佛法的本身上是毫無意義因為各宗派是後世的佛法的支流是一種方便溯本還源皆歸于佛的大圓覺海生今之世科學發達知識進步交通便利人類對于無論什麼學術都可從交換意見中截破隔膜融會貫通而佛法中人若對于佛法還存各宗派的觀念那是殊失現代佛教的真義了現在中國各處差不多都有居士學佛的團體組織有的叫做居士林亦有別的名稱但觀這些團體所作的事業有一部份是偏重佛理的研究有一部份是偏重念誦修持有一部份則偏重宣傳佛法做社會慈善的事業雖各有所偏重實亦各各相通如偏重學理的亦兼修持或宣傳偏重修持的亦兼研理或宣傳而偏重宣傳的亦並非撇棄了研理和修持居士這個名詞在中國已很普遍流行凡是學佛的男女都指為居士依佛典的原義居士並非專指學佛者乃是社會上一般對素有學行者的通稱如經中每說國王大臣長者居士此國王大臣是政治界的人物長者和居士都屬於一般社會的長者如社會的士紳為眾人所推重者居士即士農工商中能安居樂業之士故知長者居士都是社會一般的稱呼而居士尤非專指學佛者在家學佛者的專名在佛典中是優蒲塞和優蒲夷譯作近事男和近事女即親近承事三寶者亦譯清信士和清信女即在佛法中已成就清淨正確的信心的男子和女人但往往有誤會的以為優蒲塞和優蒲夷是要受過五戒者方可稱呼實則不然祇要皈依三寶成就清淨正確之信心皆可名之為優蒲塞和優蒲夷的然依中國的習慣向來是以居士代替了在家學佛者的稱呼故有居士林等等的成立則知所謂居士已非佛典中所說居士的原義已是在家學佛者的專門名詞了這樣說學佛的居士就是受三皈以上具足清淨正信的士女也就是優蒲塞和優蒲夷而優蒲塞和優蒲夷學佛最重要的條件必先具足信心從這信心為出發點才可建立一切佛化的事業所謂佛法如大海非信莫能入信為道源功德母長養一切諸善根學佛從凡位至聖位必須經過信解行證的四個階段而程序上則以信為最先可見信與學佛的重要了但如何能建立起清淨正確的信心呢這就要對佛法僧三寶有真正深刻的認識使自己尋常在起心動念之間乃至說一言行一事都依佛法為軌道以三寶為準的這樣繼續無間的做去便可成就清淨正確的信心說到對于三寶有正確深切的認識而成就淨信這認識已到于解方面的工作了故信雖居解之前同時亦徹於理解之後即對佛理有相當的或深刻的研究從三寶中得到正確的認識使此心和三寶融合毫無障隔始可樹立正信若做不到這一層至少也要概括的認識除了佛是我的真正皈依處其他一切天神地祗一切宗教和一切學說比較研究的結果皆不足以為我的真正皈依處對佛有了這樣認識淨信自然產生了現在我們中國人往往信了佛教同時也信別的宗教的神鬼或別的學說的主張這樣信佛便沒有清淨純正的信心原因就是對佛沒有深刻清晰的認識所以信心不能專一對於佛既如此於法於僧亦復如是要知其他一切宗教學說之法都是有漏雜染的不究竟法唯佛法是無漏清淨的究竟法而僧乃是依佛法修學傳承佛法的聖賢亦非普通的宗教徒及一切學派的信徒所能相比的對三寶有這樣認識此信方算清淨純正故信解行證的程序雖先由信而解亦須由解而信由解而信方是淨信雖由勝解而生淨信但能真正成就淨信亦非易易須從信解上再起相當的修行在自己平常的日用行事中去體驗體驗到所得的法益如寒天飲水冷暖自知深信佛是不誑語者佛法是毫無錯謬的則此淨信豈非更進一層了如修五戒或修十善或修六度四攝諸法門五年或十年之後若得煩惱漸除智慧開朗解決環境的迷悶發見人生的真相信知依佛法行果然無謬則推而上之對於三乘所證之聖果及佛果之依正莊嚴的功德都可以信受無謬而且知道自己修行也的確能至那種境界的那末這個淨信便更加根深蒂固的充實起來故雖由解而信使信純正清淨而更須由解而行信心方能更加充實不落於空虛因此學佛者須先具有淨信然後由解成立淨信由行充實淨信這充實淨信的結果便是做到實證了所謂證就是從原來信心中所信的得了實際的證明從這實際上得到的證明就是完成了淨信故經論中講到信有三種即信實信德信能信實者信有緣生因果的實事更信諸法實相的真理信德者信有三寶一切的真淨功德知此功德即從實事實理中所成就信能者即信因能成果信一切眾生皆有證此實事實理之可能如佛能了生脫死眾生亦能了生脫死佛能具諸功德眾生亦能具諸功德由此此一信心不但由信清淨亦由解成立由行充實而由證方知故雖學佛者皆應具有清淨正確的信心而真正做到清淨正確的信心就非常不容易必須完全做到信解行證方算是圓滿成就清淨正確的信心日本有淨土真宗其講信解行證與中國所講的不相同他的次序是解行證信明信心真正成就之後一切的一切都可與佛相齊由解行證成的信心方算是真正完全了信心如此之信含甚深義與我前來所說之意義亦多相符因真正的淨信確須證到了佛果纔算圓滿信雖然如此高深難能但我們現在既能皈依三寶便可以產生了清淨信心作了清信士與清信女而成立居士林等佛教團體來研究佛理修持佛法弘揚佛化現在貴林的清信士與清信女當然對於三寶已有相當的了解和修持所以我把這個信說得如此高深無非要使各位知道信之難能可貴而更加勇猛精進地在信中求信以期完成淨信臻到信的極高峰竹摩記見海刊十七卷三期
