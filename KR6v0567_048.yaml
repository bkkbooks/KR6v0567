body:
  text: 佛學會與實現佛化二十四年十一月在中國佛學會閩南分會講在緣成本會的意義上大家對于本人的過譽之處頂好可以免掉因大家同是在佛法上攜手進行則十方一切佛及菩薩所有無盡的功德與光榮人人都是有分人人都是現現成成的具足各人本身皆即諸法實相故維摩經云觀佛實相觀身亦然依此本性諸佛一切殊勝功德我們現前皆可直下承當與佛平等一如無二無別於佛於法外更無一切衆生之相可得據於此理則各人現在所歌唱讚歎的三寶即可從各人本性上實現之雖說如此但若求其事實上能與三寶相應則殊非易事了故須依遵佛法歷代所流傳下來之教理與法則探討研究而修習之由理解佛法而修學佛法故有佛學名稱的建立通常謂佛學為內學亦即顯示人人本性當體即是佛若學佛修習即可將本性由體驗到而實現出來故謂之內學雖然在佛學根本真理上本無若內若外若自若他的差別不過依我們常人的思想行為上有種種分別有種種限制便不能與諸法平等一如的實相相應了故應將平常一切嗜好不良的習慣及與平等實相不相應的思想行為改造轉變過來使之與平等實相的真理相應才算是真正的學佛佛為一大事因緣出現於世說了種種言教亦即要人依之研究學習而實行實證俾各人的思想行為走上正規而已故欲佛教能真正建立在人世必須於佛學集合同志研習而發揚之實為現在事實所需要中國佛學會閩南分會的組成亦即是適應此種需要現在中國各處因各種的需要已有各種佛教團體的組織其名義亦殊不一致中國佛學會民十八在南京組成的承此系統而起的團體便是現在上海及閩南等的分會但所以要組織佛學會自然有其重大的意義這就是要集合研究佛學的同志把佛教的真理加以窮究探討同時觀察時代潮流人類根性之所適宜而發揚光大之使佛學真理與時代的新潮流相應猛進成為新人生所必需的學問固不僅與一般佛教團體相似只顧保守或維持就算盡了職責由是可知在中國佛教會以外另有中國佛學會來研究探討真理適應潮流樹立佛學實是實現人間佛教建立人間淨土基礎的運動因為現在要建立佛教不是浮泛不切實際的舉動所能勝任奏效是要向人群中從事實際工作然後才能實現人間淨土的負有此等重大責任與使命故不是向來舊有的殘餘無精神的佛教團體所可做到須有健全的新組織集合健全的知識份子認真地共同來探求得佛法的真理然後隨時代潮流而宣揚發展使佛教成為人類所適宜所需要的佛教故有佛學會的産生由此可知佛學會之責任重而且大了建設人間佛教改造人間淨土宣傳已是好久了但若沒有集團去從事深切地研究真理則所謂人間佛教或淨土終不能實現而祇是成了一種空喊的口號說到這裏本人覺得非常慚愧和悲哀因為把事實拿來和理論一比較百千萬分不曾達到一分的確已成了空喊的口號我們不必從遠的大的宇宙方面說就拿現前這個人類世界來講社會與社會之間國家與國家之間民族與民族之間以及人類所有種種階級不平等之間充塞著種種仇恨爭鬥和殘殺人生的現象是如此惡濁可見佛教的真精神並未能灌輸到人類的腦中成為人類一切事業主動的精神不然現在的人世何以不清淨而惡濁人類不但不快樂而且充滿著憂悲苦惱呢在這社會惡濁人類痛苦的狀況之下佛教的真理與真精神能否解除人類的苦痛能否改造惡濁的社會使之變成清淨和平快樂的世界若確知佛法有此功德足以救濟人類的痛苦能研討出真理從事建設人間淨土而事實上偏又做不到這是何等使人慚痛的事不僅此也即現在賴以代表佛教三寶的寺院塔廟和僧衆也好像只是殘留下來的軀殼即明知歷代傳流的教典中含藏著一切功德而不能應用於實際上來解除人類的苦痛并且連自己的軀殼也還是支離破碎得不堪故向來所宣傳的建設人間佛教實現人間淨土就是要在百千萬分中做到一二分亦須賴佛學同志去把握得佛教的真理而觀察人民與人民間乃至民族與民族間的種種病態投以適宜的法藥而救濟之方能發生效力故講到佛學會同志們就應該格外負起責任同時要對人類的痛苦而發大悲心對自己的做不到而起慚愧心由慚愧心而起勇猛心如此把握真理犧牲布教則創造人間淨土佛化人類庶有實現的一天上面說過佛教真理能解除人類的痛苦能與諸法實相的真理相應的確能把人類的痛苦連根拔去的因佛體知到諸法實相的真理說明若色若心的諸法皆從衆多因緣集合而生成無固定之自性而人類間所以有仇恨爭執的病其徵結即在於自我若了知內根身外器界都是衆緣所生其中沒有單獨孤另的個體存在離衆緣自我不能成立則對於功利爭競的觀念都可以淡泊而至於完全消滅決不會犧牲別人的利益來實現自己的欲望這完全要靠通達諸法實相的真理改變吾人不善良不公平的思想成為善良的公平的思想則從行為上表現出來的就是慈悲互助的相濟相成的其結果就可使社會安寧世界和平但我們的思想與行為向來都是與實相相違背的使之與實現真理相應一時是很難做到故須於平常行住坐臥起心動念之間用深切修養的工夫從一切事事物物上皆能觀察到緣生無自性的道理則人與人之間互相殘殺自可消除而成為互相扶助相濟相成要注意的所謂修養改造人性思想並不是離開人群不做事業而閉門修養若離了社會人群而修養則一入於社會人群中仍談不上相應這種修養根本是不兌現的故須即於日用行事上把自己的身口意三業修養成正潔無疵學大乘菩薩積極救世的精神深入社會人群中發大悲救苦之心以犧牲自我利益群衆為前提能如此做去則社會自然寧靜人群皆可安和這個世界便成為十善的大道場何患人間淨土不實現呢末了還希望各位會員能把握得諸法實相的真理學習修養而應用于行事上儘可以廈門的十字街頭做我們修學佛法實現佛化的道場十一月二十三日竹摩記見海刊十七卷一期
