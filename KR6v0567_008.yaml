body:
  text: 對於學人之訓辭十三年秋在武昌佛學院講本院續辦第二班開學今一月矣本院之宗旨雖與諸生言之累累第限於時間未罄欲言今再與諸生作一度之叮嚀本院之建設與從前之辦僧校逈異彼為抵禦侵佔計而模仿學校制余痛學校之惡習與不能注重學識普及之叢林始有佛學院之產生佛學院創辦之唯一宗旨一仿照叢林制度組織普及僧俗修習佛法之學院二仿照學校課程使容易造成適應現代宏法之人才然而僧俗群居賴以保持秩序訓練精神唯在規則故本院管理統取嚴格又學佛者首在戒奢侈故本院衣食住三均取清苦淡泊之風此為佛學院取法叢林期改良現今學校放肆之風尚而亦恢復固有之簡單生活也如是遵循進行始有行解相應之希望宏法利生之能力否則為社會之蝥賊佛門之獅虫而已近閱華國雜誌一年十二期載有餘杭章太炎先生發表之救學弊論與余辦學之持義多相吻合願介紹其義於諸生靜察中國現代之學校得二現相一好奇詭即于一偏附之事義而申之至再至三聳學者之聽聞致一時之榮利側徑灰塗競異鬥勝不從平易切實為根本之務此中國年來之學說所以為形式的發達非實際之進化也二尚奢華夫人生之需為衣食住而奢華者則衣必美麗食必珍饌居必廣廈甚至狗馬飲梁肉土木被文繡求學者之要求如是辦學者之設備亦如是此種習慣寖漸成性旋歸家庭或服務社會遂囂然惟物欲馳務而敦厚淳樸之風失侈靡輕浮之俗成此明達者之慨歎莫置者也章君痛現代學風之窳敗思有以救之其救之之方法首曰士先志不足以啟其志者勿教焉可也誠哉斯言不但為今日迷夢學者放一炸彈亦已為吾佛教徒撞一警鐘蓋六書會意士心為志凡作一事必先啟其志若教者不足以啟學者之志則於學者不能有所施教勿教可也學佛者之志即菩提心換言之即求得普度法界眾生之無上正遍知學佛者而忽乎是則等于歧途迷方盲者摸象縱研八萬法藏亦是迷影逐塊故學人必先啟發大悲心以求無上智慧作救濟之大事業乃可以言學佛昔善財參諸善知識皆曰吾已發菩提心學菩薩行者正以此也他如獨善其身以求小乘解脫已非佛之本懷下及徒慕虛榮以求名利恭敬者尤非學佛之志亦悖余創本院之宗旨也蓋此種種悖理惡習非僅愚者如是即不達佛法者亦往往存此觀念可深惜也諸生在未學將學之際當立定志願以植其本乃能致遠本之不立而外是務匪特無以策一己之學亦將為人群之蠹量非來學之初心也余於諸生觀其志之蓄而未起與起而未當者本聖言量以救之大悲心以發之志堅則根固直至菩提無委曲相夫學佛志願在小學不能講在未學佛者無須講諸生為學佛之大學生宜有以立其基而實行其所聞故章君又曰尊其所聞則高明行其所知則光大不足以致高明廣大者勿學焉可也寥寥數語足為學佛者之針砭故學佛時必知大法無邊有仰之彌高鑽之彌堅之概乃能日進高明同時當知佛學為人必需非如怪誕小說之聊以怡情悅目而不見諸行事體諸身心也故佛有戒定慧三學行此三學始能放無漏之慧光若單學瑣末徒事巧逸不足任重致遠勿學可也故學佛必尊其所聞起行必循其所學當代學子群好奇特徒慕虛榮而欲達於高明光大者未之有也但高明光大之學雖從尊聞行知而來尤以立志為先故蕩失其志者淫佚奢華情逸成性順逆牽心逐波流動欲致高明廣大者可得乎故必淡泊以明其志乃能甯靜以致乎遠諺云生於憂患死於安樂玩於物喪其志諸生勉乎哉諸佛菩薩無不從苦行進修近來有德諸師一一皆以勤謹樸實律身不是一番寒澈骨怎得梅花遍地香此也余既痛佛教徒之無學又傷學校之惡習太多思有以易之而創本院惟望諸生於行持學解中真偽看清苦樂認明然後策勵精進以期達無上菩提之志眾生幸甚余亦與有榮焉滿智記見海刊五卷十期
