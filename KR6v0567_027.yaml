body:
  text: 存在僧僧羯磨三十五年八月在焦山中國佛教會會務訓練班講主席各機關代表各來賓各教職員各學員今天在焦山與各學員見面很是歡喜但我近來因病了幾年現在還不能大聲多講話但在這難得聚會的機緣又不願錯過所以扼要的講幾句第一點凡一切存在的事事物物可以說都是因緣和合而成所以凡是存在的都是集團都是會比如大的每一太陽系地球國家民族宗教小的一蟻一微塵乃至分析到一粒一粒的原子電子無不是因緣和合而成的團體在化學物理學上曾講到原子由若干電子集合而成亦如一太陽系然而一切集團又都是生滅相續而存在的因為都是因緣和合生滅相續的所以沒有固定的自性故名之為空這種空無自性的事物是互相普遍互為關係著的每一存在都是盡虛空遍法界無邊際可得亦無中心可得所謂無邊無中反之亦即每一法都可為中心都就是邊際同時每一剎那的存在都承前無始引後無終而每一剎那又就是過去的結束未來的開始故一切存在無始無終無中無邊即始即終即中即邊由此一切存在都是集團的存在每一集團都能展轉盡一切法的關係此并不是佛菩薩神通變現亦非任何大力者所創作而是諸存在法性本來如是所謂事事無礙法界就是事物的本相只要觀察體會便得明了故云隨拈一物皆即法界一色一香無非中道存在的既然都是和合相續的團體則每一團體裏面的分子可以離開出去而外面分子又可以參加進來離合錯綜而成新陳代謝而住這次我們辦的中國佛教會會務訓練班要點就在辦會大家能觀察到一切事物從極大的到極小的都是集團都是會離了會一切皆無凡一件事物若將內外各方面的因緣關係都斷絶了就不能存在連一剎那間極微小的亦不能存在即能證見我空法空體會華嚴所說一多短長的事事無礙了第二點僧的本義即是衆在中國三人以上為衆而佛教中要四人以上方可叫做僧以五人為一最低單位的僧方可合法辦理僧事現在民主國家民權的施行中山先生所著民權初步甚與僧義相合僧要五人方能成立作諸僧事民權初步亦要五人方能開會議辦一切民事僧衆又名和合衆有六種和合義如身和同住口和無諍意和同悅是團體精神生活的一致利和同均是物質生活的平均還要戒和同遵見和同解行為思想信仰共同和合就是團體生命的延續不能和合則團體就要夭折僧是出家衆具足應稱出家入僧消極方面脫離解除了家屬及私有財産積極方面就是投入了和合大衆的僧團皈依三寶我此身心別無所屬專屬於僧只有僧團沒有個人出了家若仍自私自利不為僧團即仍未入僧數縱然脫離家族産業的一切亦不過是獨身的個人入了僧的人要以簡單朴素的生活來實踐佛陀的法律方能成為利和同均乃至見和同解的清淨僧團倘出家而不明了僧的真義不實踐和合的行為那就失掉了僧的精神若更以一菴一寺為家執持營私則出一家又入一家離僧的真義更遠了要以僧團共同的生命為第一生命至於個人菴寺都要屬於大僧團生命中要充實而且發揚大僧團生命不因有自身自寺而使生障礙影響僧團如能有利於大僧團即犧牲自身自寺亦應為之現時佛教衰落尤其中國佛教更衰落要振興佛教必須充實且發揮僧團的力量中國因宗族思想濃厚影響到佛教亦成為一菴一寺變相家庭徒子法孫的制度此種現象明末清初以後逐漸加盛最為近代佛教衰落之要因現在佛教會基本單位是以縣為單位一縣之中出家者都各有小菴或參學住持的叢林如各守其私就影響縣佛會的健全要能超過為一寺一菴的心量而力為一縣的佛教會縣佛會遵照省佛會的指示辦理省佛會又受全國佛教會的指揮為基礎所以同時還要將力量貢獻到省佛會乃至全國佛教會如總會有所提倡各省會縣會就要努力遵辦在民國初年我曾作過整理僧伽制度論對在家信徒的名佛教正信會出家的則名佛教住持會以僧就是會了現在就普通習慣稱佛教會並容信徒參加但仍以僧衆為主而信衆則為協助故今後要以全國佛教會為已出家入僧的人第一生命其餘皆為充實及發揚此大生命僧而起的事第三點會務訓練班關于來受訓的人是以辦理分支會會務為目的所授的有公民常識法律常識會務技能的文牘會計等各種實用課程大家應接受各教師的教誨去實行推進并將推進時所得的經驗隨為補充我今再從佛法根本上來說明會務已入了僧即不分公生活與私生活出家以後所有關於個人的生活都歸合在公衆行動之中如比丘戒菩薩戒的戒本只是規定的綱領條文其詳則在數十卷的廣律中各種僧事無所不具大如說法誦戒小至喫飯睡覺沐浴更衣出入往還及大小便利等無不有軌範可依最普通貫徹於各事的精神即僧羯磨即五人以上之會議羯磨譯作業作業即辦事僧團辦事名僧羯磨在今日切實言之就是辦理會務故本班亦可名僧羯磨訓練班僧羯磨的舉行最少五人例常務會多可二十人例理事會再多則無限量例會員大會本來僧團是有組織有紀律的但現今佛教衰落反不如天主教的組織完密天主的神父也是出家的但他們系統嚴明一區有一區的主教一國有一國的大主教而全世界則有羅馬教宗近來學者考據他們原始是仿佛教制而組織的故我們要適應現代環境亦須恢復原有僧制以一縣為一小區一省為一中區全國為一大區將來再聯合全世界成一總會將佛教的大慈大悲遍及世界人類普利一切衆生都要從發揮僧羯磨的精神作起塵空記見海刊二十七卷第九期
