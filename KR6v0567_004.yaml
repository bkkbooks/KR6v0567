body:
  text: 佛之修學法十六年一月在上海尚賢堂講一佛學之根本精神甲獨立與發展自覺的一絶對獨立之特德二無限發展之自由乙和合與增上覺他的一緣起性空之和合二相應互資之增上二佛學之特殊性質三修學之適當態度向來佛教內有所謂學佛與佛學之二語學佛者謂依佛所説之教法實踐修行以期證悟佛之知見而佛學者即講明佛自所證之萬法真理實則凡學佛者必先了解佛學之真理然後學佛始能貫徹實行欲貫徹實行必先究明佛之學理佛之學理非如哲學空談理想難成事實亦非宗教假定一尊使人崇拜以求解脫乃依法界萬有之真相實理方便解説毫無謬誤使迷昧衆生依之修學以解脫世間學説哲學科學神學等所不能解除之痛苦使達到人生真實平等自由之幸福故佛學所以可寶貴者在乎使人得以實證而佛學所應注重者則又在於依教修行若認作哲學研究以供求知之欲望則失佛所以説法之本懷矣蓋諸佛出世説法度生意在使一切衆生咸皆成佛故所有言説皆講明成佛之方法使信佛者依之學習以修成佛道今此標題云佛之修學法者意指佛當時修學之法而又表示今人學佛於佛所説五乘法中應以何法為學佛可以修習者但欲講佛法必先信有佛佛者乃覺行圓滿者之義即指已得無上正遍覺之人曾有釋迦牟尼在此世中修行成佛説法度人號稱佛教其能詮教即現在流行之三藏十二部其所詮法即宇宙萬有諸法緣生之真實理吾人若能實行修證此真理至於圓滿者亦即名為無上正遍覺之佛惟在未成佛以前欲求成佛不可不先研究佛之教法佛之教法共分五乘惟吾人以有限之生命若遊意于五乘之教法深懼難任今觀諸仁者信佛之來意咸欲得一修學成佛之善法故不辭為一述五乘共通修學之大乘佛法大致當分三節一學佛之根本精神根本二字所含之意義乃泛指能為諸法産生之依據者例如樹木若無根本則樹葉決不能生存而精神又為支配身體活動之機關凡百事業之成立皆精神指導身體活動之結果今吾人學佛乃有生以來之唯一大事若不知於佛法中擇取一法以為修學之根本精神決難望成茲就管見所及略述二種甲獨立與發展自覺的世間宗教由探索萬有之本體不得或於萬有之外或隨於萬有之中別執一物以為萬有從生之大本因超出萬有之上具全知全能之用而又不許人對於萬有之大本因稍加懷疑故養成人類依賴之性促成帝王專制之政不懷疑則人類只知保守原有之狀態性依賴則缺乏獨立發展之精神此所以束縛人群之思想而阻礙其進步也惟佛教建設人類於絶對平等自由之上其所言皆提高人類之個性使發展本有獨立之特德與奴於他人而抑制個性之宗教實不可以同年語矣為廣利樂暢演此義復分為二一絶對獨立之特德此絶對獨立之特德在佛不增在凡不減凡夫迷此而流轉生死菩薩悟此而圓成佛道故佛名大覺即覺悟此獨立特別之德性此又不專限於動物凡有形範圍之內所有萬事萬物皆有獨立特別之德性乃至無情之草木瓦石亦復圓滿具足蓋若無獨立特別之德性即不能完成其為物凡物之生也皆各有此性以為能生之因無則決不能生是故此性於人於物極貴極尊而人覺悟此性則可以統攝一切而為諸法之王釋尊生時因悟此性故發言曰天上天下唯我獨尊雲門則曰老僧當時若見一棒打殺與狗子吃此皆各為發揮其獨立特別之德性後世學者不達此義聞説學佛亦仗他力遂唯點燭燒香以求成佛與死守教下以冀悟入者前者衍成祈禱之宗教後者變為哲學之空談此皆由未覺獨立特有之德性而執著文字或盲拜偶像反為此所限制不能成佛昔蕅益大師將出家其舅問之曰若出家必不屑為講經之法師而欲為禪宗之善知識師答曰法師是烏龜禪宗是亡八推而上之則佛亦可説是烏龜菩薩亦可稱為亡八若能從此而悟入則拈一莖草作丈六金身丈六金身作一莖草剖一微塵出大千經典皆不足為奇若不明悟此理則所學皆為枝葉縱經塵劫亦不能成佛故學佛之根本必須覺悟此本有特立獨存之德性方有學佛之資格上述各義頗近禪宗世有不達此理者謂佛法之衰落原於禪宗之興盛故抑禪宗而倡唯識不知禪宗實為佛法之精蘊所寄而又能圓攝各宗而無礙今第二段試就唯識宗而一探此義二無限發展之自由唯識宗言宇宙萬有皆為因緣所生而彼所指之因緣又非於世界之外別有其物因者以世界萬有各各之特別種子為因緣者又以世界萬有各各相互增長為緣蓋因之與緣亦所生法故一切法皆因緣所生因緣又即為一切法此能生諸法之因與關係諸法能生之緣皆具有特立獨存之德性在唯識家之術語名之曰藏識其特德有二一曰攝統性二曰持續性能攝納統一諸法之種子者名曰攝統性因緣中之因即能生諸法之功能未發現者亦名種子萬法之種子皆含納於此識中故名藏識能使剎那生滅之諸法在此生彼滅彼滅此生之中得永持以連續而不斷者曰藏識之持續性今此所云獨立特有之德性者即此識中所含藏能生佛果果指佛身佛土而言之不共善性一切衆生各有藏識而藏識又各有此攝持性故無論沉滅三途而獨立特有之德性皆不能遺失不能破壞往昔諸佛因覺悟自他皆有此獨存之德性故自述其所證悟之方法以教化一切衆生使開發本有不共之特德出離世間之苦惱達到永久安寧之目的所以有吾人今日所從事之佛學出現于世故吾人學佛之根本必須悟此獨特之德性方能向外發展乃不受環境之所支配而能改造環境獨身衝決一切障礙而享受自在法華經云我為法王於法自在是即我佛當時打破環境而改造環境之明證禪宗亦云魔來魔斬佛來佛斬此所謂沒量英雄蓋天蓋地古德有言轉得大地山河歸自己轉得自己為大地山河其自由發展之精神為何如哉世間諸人每因環境所障礙而失敗學佛之人又多為佛法所障礙致未能成佛推原其故則由於缺乏此大雄無畏之根本精神故祇成委靡猥鄙之不智的弱者乙和合與增上覺他的將述此義復開二分一緣起性空之和合宇宙萬有諸法世或言上帝造成或言大梵天生或言地水火風生或言陰陽太極生或言化學元質生或説由虛空生依佛所説世界諸法凡是有的無論一事一物皆衆緣集起空無自性唯是衆緣和合相互資助而得生起比如眼識本能見物若生盲人雖有眼識亦不能見識喻如因根喻如緣有因無緣固不能生有緣無因亦不能生故一切法起唯緣起滅唯緣滅無有一法而能獨起獨滅者何以故本無離絶餘法之此一法故一切法各有其因則無外道一因不平等因之過因復待緣則無離絶餘法之外而有能生此法自性之執無外道固定之自性所以能衆緣和合而生起所以能各變各緣而相似一此不獨佛説為然即莊周所謂萬物與我並生天地與我為一亦冥契緣起性空之真義二相應互資之增上佛教立四緣一曰因緣二曰增上緣三曰所緣緣四曰等無間緣第一種因緣即能生諸法之親生因下三種皆緣即與諸法相應而相互資助之緣一切諸法之現行也除直接能生之親因復有互相關係互相資助之疏緣色法有與色法之相應互資心法有與心法之相應互資乃至色法與心法之相應互資情界與器界之相應互資自身與他身之相應互資自心與他心之相應互資自地與他地之相應互資佛界與生界之相應互資推而至於世出世間法無一不有相應互資之義但須兩法以上方能相應助資何以故對待而生故譬如今人講國際互助主義必須彼此皆有特立獨存之國家方有互助可言即念佛往生亦因凡夫與佛皆具有獨立特存之德性故能互相關係互相資助否則佛亦不能度生生亦不能見佛諸佛菩薩由悟緣起性空之和合故能等視有情發無緣之大慈由悟相應資助之增上而發同體之大悲以滅度一切衆生而圓成無上菩提是故學佛之根本必須有此和合增上覺他之精神也近來學佛者失此根本之精神故祇成涼薄偷惰之不仁的小人二佛學之特殊性質三修學之適當態度唐大定記見海刊八卷十二期
