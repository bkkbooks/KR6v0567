body:
  text: 人人自治與世界和平夫和順者樂平穩者安安樂者人生惟一之幸福亦人心無上之要求也然自有人類之文史以來就其可考者而計之橫亙西東豎極古近所謂和平安樂幸福者徒見之詩歌想像雖無一日不在人心要求中卒之若即若離愈趨愈遠未嘗有真享和平安樂幸福之一時其似是有之之日又即為不久發現滔天大禍之所在致惟留一治一亂福兮禍倚禍兮福伏之迹何哉世界和平安樂之幸福終非人類之所能有耶抑求之之方法有未善耶持此以詢之人人僉曰是必由求之之方法有未善焉耳然則請及今而討論其方法古者嘗有謂人類之常在於君臣父子夫婦兄弟朋友五倫其根本則又在乎孝悌求聖君忠臣於是求賢夫良婦於是求嘉朋益友亦於是由子孝弟悌而父慈兄愛而君仁臣良而夫婦睦於內而朋友信於外則國之治與天下之平人類之和平安樂幸福舉無餘事此以家為本而求之者逮乎一轉而入於戰國世若挽近咸改求和平安樂之福於國有所謂國家主義帝國主義憲政主義軍國主義法治主義等等至於今日又為圖窮而匕首見之時矣於是又改求之於社會如所謂平民主義民治主義社會主義共産主義等等為一世人所驚心駭目之新思潮是也總束其目的之所在要不外求世界和平人類安樂之幸福而已然求於家為根本之五倫與求於國為根本之三權均瀕於敗矣茲改求之社會果有濟歟同為生人同有願世界和平人類安樂之心既不忍睹治亂因循禍福倚伏以終古又觀從古及今紛紛然以求之者其方法皆有所未當恐終不免陷入治亂因循禍福倚伏之漩渦遂不得不有所貢獻以冀有志世界和平人類安樂者察焉竊謂國也家也社會也雖有廣狹深淺之不同其為人與人聯合聚集交互相對關係之外緣則無異故其根本厥唯是人人人之受施雖必有一部分形成於國家社會然同時須知人人之言行亦必有一部分影積於國家社會其所謂能形成人人之外緣豈他物哉即人人言行互相聯聚之影積耳故國家社會皆為影而唯人人為形欲正其影須端其形乃至欲化除家國之影而唯留社會之影亦必從人人之形上化除之形在則影存但欲從影撲卻之徒勞形而亂影耳然欲知形之端未端可鑒之於影之正不正見影之不正而悟形之未端端其形焉影即由之而正此即外緣熏發內因而成端正之效者也今見家也國也社會也種種不良欲改造焉以求遂和平安樂之願猶之不端其形而求影之正終不能獲故人人唯當改造自己斯可此義無以名之名之曰人人自治主義此義云何即佛教之三聚正法也茲分述之於下一攝律儀法常人之發之於意表之於言現之於行者要皆不知不覺中隨情習而妄動躁亂放蕩無自主之力若能有自覺心覺悟自體本來真淨離過絶非為尊重此本來之人格故於垢污之行如殺盜邪淫等於垢污之言如妄言綺語兩舌惡口等於垢污之行如貪瞋癡等能內伏其情識之因外不奪於習俗之緣制之不起令得離盡然後意之發言之表行之現皆合自體本來真淨之律起居眠食語默行藏無不具溫良恭謙謹嚴隆正之儀此為調治身心自體磨礱光明使更無幾微瑕疵乃世界和平人道安樂之基也不於是而定其基也無論用何方法皆不能藉收良果且往往利未見而弊已成因雜毒之行決不能成純善無過失之事也二攝善德法身心之自體既入真律而成淨儀遠離過惡永絶罪非於是乃可為衆善之根萬德之原若本人若社會若身心若世界若國若家若教若政凡足以啓發善利增長功德之事靡不興崇精勤力行以修治一切勝善功德令得圓滿約之為三種心一正信心求真理之信不為變幻事狀之所迷亂求善友之信不為矯偽流俗之所傾蕩求公衆之信不為偏私意氣之所搖奪於是而大其智勇二慈悲心樂人之樂而施其樂苦人之苦而拔其苦於是而博其仁愛三喜捨心喜助衆人之得善利不生嫉妒捨除自己所有德色不起驕淫於是而保其福和大福大慧大仁大勇充乎六合塞乎兩間天見其光地見其明而粹然為人中全人此為向上之至而實人人行履之所能到三攝衆生法上來由自利利他而進之以純粹利他惟以濟群利衆為事但觀如何能饒益群衆即由如何之道以饒益群衆不存己見不拘定法約之為三種行一治救護行若救放生命彌息戰爭化除殘暴安寧良善乃至導人人各得解脫人群一切困壓束縛而成世界和平人類安樂之幸福蔑不是也二治利樂行若對於群衆育幼養老恤窮濟急等等靡不悉力以赴者是也三治德義行若改良風俗整齊文化啓發智慧發達學術等等凡能使人群進於和平安樂者悉當觀察以順應時機是也之三法皆人人可由躬起行不須憑藉故謂之人人自治之道世人果能身體力行乎此展轉熏陶全球洽化則世界人類未有不和平安樂者也惟冀愛和平者擇行焉見覺社叢書五期
