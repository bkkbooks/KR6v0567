body:
  text: 知識青年僧的出路三十五年一月作近來就學於各佛學院及各級學校的知識青年僧漸漸多起來而內撞寺僧昏腐頑固的壁外撞國人輕蔑欺虐的壁深深感覺得退無可退進無可進進退維谷了但中國的國家社會深深地陷在貪官惡吏土豪劣紳另一群狂匪痞徒土匪光棍的操縱中當政的民權民生主義的設施勢將成為貪惡土劣的假民權民生政治且無論在野的何黨何派起而當政亦必仍為貪惡土劣的政治這是什麼緣故呢因為朝野各政黨雖都有相當好的主義與政策和少數正潔的領袖人材但是從鄉村以至都市充滿著土劣貪惡任何實際的政治非通過了貪惡土劣不能施行及至通過了貪惡土劣任何好的主義政策在實施中都成了操縱於土劣貪惡的假政治所以若要中國能夠好起來無論如何要由無黨無派各黨各派的公正的知識份子產業份子聯合教導資助著大多數貧苦勞動工農共同意識著警覺著土劣貪惡的毒害自身困死餓死也不肯變為土劣貪惡并專以貪惡土劣為革命的對象堅毅強勁地巧妙婉委地漸漸根治盡絕附於國民背上的土劣貪惡癰疽然後當政的民權民生主義的政治才能實際施行才能走上建設現代國家社會的大路由此知識青年僧不用對腐惡的寺僧和國人歆羨或驚怖須知這都是在貪惡土劣操縱下使然只要認清了土劣貪惡的革命對象加入公正的知識份子產業份子正當工商企業家和貧苦勞農聯合陣線勇猛前進則以無室家之私的青年知識僧無疑在公正知識份子中可為最公正最強毅的知識份子待土劣貪惡一經肅清現代佛教也隨現代國家社會而湧現見海刊二十七卷第二期
