body:
  text: 正信會員每日必修之常課正信會員應以受三皈以上者方具有會員資格曾受三皈者每晨一次或每晨昏二次必應恭敬供養修三皈念誦法如下甲慈宗者一皈命儀第一皈命教主釋迦意觀釋迦世尊為根本口稱弟子某姓某法名依某某親教師故皈命本教主釋迦世尊身端立合掌徐徐五體投地一拜第二皈命常住三寶意觀口稱弟子某姓某法名依某某親教師故皈命十方常住佛法僧身同前一拜第三皈命宗主彌勒意觀口稱弟子某姓某法名依某某親教師故皈命本宗主彌勒如來身同前一拜二讚持儀合掌跪誦或立誦彌勒菩薩法王子從初發心不食肉以是因緣名慈氏為欲成熟諸衆生處於第四兜率天四十九重如意殿晝夜恆說不退行無數方便度人天南謨兜率內院一生補處當來下生彌勒如來南謨彌勒如來四十九聲或百零八聲或千聲坐念或經行念三回向儀南謨彌勒如來大悲攝持願資現身修增福智一拜南謨彌勒如來應正等覺願與含識速奉慈顏一拜南謨彌勒如來所居內衆願捨命時得生其中一拜乙蓮宗者彌勒如來改為阿彌陀佛讚持儀可照普通行儀改之回向儀亦改為阿彌陀佛可也見正信二卷十一期
