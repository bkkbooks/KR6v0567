body:
  text: 對大師學生會籌備員之訓勉三十一年一月在漢藏教理院講為我的學生從四方面學一修行這中間包括聞思修慧由聽講研究靜坐思惟以至於根據六度四攝之原則表現於行為上者都屬之二講學如法會講經或學院授課乃至著書立說翻譯流通等皆是三用人一件較大的事不是那一個人可以成功的必需和合各種才能不同的人所以要有團體的組織並要有領導的人善能用人最重要的能自知知人四辦事佛教的事亦有多方面的如學院僧寺等往往與政府社會發生種種關係若遇疑難的事要有判斷力困難的事要有忍耐力觀察於法於眾有益的事務須任勞任怨去處理應付不可畏縮如於法於眾無益者勿為虛榮私利和人爭持不捨以上四事各人宜時時對自己反省對他人觀察於上四事中長於那種或短於那種互採其長以補其短切不可以己之長而驕人亦尊重他人長處而勿生嫉忌對他人短處要原諒而不輕視自己短處要自勵而不放鬆可以改正補充以此種精神為和合同事之準則則機緣一到將來許多佛教的大事當可必成在我的意境上向來是以全國乃至世界人群佛教為對象攝受的人非常廣泛覺得無論什麼人都有他的用處的比方說魔總算最不好的然在佛的法會中他有時亦發心護法八部護法眾中連餓鬼畜生的大力分子都在內所以在我的看法上只要用之得當沒有一個人沒有用的如有些學生還了俗甚或跑到異教中去只要對我或對佛教的信仰沒有完全破壞也可借他將佛教輸送到異教裏去達到佛教細胞深入社會各階層之最高目標所以只要能有集中的信仰精神攝持力不管親疏近遠在有秩序的系統組織下以整個世界人類和佛教為對象方能人盡其才才盡其用好將我此意從組織學生會而貫達得到我的各個學生福善記油印單張
