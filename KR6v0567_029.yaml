body:
  text: 峨山僧自治芻議十九年十月在峨眉縣佛教會講一峨山甲僧自治會二僧自治之入手三合山僧徒應有時代之覺悟四地方官應當扶助與護持五結論六峨山甲僧自治會大綱佛法乃是佛所得的諸法實相惟佛與佛乃能究盡而且圓滿菩提歸無所得既無所得即不可說此不可說亦即諸法之本來面目為人人本有個個不無而非向外馳求的處今日之世界中欲建立佛教令佛教有繁榮發達之可能殊非易易因社會人士已多數誤會佛教為迷信僧伽為廢物常豫以重大之打擊佛教前途甚覺悲觀今欲佛教常住於世須靠一般深明佛理之僧伽能真實依佛法起大乘行且能博施濟衆將佛法作適應時機之宣傳令社會人士對佛法有相當之認識方足以保其餘緒發揚而光大之今觀我僧衆雖對於宏法尚無何等施設猶存勤苦淳朴之風加以峨山之雄尊深秀誠可為住持佛法之最勝道場因此興起了許多感想茲乘機會提出幾點與諸君討論之一峨山甲僧自治會此次在省曾聞劉軍長等頗希望峨山僧衆能自為振作一方深修佛法一方發揚佛化到社會中去因佛法不是專為自利而是特重利他的故我深望峨山僧衆對於佛法有真認識能和合本山外來的僧衆與峨山相需相關者就峨眉縣之峨山甲區域內有一峨山甲僧自治會之組織其目可分為十甲僧團之保安據今所見到之僧團即可為僧自治中之一事保護峨山甲地方治安即為峨山僧所應作事但更能精深訓練使來剃度沙彌均須服務半年則即為能以無畏施於本甲民衆者亦就是修菩薩施度之行尤符國家建設根本在地方自治之義至於團員任期之長短名額之多寡當因人取材體時察勢而定乙寺僧之整治全山寺院僧衆之規制亦應由僧自治會為之整頓務令依佛教之法制適於今日之國情至於各寺院之繪塑佛菩薩像等亦應根據佛典其不合時代信仰之神像酌豫取銷以杜外人之攻訐丙僧徒教育昨在毗盧殿見僧學之設立見山中長老亦曾注意及茲但施僧教育與普通教育不同應專注重養成持律弘教之僧寶就峨山僧衆可分三種一十八歲以下沙彌不得認為僧伽在此童年時代當教以小學中學常識及初步佛教常識使養成將來可發心為僧的資格並特教以峨山之歷史地理及山中之農林實業等之實習以為改造生活之基本二十八歲以上已受沙彌戒成為僧人者可施與佛教律儀及佛教教理之教育以造成住持佛法之僧寶資格三二十歲以上以至年老之人已受比丘戒者亦須施與簡略之教育使對於佛法有相當之了解然後依此自修化人方不致誤以上三種教育施設時不應過於嚴格因峨山為朝拜之所當抽出時間以資應付幼年青年者每年可施五六個月之教育年老人因擔任事務過多每年只能施與兩個月之教育而注重教以應香客遊人之詢問如佛菩薩之事蹟及各寺院之歷史古蹟等丁實業之興辦添香化緣認為佛教中之方便亦無不可但不能即以此為資生之所需就峨山之農産森林等在在皆可改良發達即如衣物之製造房屋之建築形像之繪塑等各種工業亦應出自僧手至於商業可採合作社之辦法將本山産物統歸合作社代為發行而各寺院應當需用之物亦均由合作社向各處採辦以原價分售與各寺院此皆菩薩工巧明之事亦所謂資生事業皆不違背實相而生活之困難即可解除矣戊交通之建施山路崎嶇行人殊感困難致香客遊人不如普陀九華之盛若本山僧人能自動修築康途而轎竿背架加以改良增設則香客遊人日必增多矣己災病之慈濟峨山氣候層層不同外來遊人香客容易生病對於醫藥養病院等皆應設備使朝山之人不為病魔所困且可藉此招納避暑養病之人以相資益此亦菩薩醫方明之一種再加以救災救貧之慈濟以發揮佛法大悲方便之功用庚教化之傳布對於朝山之人應向之宣傳佛化在當路各寺院中設布教所至山下之分院與民衆相接近之處更應設布教所小學民衆學校通俗圖書館等顯揚佛法使近山民衆受佛化之薰陶更於本山適中之點常常講演庶幾社會人心有補益則佛法可期宏揚寺院不虞坍毀也辛古物之搜陳山中古物應分別清楚於適中之點陳列保護如雕刻碑碣與名人所書之經及名家之字畫等皆應搜集陳列以資研究探討其須各存原處者亦應與搜集者一一映成照片以廣宣揚使來峨山者樂而不倦壬勝蹟之培修本山形勝名勝之聖像如古塔奇洞幽谷寶掌靈岩豬肝龍門應有確切之調查認真之培修以資保存而彰美勝亦仍用照片宣傳贊揚令峨山名勝影響於全世界人士之腦海使不期然而來日形踴躍亦因勢利導之一種善巧方法也癸科學之建設待將來物力充足當進一步而為科學之建設如峨山頂上飲料最缺雖有白龍池井其水亦不甚敷飲而各寺之光線亦不充足故他日應有蓄水池發電機及運輸機汽車路等之裝設以資營養而便工作以上十種辦法並非信口開河動人視聽曾憶於民國十四年遊日本之高野山其山遠不及峨眉之高大而各種設備可稱完全山中即森林木材之生産每年達百餘萬元僧人之生活與國內外之布教等咸資於此聞每年政府之稅捐亦有二十餘萬之巨能仿此進行前途何可限量二僧自治之入手約分數項甲上來各種施設皆應由僧自治會著手去辦但默察峨山各寺院派別分歧頗不相能應由諸寺長老擬定辦法呈准地方官長委任正副主席各一人委員十餘人組織一籌備自治委員會籌備進行一切乙辦事機關當選一適中地點以資策應如普陀前寺之類而毗廬殿磚殿新殿居山半腰氣候適中地勢亦殊平敞應合而為一仍用原來之普賢寺名即萬年寺以為全山自治總機關辦理峨山事業整興峨山之大觀丙其進行步驟首應調查峨山全山之屋量及僧人之多寡財産之總額以為設施之根據丁由籌備處丈量之地及調查森林并土質物産之所宜聘請技師為之指導墾植戊設一辦理山僧自治訓練班半年或一年畢業以訓練成自治僧員己籌備期以一年或二年為限限滿即成自治會三合山僧徒應有時代之覺悟我對於峨山各寺僧有所勸告在以前中國舊制能管公事者惟有帝王官吏以及紳士而人民僅顧一身一家而已對於身家以外之事概不關心故僧人亦儘可各顧一身一家今則適與相反已成為人民建設之民國因之各種人民皆有團體之組織以參加社會之政治公衆行事我佛徒如仍舊制恐難生存故應從此打破家族的宗法社會成為職團的國民社會方合時代之趨勢而期佛法之宏揚四地方官應當扶助與護持地方官長當然有清除匪類改善風俗發達商業莊嚴地方之責任而在本縣之民衆藉峨山香客遊人而生活者為數亦多故官紳等對於峨山僧自治事應加以指導督促峨山事若能辦好縣中亦享莫大利益如僧能安居教育亦良必消許多隱患若從積極上來講倘僧人能盡宣傳之能事則國民之道德程度日益增高全山將更整治優美遠方聞風而來者必踵相接而商業日見發達矣五結論前來所講就全山僧衆中選出十數人為自治委員辦理全山事業但全體僧衆應共相團結使精神動作同趨一致方足以應付環境發展本身我向來主張佛法不是空談應從實際上去做方可表現佛法之真精神如上所說種種辦法皆佛徒應當做的且上合於佛法下契於時宜今天遇此勝緣故將我幾日遊山之所得貢獻諸君望諸君起而圖之克全記見西來講演集附峨山甲僧自治會大綱一以峨眉縣所屬峨山甲區域為範圍特設峨山甲僧自治會以為特種地方自治之試辦二該會由該區內寺僧選自治委員十三人至十七人組織之但第一期由主管官署委任正副主席各一人委員十一人試辦之三該會以峨眉縣縣長為監督並敦聘國中高僧為導師省內佛學者為顧問以資策進四該會自治事業概舉如下僧寺規制所僧未成年沙彌少年比丘老年比丘寺大寺為修學或辦公處朝拜處中寺為招待處或專修禪淨處小庵為布教處或自修處僧徒教育所律儀院預科授國民小學常識及佛教初步常識未滿十六歲行童入之每年六個月律儀院授國民中學常識及為養成僧格之訓練十六歲以上沙彌入之每年四個月律儀教理補習所二十歲以上比丘入之每年兩個月寺僧實業所分農林藥工合作社各項壯年比丘之不能辦教務布教化者可作之山寺交通所道路轎竿夫役等僧團保安所僧團已辦但須規定來山為僧者在受比丘戒之前必須充團員半年教化宣揚所辦農村小學平民夜校通俗圖書館布教所閲報所災病慈濟所醫院療養院施診施藥所乞丐感化所災難救濟所古物搜陳所搜集保存陳列映印流通勝蹟培修所調查考證培修科學建設所蓄水池發電機汽車路等五合併萬年寺三殿恢復為普賢寺以充峨山甲僧自治會會所及僧寺規制所僧徒教育所等六大寺如金頂各殿可合併為朝拜處大佛殿為教化宣揚所總機關報國寺為律寺伏虎寺為禪寺洪椿輝為佛寺等七從調查寺數僧數屋量産額土質氣候等入手八其他見海刊十一卷十一二期合刊
