body:
  text: 文武群己事器一致之教育三十年秋在漢院開學訓話一文武一致二群己一致三器事一致四結勸一文武一致我國古來的教育本是文武一致的禮樂書數射御六藝原為文武一致之學書與數是文射在古代是射箭現在放鎗開炮擲炸彈拋手溜彈皆是御是古的御車今即駕飛機開汽車火車等這二種是屬於武的禮樂則通於文武所有人事中的一切賓禮軍禮等一切行動皆屬於禮樂則是絃歌舞蹈動靜調和的平常所謂智德體三育都不能分開各立到了後代一般人日常生活差不多與禮樂都脫離了而學文的則學文或兼學數故讀書人與商人算是文的練武藝與作工務農算是武的由此文武分途學武的多是一字不識的文盲完全與書及數脫離了關係稍為識幾個字懂一點算盤的去做商人也就算是文人了專門讀書的以做官做鄉紳為目的大都為四體不勤的衰弱者所以中華民族也就成為愚弱佛教自元明以來也習成為此種風氣明蕅益大師梵室偶談亦曾講到當時佛教僧徒分成兩部分一種是參禪的如搬柴運水燒火鋤地各種勞作都能去做一種是學教的就只能抱幾本經書去讀誦研究或為人敷講這二種人在形勢上就對立排斥研教的斥參禪者為目不識丁盲修瞎煉參禪者斥研教徒尚空談有解無行這種現象到清代也還是如此所以出家人也成立文武禪教分途互相脫離的樣子各不相關互為非難在這種情形之下住禪堂的連普通信扎都寫不來研教者先抱幾本經書自恃高尚少許行李都請人搬運世間有句俗諺窮讀書富學武比如牧童牛背攻書讀通之後也可以去應考試中秀才乃至中狀元而學武的必須買馬購鞍裝弓佩箭方能應試而佛門僧徒剛剛與之相反所謂窮參禪富學教參禪者只須自擔衣鉢一小包四處可以去參學而學教者就得購經論買筆墨衣物積多行動非雇人不可清季改興學校各地學校隨起也設有體操音樂等科但在中國教育上沒有多大的功用因為清末民初的學校都是兩種因素合成的一種以進學校為作官或作官的門徑這是老讀書的傳統另外一種就是洋教和資本主義者所辦富有洋氣的學校以備學成可以當教堂牧師或作洋行買辦所以我國廢科舉興學校數十年還是得不到西洋學校實在功用且將西洋完全學到亦與我國實際情形不符比如美國已是資本主義最發達的國家中國如何可以仿學他所以仿學他人的往往成為少數貴族的虛偽裝飾品不能發生振興國民之實效譬如體育運動只想造成幾個打打球翻翻槓的運動專家去和別人比賽奪錦標這是與一般學生的切身行動毫不發生關係民十五年東南大學就有反對這種風氣的以運動的目的並非在造成少數裝飾品而要普遍的個個人都實行乃能有效所以後來小學堂就改成童軍體操中學的成年學生就有軍事操每個學生都必需參加如缺席不到須照缺課同樣的扣分故成為人人都須共同學習的普遍行動且貫持以整齊和協的規律並非戲掉囂張的此種情形現今受佛教教育的學生必須注意通常所謂文武一致佛教亦可謂禪教一致禪中有辦事禪能耐勞忍苦辦理各種艱難的事業從前我在武昌創佛學院的時候原有這種趨勢因為舊風習的惰性於運動勞作仍未能與文學和教理融合一致地操練實行這裏也仍是一樣病的固然不多但多數學生是沒有精神萎靡不振從本學期起每晨早殿下來必須運動半點鐘習達摩十二手拳術等中國拳術如少林固源於佛教而武當拳亦由少林轉變而出如回教徒他們有武力能保衛自己和自教近人每謂回教徒無不擅長國術現在既知道國術原出少林僧的我們要把他收回來成為佛教僧的特長由一教職員領導施行至運動時先排隊點名如缺席者照缺課同樣的扣分將基本動作操練過後或加學新者並須整肅沉靜使此運動與修習禪定相近如禪堂坐半枝香跑半枝香就是這個意思修密宗禪法也有金剛拳等若係雨天下早殿後可於殿中跑香亦須整隊點名全體行動又平常所謂衛生都是消極的衛生像少爺小姐般的吹不得風淋不得雨而現在我們中國人及佛教徒則都需要積極的衛生要煉成不畏寒熱暑天能抗烈日冬天能洗冷水粗劣的食品都消化艱苦的環境都能戰勝將身體煉成金剛般的堅實身體健全作事也就容易了原有的勞作一小時天晴則往外作天雨可在院內多上一點鐘課晴時便可做兩點鐘勞作必須認真的做不是裝幌子比方能夠跑山路負薪穀平治道路整理森林能將這些工作做好將來自己主持事務時也能自辦便與禪堂中能勞作者相連接切於未來事業上的實用此於一般教職員也都以共同參加領導為原則尚在壯年沒有到我這樣已是老朽的都要參加練習振作精神鍛煉成文武一致也就是禪教一致工讀一致這是第一點二群己一致佛教之中從前許多講究修行的都偏重於個人或管一家把自己門面作的莊嚴輝皇各人打掃門前雪休管他人瓦上霜公衆之物則任意亂取或損壞縱有愛好之心都不外是為自己如從前的禪堂管衆的執事照顧禪堂之衆人如護自己而禪堂僧衆也同樣的愛護常住敬重執事這算是頂好的團體生活所以宋朝大儒見到禪林生活就説三代禮樂盡在僧家但是從前禪堂的團體生活之訓練個人必須放下一切所謂身心交於常住性命付於龍天説什麼就是什麼如説皂角是地下生的不得答是樹上結的這就是表現不能聽私人的行動我在清季末年常看到由金山高旻出來的禪和子威儀整齊動止安詳言動都很適當入民國便大差了雖然還是偏重個人獨善缺乏顧及大衆相互為用的精神但是在中國也是很希有了現在中國最需要養成愛護公衆的公德心和團體的組織能力道德習慣因為向來是一盤散沙幾個人合攏來便七衝八突不能發生群策群力的功用而佛教之不能復興病也在此因為沒有群策群力的團體作用才受外人無理的欺侮倘是有這種力量的話對外交涉則容易應付決不致常受外人的侵害而學問的修養道德的培植都可仗群衆扶持易得成功希臘哲人論人為社會動物但中國人向來失掉這種功用有些人私德雖盡善盡美一入群衆團體就亂七八糟所以我們必須將個人道德與學問滲入團體中去修習愛護團體如愛護自己使他同我的床鋪一樣的清潔覺到不完善處即刻就去想合理的辦法幫助作好換句話説就大家要有愛護衆人及團體的道德不是單為私己的美德這種心理的養成固然居上位的盡法執行而尤以在下位的人人有此精神其不能養成公共道德習慣的原因都由缺少團體組織和群衆生活的訓練去年曾指導設立本院同學會聞近已消沉務要切實整理健全組織使在院同學有過相規有善相勸發揮私德增進公德對於離院同學常常作種種連絡使本院精神發揚光大孫中山先生的民權初步就在訓練民衆能夠開會沒有受過民權初步的訓練怎麼能夠作成民治的基礎但這在佛教裏面是本有的僧就是和合衆就是有秩序有條理的團體舉行羯磨就是開會議羯磨中的默然故清淨就是表示全體默認通過失了羯磨作用就沒有僧所以須常開會議中國人民向來沒有民權初步的訓練但我們只要把僧羯磨制實行便可民治的國民必要多開會議故不但是中國就是世界各國的政府人民常常都在會議席上沒有會議的習慣決不能成功很好的民治會議的根本精神就要有公德心能常有為世界人類為中國為佛教為本院為公共團體服務的精神有了這種本質表現之於會議議而必決決而必行中國人向來都有會而不議議而不決決而不行的本院學生必須將這些毛病痛改從組同學會切實訓練起來做到群己一致三器事一致有人關於文字技巧上能夠練習於佛教教理不能深究相反地於教理深究的文字又不通順往往辭不達意本院特重藏文和國文學生之中或此長彼短或彼短此長只要及格都還可以若兩種都不好就不及格文字是研究教理宣揚教理的重要工具對於佛教學理要能夠深入貫通更於世間學問要能夠消化融會乃能明體達用在發揚上固須有健全的身體美善的道德而漢藏文字的工具尤應善巧所以工欲善其事必先利其器這是要做到器事一致四結勸你們能有這種修學的機會比前人的緣法好得多像我僅聽過兩三個經期進過幾個月禪堂沒有參加過研究修學的團體只個人閉過數年關於佛學國文之外學過二三種外國文都沒有學成所以都是偏缺不全的在座的張純一先生七十多歲了身體這樣康強因為他每日不間斷體操這是文武一致的好榜樣大家必須作到文武一致群己一致器事一致文武一致的重體育群己一致的重德育器事一致的重智育能夠作到這三點才算三育具備最後還關照你們一句話須照我所講的三點去學不能照我本人去學因為我本是偏缺不全的而且你們學我不容易成縱學成了也不能令中國佛教復興必須照我講的三點都學到乃能復興中國佛教心月記見海刊二十二卷十二期
