body:
  text: 佛法應如何普及今世十五年十一月在上海尚賢堂講今欲謀佛法之普及當先知佛法所以不能普及之原因茲依次說明之一中國佛法不能普及之原因佛法流傳中國其時歷千餘年之久然而不能收普教齊民之效者其原因厥有二端一者禪講諸師之專尚深遠非普通人士所能欣企故其所趨入者僅智慧超人之少數高逸二者君相利用為愚民工具遂流為鬼神禍福之迷信故中智之士皆以不屑研究視之且反施其摧殘之手段故佛法在中國因向來有太高與太低之偏弊故無普及之效二普及今後之方法既知佛法不能普及之原因而欲謀今後佛法之普及則須除太高與太低之偏弊而闡明適應中智之佛法去愚民之迷信而開發其智信使成為人群道德之規範故今後進行佛法之方針即在講明佛法之大概使知佛為世界人生真相之覺悟者非禍福於人之神鬼佛法為正心淑群之軌則非欺世惑衆之邪說以起其正信焉蓋人之所以敢於惡者由惑於唯物機械之謬說間有畏罪而行善者則由習聞萬有神造之遁詞今欲為人類謀徹底之解脫則非使彼有正確之人生觀不為功故宜講明佛教業果輪回之人生觀以為人類行事之真善標準今試比較三家之說于下萬有神造之人生觀唯心論真人生觀之比較自然機械之人生觀唯物論迷業果輪回之人生觀唯神論謬由佛法而觀察人生則其生也由於前世心行之善業引生現有之身至於父母不過為彼生身之助緣而已提高心行之善業而進化為高出人類之天仙或佛菩薩者乃在乎自心因行不善由人類而退墮為地獄餓鬼畜生者亦不外乎自心奉行十善則可由人而進受天國之樂專持五戒亦可獲保人生之報廣修六度萬行則可證佛菩薩之果故講明業果輪回之真理乃可以樹人群道德之根據實踐五戒十善以為人群道德之正行由此正信正行以完成人格則可進為生天生淨土之基本此外若能犧牲私利以作種種有益人群之事業則感情融洽而社會之反動力消必能收普及之效果今之講題意為依何種的佛法方能普及今世人類而無遺而前陳各項實為佛法能普及于今世之要旨其推行之方法宜不出下列之四種一組織完備之教會二設立教育之學校三廣辦慈濟之事業四多作群益之宣傳本人對於佛法普及之計畫略具如此質之高明以為如何大定記見海刊七卷十二期
