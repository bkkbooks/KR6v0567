body:
  text: 論佛法普及當設平易近人情之方便豫讀海潮音十一二期王實居士函所云如煩惱障實以為有生來之要求所不易禁者若必抑之則愈見其熾愈增煩惱以其事實論之恐生死之大事不能易其生來之要求心耳雖有能者奈多數人何此當現在固不能不改張者也然則此煩惱者何即飲食男女之大欲必善處置方能易去不若名利等無追討之來較為易去實有生理上關係固不能虛為禁制而使之時生反應以立異也然不堅持而有愧心則又將影響於進修此實所主兼足正當愛情正當生活而可持永久可以普及之方便而用之以去煩惱障也此其所論雖未臻圓滿要亦確有所見之言且頗合優婆塞戒經之旨也人生欲飲食男女之大欲有生理上之關係不能虛為禁制使時生反應以立異卓然至理名言昔彭二林居士跋袁枚之新齊諧云袁枚徒以甘食悅色之故惡佛之禁戒所之戾己射影吠聲誣天謗聖甘為一闡提而弗恤豈不哀哉夫袁枚猶其劣焉者也近人若梁漱溟者服膺佛法食素不娶且十年比年假遵時救群之説自文飾反佛從儒實亦不勝其婚宦情欲之衝動所生反應以立其異耳夫梁漱溟猶其未精者也又若李政綱者非清季來士夫中學佛之矯矯者哉比年乃倡説佛之實諦與儒同而其權迹則廢事逃禪悖倫苟安不若儒迹之與人情同好惡遂亦反佛歸儒知其隱者仍不外為婚宦之情欲所衝逼乃出而立其異耳噫吾見今之士女其進德猛者每輒受持佛之戒行未幾時則復為此飲食男女之情欲所勝而退墮矣悲夫雖然此猶其居家處俗而未入僧數者耳其不由本願出家為僧者且不論以論其確由本人自志出家者吾所知今僧之出家因緣多有本人在弱冠時慕僧之清淨父母強令婚娶臨娶逃之出家者亦有勉強婚娶不久仍逃出家者其茹素行苦之精篤遠離女色之嚴謹真可令人肅然敬之者不圖八年十年竟有邪淫食肉居僧伽藍遍犯僧戒而恬不知愧者前數年有陳某偶檢岐昌和尚慨歎之言謂寺僧之住持者十有八九犯邪淫載在新佛教月刊圓瑛法師嘗著論力斥其非然岐昌和尚所慨歎為犯邪淫之寺僧豫固知其初往往因逃塵欲而出家者也於此可知情欲之不易除而煩惱之有關生理者或愈抑愈熾也然此猶出家而未切實參學者也嘗聞昔有某禪者住某著名禪堂已二三十年久請班首年已五十餘矣一旦偶遊上海淫欲心猝動而不能遏竟犯淫戒厥後淫心彌熾乃無淫而不犯飲酒食肉終以淫死此其可畏為何如歟嗚呼經傳所載佛本行中及其餘修士之染塵欲而退道者洵非虛語而士夫心知佛法之正故生違異或乍入而旋出與僧中多犯戒行者何莫非不善處置有關生理情欲之煩惱障而時時生其反應之表徵哉故處今日而欲圖佛化之普及則王君所主張兼足正當愛情正當生活之方便殊有不可不採行之勢也然此亦不須於佛之教法外別求方便者其屬於在家士夫者但當於佛法先求信解而勿遽慕行證若晚清楊仁山居士乃純然白衣居士遑言五戒且并一戒二戒未受起居服御飲食婚宦悉遵常俗此則人人可行者而其信解於佛法者固堅卓不可搖奪矣進此則為三皈優蒲再進此則為一戒二戒三戒四戒乃至五戒優蒲此當精熟於優婆塞戒經之開遮持犯固仍以平易近人情為準不唯夫婦居室不在於禁例且給值於妓亦未為犯其所戒之非人非時非處非道之邪淫則皆以維持正當愛情而深符兼足正當愛情之條件者也至於兼足正當生活則此經於常俗之飲食起居宦商耕讀均隨順不違禁其所禁者則專在殺生盜財亂倫欺世及沽酒等惡律儀不過為維持其正當生活而已再進之則當以玄奘法師所翻譯之菩薩戒本為登峰造極其屬在家菩薩則正當愛情及正當生活猶不在遮禁而廢事逃禪悖倫苟安乃適為有犯於戒故在家士夫當深識此其未能入佛法之門者勿因恐奪其情欲裹足不前或故生反對其已入門者亦勿須摹仿僧事惟以敲打磬宣佛誦經棄家廢業離群逃禪為學佛但由信而漸求其解由解而愈堅其信信隆而三皈而五戒而不離常俗婚娶仕宦農商工作之事業以行布施愛語利行同事等菩薩行可耳但官為好官農為好農商為好商工為好工便是行菩薩道至遠離塵俗隱遁山林嚴持律儀精修苦行乃佛別為苾芻杜多所設之行軌不必強以自為拘苦也見海刊四卷三期附覆定如居士函定如居士鑒讀來函欣悉居士與傅團長等在巫組設佛會以揚正法至為欽佩所論素華之書太過火昧昧之説太方便二語確甚足以持正懸衡矣今當即以來書載之海潮音俾閲者均獲中道觀焉惟昧昧所言之方便皆原本於佛法之在家二衆律意及優婆塞戒經立論者行之世亦即儒家之道德將順人情以為調節非放縱情欲也至寬令出家者還俗其反面即是嚴出家者必持戒僧律本意如是欲使僧內清淨必知不還俗而犯戒為恥還俗非恥始可而今日僧中猥濫者正坐恥還俗而不恥在僧中犯戒耳故會而通之與居士意無不符處專復即訊道祺太虛謹復見海刊四卷第六期
