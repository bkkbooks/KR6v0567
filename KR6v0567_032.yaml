body:
  text: 佛教不要組政黨三十六年二月作抗戰勝利後出家的佛教徒與在家的佛教徒建議組織政黨或請領導組黨者亦嘗囂囂然矣然我不主張佛教組黨於本報及答申報記者問等言之屢矣他若大醒等代答不組黨亦非一次今二十八卷第二期海潮音又有梵波君說大師雖然主張僧伽不應放棄國民的責任且應從佛法中圓融廣大慈悲平等的教義以發揮其福國利民的效用但他本身是立於超然地位的特未向任何人作何活動的表示他雖偶爾發表政治的理論引起國人重視這是他智慧的鑒照與悲願的流露所謂智悲雙運他以超人的智慧從靜觀中見到適時應機的真理與實際的方便認為是有益國家民族社會人群的不忍自祕發而為新的政治理論這正是大乘法利益眾生的活動運用所謂佛法不離世間法運用得當一切法皆是佛法絕非捨棄佛法希圖升官發財之政客可比也又我們對於各方關心此一問題者之答覆是佛教徒應當組黨太虛大師可能有此提示也有許多人向他建議但他本人卻無任何活動和領袖的企圖也說明了一部分然此文內但他本身是立于超然地位的從未向任何人作任何活動的表示又但他本人卻無任何活動和領袖的企圖極力表揚我的清高與我捨身為佛教為大眾的態度卻不盡相同我意若弘護佛法利濟人群必須僧伽組織政黨必須我出領導者我必不惜出為領袖而作任何活動然這仍是大乘佛法利益眾生的活動運用絕非捨棄佛法然我不主張僧伽組黨並不出而領導組黨可知不是為組黨恐失僧伽清高及為表示個人清高不出領導組黨而別有其不要組黨的原因在我嘗提倡僧伽議政不干治亦曾指導僧伽參加鄉區代表縣省參議國大代表之競選但我主張僧人以國民立場的公民資格競選並由僧眾會員為主要份子之國省縣三級佛教會的人民合法團體宗教團體是文化團體或自由職業團體而發動故用不著另組政黨若組佛教政黨以出家僧徒領導主持歟以在家信徒領導主持歟前者則無論僧徒政治的學習經驗均不夠條件即令學習經驗條件均夠但組黨僅參預人民政權做議員歟亦參預政府治權做官吏歟做執軍掌政司法的官吏則非復宗教師的僧侶做僧侶則同時不得是官吏猶之做自由職業的律師則不得同時是司法的檢察官或法官也僧做代表人民議政的議員固無不可猶之商民農民工民自由職業民之為議員仍得是商店經理或新聞記者但政黨無不以佔多數組政府或分得掌政府治權的官位為目的只參預人民議政則無組織政黨之需要後者則在家信徒原有一部分的做議員做官吏的組黨或亦可更增加其人數但佛教黨以在家信徒為領導主持則佛教徒向以出家僧徒為首眾之制度便為倒置而破壞故在家信徒儘可參加各黨各派或另組別種名義之政黨不應以佛教名義而組黨復次佛教信徒是國民黨青年黨民主社會黨民主同盟都有的甚至共產黨也不是沒有而無黨無派的人則更多要是組了佛教黨他們各有某黨派或無黨派的原來立場既不能請他們改入佛教黨而佛教黨已另成一黨便與他們各別疏隔了我的學佛朋友及信徒也是各黨派無黨派的人都有加以哲學文藝及興辦文化教育慈善等之事業的關係連各宗教或無宗教的人也多交誼我領導了佛教黨則原有的各方面關聯也反減縮所以佛教不要組黨也但為對于傷害佛教者的辯護維持及發揚佛教精神以興辦服務群眾利濟人群的各種文化教育慈善公益需要各黨派無黨派的同情佛教者有一個聯誼尤其遇到教難的時候共同起來防救但我想擔任聯誼的最好是覺群社見覺群周報第三十期
