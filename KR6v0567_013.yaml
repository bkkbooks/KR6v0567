body:
  text: 儉勤誠公一雪竇寺訓二十四年春在雪竇寺講今夜召集諸位職事茶話特拈四字勉各位身體力行學校有校訓寺亦有寺訓今以四字作為寺訓第一儉字即節儉去除奢靡的浪費作為恰當的用度即是節儉出家人必須能節儉乃能安其淡泊之生活雪竇山簡稱雪山雪山是世尊修苦行之處若能在此住一年半載的必是能節省用度儉朴知足之人溈山大師警策文云少求儉用免逼迫於心田知足除貪播馨香於異地省儉乃能除貪希望由諸位實行節儉影響到本寺大衆再遠應諸方實行儉德能如此則可挽救現時奢侈之風而濟民困國窮之難矣第二勤字對懶惰懈怠而言無論作何事行何業都要勤勞力作不稍懶惰世人的勤勞不休大抵是被貪心所驅使一但貪念稍輕便覺世事一無所求流於怠惰今特別提出勤字以救中國人苟安之病此勤字在六度中即精進度在善十一心所中即勤心所三十七品中即四正勤故必勤勇精進以對治懶惰無論求學做事禮佛誦經應人接物都得精勤不懶才能稱之為勤出家人主要是上求佛道下化有情廣行菩薩濟世之道尤須實行六波羅蜜內之精進波羅蜜今不講精研五明親證六通即世間普通的事業學術亦豈不勤行能做到耶儒者日夜強學以待問之精神在替佛揚化之吾人須時刻匪懈於導世利物之行當職事尤應以盡職為原則第三誠字即誠實為人作事要虛心以處事誠實以待人不帶一點詐巧欺偽之心易得他人同情既有人表示同情乃顯精誠團結的力量凡有作為就易成功諺曰二人同一心黃土變成金近人説精誠團結即是純粹無雜的至誠團結力古書説紂有億萬人億萬心周有三千人唯一心有百里之土而能王天下者協力同心之效也此無他全在一誠字上用功現在中國各地寺院住持無法把佛教振興起來其原因亦在缺少一誠字若能開誠相見和合團結亦未嘗無辦法把佛教興起來即於經懺佛事而論本是從自己誠實懇切之心念經拜懺有人請薦靈祈福乃將一片誠心以回向施主如今念經拜懺者只知一天可得一二角錢了事各地寺院遂成善價而賈之工場把原來誠心修行之美德喪失故此時之佛教須是實行誠字乃可復興而中國民族之復興亦在乎誠第四公字表現大乘佛法之真精神即是無我大公之特別功用前三字大小乘共行此公字乃不共之大乘行也大乘行之為人作事處處要以為公衆作前提一無偏曲若落偏曲弊竇叢生叢林中職事於此公字尤應注意領衆行道有成人之美代衆之勞一切無礙則德業增進雪竇為諸方之所瞻望如能將事務辦理得如法次第他寺亦效法辦理未有自不能作而教他人去行之事故今後要少説空話而注重實行由僧衆能有為常住為佛教的公心而影響及全國人民能為社會為國家乃至天下為公皆須由實行而昭示於人也今舉此四字淺略説明身體力行之法希望各位努力實行以期見諸成效性定記見海刊十六卷四期二大雄中學校訓此儉勤誠公四字可分作三重的解釋第一重經濟政治的解釋比方一個人自己有工作的能力依之而得到生活的享受但必須工作才可生活若要想有點進步不致於碌碌終身長此困頓下去那末必須要從經濟政治開始經濟的發展要有資本政治是兩人以上所不能沒有的社會關係而資本的來源則又從儉省儲蓄而得若不能節儉蓄積縱有多的收入來多少用多少就會浪費無餘而永久沒有可供生産用的資本故資本是生産的因素而節儲是資本的來源其次要勤既有了資本就要勤勞來利用以求發展假若認為已往有了一點儲蓄即坐食享用懶惰偷安則以儉而懶懶到連原有生活都不能維持前途就不堪設想了所以必須繼之以勤利用資本來擴大生産發展事業一切經濟政治的建設皆從儉勤得來故儉必須繼之以勤不但消極的節流還要積極的開源才能有大的成就與收獲第三説到誠字如果不誠實就不能得到二人以上的幫助大的事業不是一個人能做成的在二人以上必須有言語文字互通誠款若無真誠雖家人父子間也不能互助合作不能精誠團結沒有互助的關係社會立刻解體任何事業不能成功經濟自然失敗故誠字是建立社會關係的根本第四要公公有公平公正之義既有誠必有二人以上的關係有了二人以上的衆人就要公平公正政者正也在政治上為衆人辦事叫作辦公辦公事的人稱公務人員要有公平才可安居樂業否者必致於互相侵害互相傾軋這樣的政治必辦不好而經濟也必致虧損用經濟政治的立場來解釋此四字每個字都與經濟政治有關若分開説用儉勤來建設經濟用誠公來建設政治意義尤為明顯第二重文化道德的解釋上面就社會生活講屬於物質的建設現在就社會精神的建設講比較超象精神方面譬如禮樂孔子説禮與其奢也寧儉樂要樂而不淫哀而不傷都節制過甚要有儉約限度的意思老子説吾有三寶一曰儉二曰慈三曰不敢為天下先第一就是以儉德為寶中國儒道家的人文主義其精神都首先注重於儉其次要勤凡事要達到精微美妙必須用勤來推動達成若有儉無勤在文化亦必孤陋不能發揚光大如文學哲學藝術各種科學及文物制度都要精勤才能達到深妙的進步古人如孔子好學不倦發憤亡食不知老之將至大禹惜寸陰陶侃惜分陰都是勤的精神第三要誠誠字在文化道德上的意義更豐富如云不誠無物各種物都是和合體若無誠則不能和合既不和合則物不成文化道德更是和合體人類社會是要用誠去和合的社會和合才有文化道德發展進步生生不息所謂至誠不息不息則久如點燈要有油炷和合方能發光中庸云自明誠人之道自誠明者天之道至誠可以參天地之化育有了誠上天下地一切萬物都可以相資相長乃至云至誠之道可以前知精誠所至金石為開此誠字在文化道德的關係上之重要可知第四説到公字平常説要大公無私人類文化道德要賴公正以達最高境界公正無私則與天地同春日月同明此必須從心理上養成無私的公德假若心裏有私欲存在對人對事就有所偏有所偏不免與人抵觸則私忿隨起私能損害公平的精神也就能破壞人類道德文化社會上沒有公平公正就是沒有文化道德故要保持文化道德亹亹不已要先能夠養成公平公正第三重佛法修證的解釋先從儉字説在佛法中最明顯的就是戒戒者有所不為而後能有所為即止其所不當為而行其所當為將不須有的不應有的動作行為戒除以節省其精神疲勞而作應作之事這是戒也就是儉同時還要以布施忍辱來幫助施者捨也要將不須有之事捨除如貪欲等要能捨除就能避免精神的虛耗浪費在精神上能蓄積儉省一旦用之於事功上效力必大其次忍也能助成儉德所謂小不忍則亂大謀一切無謂之鬥爭皆可從忍而息以免精神時間無謂的浪費由貪心起者捨之由瞋心起者忍之在佛法上説以戒為主以施忍為助乃成儉德其次勤字在六度中就是精進在三十七道品有四正勤勤要建築在儉德之上才是正勤正勤是純善的方可名精進如已生惡令斷未生惡令不生這是消極的止惡再進一步要積極的行善就是已生善令增長未生善令速生不但保持現有的美善還要令功德法財增長勤以精進為主也要以施忍為助勤於利人者要捨己之所有濟人之所求又要隨時反省自己捨除無謂的嗜好以集中精力作積極的善事忍者要忍辱負重安忍堅強才能擔當大事所謂持其志毋暴其氣才能負荷重擔經論上對斷除煩惱名棄捨重擔而利益衆生昌明佛法亦名負荷重擔這都需要堅忍不拔的精神菩薩要擔荷一切衆生的擔子見衆生有困苦艱難須代為忍受代為解決不能捨而逃避故須忍辱負重乃至忍飢寒忍惡名毀罵行利益衆生的事往往引起愚癡的反感如父母為小兒治病服藥或施針灸小兒哭罵跳打父母必須忍受不與計較而仍為治療故忍能助成勤之功德第三誠者即言行一致之謂誠字的會意即言成也就是言行合一的成就由言行一致進於心行一致心境一致到了心境一致就是禪定所謂心一境性心專於一境心境如如相應即是瑜伽故定學又名瑜伽又名增上心學心境的安寧清明是定之相儒亦云誠則明故誠之至達於定慧前面曾説至誠之道可以前知是定慧神通皆可由誠而得能志誠懇切心境專一則志趣堅定心無分歧專於一事即能專於一境心境融洽理事無礙定慧雙彰此誠之深義也第四公者無私之謂也要反問何以會有私由有人我相對先於為我故也要成大公德必去盡其私要去盡其私必破我執依佛法遍觀一切和合緣成本無有我徹底遍觀一切法畢竟空無人我自他之相可得則為我之私心可除宇宙萬有緣起性空完成大公證得法界無礙佛法教人修證須觀身空法空無我相乃至觀我與衆生同體平等而發大菩提心這是大公之極則以上所説要在日常身心上處世接人上省察警覺去實行方能獲益不僅在書本上語言上有此文句而已塵空記見海刊二十五卷第三期
