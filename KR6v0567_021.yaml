body:
  text: 修持與研究三十四年五月在漢藏教理院講我數月未回院今天略備茶果招集大眾談談我半月前在渝成都有來人談到他們對本院有兩種批評一是說我們院中只有聽講而沒有實地修行二是所講的佛學院內不一致互相衝突這兩點我們要辯駁也很容易如講說聽聞研思誦讀等皆是修菩薩十法行至於講學的不一致正顯門庭之廣大能容納各派各宗像唐時印度的那爛陀寺一樣各宗各派都有但與別人辯論是一回事而對自己檢點反省則不充足者應充足之進步的須更求進步方對自己有益所以在此二點上本院以聽講為必然的功課至於誦讀及早晚殿課等一般認為修行的因以聽講為主所以很是簡單那麼大家的事務也不怎樣繁重很可隨宜參加但也不必如學生一樣完全參加自首到尾固好而在殿課時或頭或中間或尾也可以自由行之此自發的有意識之一拜勝過奉行故事之千拜同時也可得互相增上的利益我們正可因別人的話而自己警策一下其次談到研講的不一致這當然是因為佛法乃應眾生的根器多種便也有多種的法門菩薩要修習道行智必須多學所以不必要死板的劃一但能夠有一種調協及溝通的研究便好從這一點意義下可以除開學生工役外本院其他的人都共同組織一個研究會共同研究以資培養成高等的弘法人才因這比學生更重要即是學生的能成為弘法人才還是靠真真實實的自去繼續研究工作才培養出來的須各自振作把自己認為是弘化佛教於中國及世界的人才各種高深學問都需要研究如院中現在有著好的指導人又有豐富的經書豈可錯過機會然也不可漫無系統所以我特分為四組第一是西藏佛學組此依宗喀巴大師的學說為主一切佛法及經論皆為教授其他各宗派經論為伴而研究之此組推法尊法師為指導開一法師助之第二是印度佛學組可依阿含經為主其餘之小乘部派及大乘空識顯密為伴此組推印順法師為指導妙欽法師助之第三是中國佛學組可依禪台賢淨為主其他各宗派經論為伴此組推葦舫法師為指導正果法師助之第四是現代佛學組可依我的全部著作為主民國之各家著作書刊為伴此組推塵空法師為指導心月法師助之此四組凡為研究會會員都要各承認一組乃至四組每星期由一組開一次研究會時間不必多而每組在一月中可以輪值一次此不過跟大家提出一個研究的線索此各組雖有其中心的不同但都是遍於一切佛法的所以同時也是互相攝入的我因病不能多講餘請法尊法師代主持須能成事實向上記見海刊二十六卷第六七期合刊
