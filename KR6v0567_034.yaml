body:
  text: 由經濟理論說到僧寺經濟建設三十五年十一月作經濟理論大概可分為三種一自由的放任經濟二集體的計劃經濟三民主的計劃經濟自由主義的放任經濟是英美等自有經濟學以來正宗經濟學所主張的但已顯見其弱點恐慌頻仍失業衆多資源浪費分配失當為救免放任經濟的弊害乃有集體主義的計劃經濟集體主義的計劃經濟雖救免了放任經濟的弊害但發生了如下的疵纍當局為使計劃推行有效集中一切政治經濟權力致成獨裁剝奪了人民政治自由經濟獨立及損失自由競爭經濟進步原動力執行計劃不得不對于社會擇業途徑生産技術嚴密規定因此妨害人民個性的發展及技術的進步執行計劃當局一因規定不容自發與更新優秀份子不願效命二因當局訓練馴務份子為幹部三因當局要全體人民擁戴採取包辦選舉總此三因易養成庸碌分子的腐敗官僚政治由是遂發生比較無弊的民主主義的計劃經濟民主主義的計劃經濟是美英等國觀蘇德意獨裁的計劃經濟施行對照下顯見向來所行放任經濟之弱點不得不酌採計劃經濟之優點同時又在民主政治下避免獨裁政治乃漸發生民主主義的計劃經濟與集體主義同樣的設立中央計劃機構設計及執行經濟事宜以期達到以最有效的利用國民經濟資源求經濟的穩定發展同時又不妨礙民主的政治在人民消費有選擇的自由有貨幣流通有市場存在及扶持私有企業的發展下編訂計劃及運用技術審核全國各私有企業的生産品種類與類量配合計劃不讓僅受物價的指導審核一切私有企業的生産計劃及其程序及所須生産數量獲悉各階層人民消費量根據以上各項修訂各業發展計劃併編製造各區域各社團局部的信用計劃等以輔助總生産計劃此種的民主計劃經濟無疑的將為今後最適宜採行的經濟制度以之而觀察到中國一部的僧寺經濟無疑的也將以能適合此民主的計劃經濟與否決定其能否建設現階段的僧寺經濟中國民主計劃經濟下的僧寺經濟建議要由佛教會調查登記全國僧寺的不動産與其他事業的收益品數編訂生産及分配消費之總計劃各省分會各縣支會各大寺得製出局部計劃提供中國佛教會審核參考並指導修正招集僧寺游資辦一佛教銀行為全國僧寺經濟之金融樞機各支會或各大寺各省分會集辦林場農場及發揚教化的印刷工廠與書局等工商業見覺群周報第二十期
