body:
  text: 改善人心的大乘漸教十九年十月在嘉定佛學社講一昔今教化之異宜佛法之教有大小行有頓漸為逗衆生之機宜而説契機方能流行契理方不乖旨所以應機隨宜而説方足以顯佛法之圓妙佛法之諸法實相雖周遍常住而契機之説確有時代性的如日本中國等之佛教情形各有不同為當處之機緣不同其施設之教法亦非一致在中國以前之社會凡可管公衆之事者唯少數人如帝王官吏紳士等其多數人則但應顧一家一生之生活餘事皆不宜過問在此情形之下故大乘佛法但能及於少數人而其他獨顧身家之多數人不能承受大乘故當時之所行者多屬小乘現在之時代確與前不同處此時代潮流之中無論農學工商等皆有參與政治之機會在各個人既皆作社會行動則佛教亦應有適合潮流之設施方足以延其餘緒大乘佛法是有社會性的以之養成兼善天下之道德行為實為現今社會所必需之佛法復次在以前中國之知識界皆讀孔孟之書而無知識的愚夫愚婦等則崇信神道佛教於此亦分兩種施設在知識界方面施與簡捷超妙的禪宗其不讀書之多數人則施與神道設教之教化然非佛教之本質如此實因當時之潮流不同為應民群之心理故其施設如此而現今之情形適得其反人人皆有擔當國事之思想至國家所提倡之教育乃國民教育使一般民衆皆得有國民常識若於此時再施與禪宗頓超法及神道迷信絶不相宜故應施與適合國民心理之大乘漸教使有國民常識之人易於信解二大乘漸教綱要發菩提心即起三寶之正信修菩薩事即修六度之大行大乘中之漸教包括全部佛教是有次序有條理的在使人能顯易了解漸能達到圓滿之最高行位其第一步應做到如何成為世界上最良善之人為入手然欲明了大乘佛法須先明佛教原理其原理為先從大乘三寶發起正信是為發菩提心若能發起此心以之修養人格根本已固便可據此修行以作種種之事是為菩薩之六度行三起三寶之正信三寶須先認清佛即無上正遍知者佛以法為師法是諸法之真相而非佛之所創為一切衆生諸法本來如此一切事物無不如此為佛所親證得諸法原理如科學真理雖由科學者所證明能為社會上之實用而其理亦本來如是故諸法真相不限於佛説佛説法如指上土其未説者如大地土要人從實際上去探索自心上去證明將所證得之實際普及於人使人人皆能達到因佛有此本能故應信佛此種信心為合理之信心而非盲從然而佛之真身無相應身不能常住於世俗衆復不能傳持佛之法律須有從佛出家依佛所説住持佛法之僧寶將佛法實效為人作證使人因之起信修證解脫一切苦惱纏縛更能流布佛法於無盡故應信僧信心既立依此心而作利國利人之事則名行菩薩道也四修六度大行與中國之聖賢大乘之行為六度萬行如華嚴等經所説不知者以為虛渺今以六度之行引中國古學而證明之一布施度伊尹曰何事非君其自任以天下之重也云云此文在六度中為布施之行布施者犧牲個人之利益以謀群衆之利益施有三種曰財施法施無畏施以財物濟人者曰財施以道德惠人者為法施以軍政衛人者曰無畏施欲行施度當以此文為標準餘如呂望管仲等皆有此行二持戒度如伯夷目不視惡色如坐塗炭等餘如叔齊管寧皆有此行三忍辱度凡作大事者須忍辱負重能忍者即能和平如柳下惠不羞污君爾焉能浼我哉餘如王叔度等皆有忍辱之本能宜可師之四精進度凡為不道德事所熏染須精勇求改以期轉移凡有利益群衆之事須精勤進步百折不回始終如一如莊子論墨子中曰昔者禹之湮洪水置萬國禹大聖也而形勞天下如此又孟子中禹稷當平世三過其門而不入又孟子曰禹思天下有溺者由己溺之也稷思天下有飢者由己飢之也若禹稷及墨翟等之為人見能利於民衆之事其精進勇猛之精神如此勵精圖治實為難能可貴凡服務社會而能捍勞忍苦者此為大乘忍度之行五禪定度古來聖賢多事修養而修養方法復各不同如莊子論卜梁倚三日而後能外天下而後能入不生不死又如顏回之心齋仲尼曰若一志而況散焉者乎此一段文乃孔子為顏子而説其精要處即為禪定之修養孔顏依之修養故有救人世之功能孔顏之所以得成為聖賢者其本在乎此六般若度般若即智慧智慧有權實二種實智即證諸法真相之智此與禪定相應權智為權巧方便之智有無所不可無所不能義如孟子之讚孔子孔子去齊接淅而行一段細味此文見得於行事上無定準皆為權智之表現上來所舉六種要義略證明佛法中六度之行為初發心者取之以為表率而莊嚴人格於人乘而通大乘庶乎其可也五中國聖賢六度行僅十信菩薩位之行菩薩之行必齊修六度而且一一相通中國之古聖先賢雖各得一行然亦互相攝據此可知六度非虛渺無憑實於人生有切實功效人能不違此教即由人乘而可度於大乘或謂既中國古聖先賢皆有此行殊不必再用佛法其實不然若無三寶正信僅以古聖賢之六度法去行但能達人天善果必須先發菩提心乃可成為大乘教中最初步之十信菩薩行故仍須提倡大乘佛法由起三寶正信以明大乘教理依大乘六度實行濟世利人之菩薩正行雖未能達十信之位而此菩提心可保永無退墮據此故應提倡大乘中之漸教實為現今社會所需要從另一方面講以今潮流推蕩政治溷濁之時民衆常抱不安更有一種現象已與舊日大異者即一般人已不讀孔孟之書亦漸少從事於神道設教之信仰矣由此古今中外各種思想雜亂而起時時衝突今欲將各種思想調和起來以與科學相倚而成立一新信仰必須用大乘漸教方可但其中深理頗非一時所能講了今惟略説其梗概六大乘漸教具足五乘包括中國聖賢所行而超出其上大乘漸教包括五乘之教義使從人天漸能躋登佛果不特有調和新舊思想之可能且能融貫東西文化其他宗教多與科學相衝突而佛學不特不衝突反能藉為證明若從歷史上講來前來二千餘年之佛學在在皆能貫通中國文化故佛教在今日之社會應盡調和之責任所以有提倡大乘佛法之需要但在代表佛教的現有佛徒尚無此種力量所屬望者在青年僧徒從此努力探討並將僧制改善俾能普及大乘佛法之利益於全世界克全記見西來講演集附注西來講演集原題在嘉定佛學社演説演説集作改善人心之佛學今改題
