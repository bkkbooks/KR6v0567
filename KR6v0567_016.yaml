body:
  text: 各人要在自己的岡位上努力卅二年十月在漢藏教理院講今天是民國三十二年的國慶日慶祝中華民國的誕生這種慶祝會的舉行是普通規定每年必須舉行的但今年的國慶紀念日除了這一點的慶祝而外還有特別值得慶祝的兩點第一是中華民國之所以誕生及誕生以前和誕生以後的幾十年間中間經過種種的痛苦是因為有了國際不平等條約的束縛直到今年元旦百年來之不平等條約的束縛才解除但這種解除只是名義的而實際上我們抗戰的勝利還待恢復淪陷區並完成建國之大業然而這種勝利已確立了且已日近一日所以重九與陶居士作詩有預慶黃龍茶當酒句宋時嶽武穆說的痛飲黃龍也就是指的東三省這失去已有十二年之久的東三省將隨著抗戰勝利的到來而歸復這是今天特別值得慶祝的一點第二是蔣主席就任國府主席中國近十幾年來無論軍事政治等能有一個中心的力量對外抗戰乃至使戰事穩定取得國際的同情等等都是蔣主席努力奮鬥的結果所以國民革命軍自北伐到現在中華民國已有光明的前途現在就任國府主席不但是他個人實至名歸的榮譽值得慶祝也是全中國的獨立自由乃至全人類的永久和平上值得慶祝的事不過在這種種值得慶祝的意義上中華民國的光明前途雖已確立但依蔣主席所著的中國之命運裏說中華民國的束縛雖已解除抗戰勝利雖亦有希望但要迅速達到完全勝利及建設成一個真正自由平等的現代國家使中華民族在世界成立獨立自由的民族其成功的原因已不在外而是在全國人民自強奮發與團結努力之上他說責任尤其重大而更應加倍努力的是中國國民黨與三民主義青年團全體黨員與團員能在這已有基礎上更加努力不但中華民國可以復興且可以促成世界大同相反的如果黨員和團員乃至於全國人民不將現實認識清楚把理想確定起來仍如以往散漫懈怠無組織無團結中國不但不能復興並且會造成永遠不能翻身的滅亡所以中國之命運的決定是在每個國民的身上這是我們今天慶祝時人人所要警惕的中國之命運決定於全體國民的自身而我們佛教又何嘗不是如此平常一般人說國人輕視佛教僧徒侵提寺産但中華民國對宗教的信仰是自由的無論是現在的法律或將來的憲法都有明文規定並沒有對佛教有什麼特別的摧殘和壓迫一切宗教都可以自由發展然一般寺僧為什麼會遭人輕視和提産呢這只怪自己無學無德能力不夠散漫而無團結混亂而無組織於佛教無發揚對國民無貢獻不足以興起社會人士的崇敬以致有此種種的現象發生譬如一縣或一鄉如有一個人或一個團體能夠領導僧衆及信徒或能作一些對社會人民有利的公益事業那一地的佛教不但不受摧殘而且可以興盛起來就拿本院來講吧在北碚附近的區域以內一些僧寺的産業十年前差不多提光了而自本院成立以來不但沒有提且得到擁護讚仰甚至有些小廟産業要送歸本院所以佛教徒之被人輕視寺産之被人提去只是自己本身的墮落散漫腐敗造成的政府並無任何障礙佛教發展的法令故今後佛教興亡盛衰其命運也只決定於全體僧衆及信佛的在家弟子全體佛徒在這種重大責任之下如果不能有全國一致的組織努力上進前途是很可慮的所以全體佛教徒要奮發振作共同努力才是說到這裏又想起一般老年的僧衆和信徒雖不能適應時代而作振興佛教的工作但他們已漸漸地要到過去的時候了一切舊習慣難於改變我們無須責備他們也不必希望他們由此佛教的責任又全在壯年和青年的身上然在這廣泛的壯年和青年的範圍之內也有大部分是未受教育不知不識的因此這責任尤其在二三十年來受過僧教育陶冶的具有現代知識的壯年青年的僧衆和在家徒衆然事實上就二十餘年來各處受過僧教育的壯年和青年觀察起來前途雖稍有希望但還是不能有力量的有何表現出來就我個人親身的經驗來說我辦了二十幾年僧教育雖然也有一部分學生各有一些特長從各方面去努力推動佛教的新興事業但詳細觀察起來能夠完全負起復興責任的全才和有組織有力量的集團還很難見到而正在修學的青年更是其中的重要分子可是事實上現在一般在學的青年每多不如過去的學生無論在思想上以及精神行為志學種種的表現都有降低的傾向這是最深堪憂的所以現今在本院就學的各生要深深的反省振作精神加強充實自己的志願興趣和毅力在求學期間要守住自己的岡位要安分的在自己的範圍之內努力精進在這裏我提出兩個標準一在求學時期做學生的要時時警策自己適應環境利用環境充實自己怎樣警策自己而適應環境譬如本院的環境是一個高等的佛教專門學院而且是一個有規律的佛教團體生活周圍有優美的山林比你們未到這裏來所處的環境要高一等你們既來自各各不同的環境中到了這個環境之內就應將舊染革除惡習汰淨時時警策提高自己以適應此時此地的環境使身心發生悅樂凡是院中所規定一切都應遵循以進修這裏既有如此勝美的環境那末就應好好的利用它來充實自己如所講授的學程規定修養的功課乃至閲報室圖書館設備的書籍等等都應取之用來充實自己我主辦的教育就一般說來是最為開放的如本院在規定上本是佛教的專門教育然有種種的機會得名人或專家時來演講又疊曾介紹你們參加夏令營等其目的在使你們見聞寬廣四通八達應變無礙但要緊的仍是自己在本院修學本位為中心可是有些幼稚無知的見聞到些後回來就覺得本院原有的一切都不滿意了要來什麼添設風琴哪籃球哪這好像一班留洋學生回到中國便覺得自己的國家一切都不好譬如在法國留學的就想將中國改成法國那樣的國家甚至恨自己不能變成紅毛緑眼的外國人這種現象就是中國近年來亂無底止的大原因之一你們參加過夏令營或其他社會行動只應取其能適宜於現在專受之本位教育以為資益此間既為高等的佛教專門學院對於普通一班中小學的設備當然無須要了如果說要鍛練身體課外可自動練習且本院已有規定的早操如再不夠在山上便可爬山並不一定要泅水如北極人可毳雪滑冰並不一定要學南洋人洗海水澡他若努力勞作亦是很好的運動日本高野山大學的學僧每天規定朝拜弘法大師塔一次往來二十餘里這一方面運動身體另一方面又能與信仰的精神生活符合你們如果仿行課外在佛殿禮佛坐禪一二小時或每天去朝拜太虛台一趟豈不是更好的運動麼講到音樂佛教的團體生活原來是與禮樂配合的所以宋儒稱讚說三代禮樂盡在僧寺中矣但你們不能享受才要反慕粗俗的又如佛曲梵唄以及晨鐘暮鼓磬韻魚聲等都是很高妙的歌唱和音樂如本年楊仲瑚李思齊兩君在此過夏不但耽悅這裏的山林幽美而且還留戀這裏早晚的鐘鼓和歌唄感動的不忍返去所以如有音樂之好的能夠利用這種佛樂的環境加深練習自然也可以充實自己否則世間的東西多得很那裏可以在專科內配得齊一科內配齊了反要成為雜貨攤一個人東學西習那便是馬浪蕩還能有什麼專門深造住在這裏就當適應這裏的環境進而利用此環境以充實自己要使身心得些禪悅法喜才算於佛法寶山中不曾空回二在學各生將來便須出去做事現在也順便提出一個標準那就是要透視現實確定理想根據理想去改造現實這現實兩字寬泛得很如依佛法講全法界一切衆生是現實使皆成佛是理想或全人類是現實使均得自由幸福為理想中國佛教是現實使之復興為理想乃至教書辦事務等無不包涵於現實之內所以這個現實是可大可小的總之無論大事小事要想把它辦好必定要把它透視清楚進而確定理想包括方法和目標再根據理想促其實現如本院在民國十九年時劉甫澄督辦要派漢僧入藏留學我當即建議不如設學院召收康藏與內地之青年學習依當時事實即確定了此理想故有十多年來本院之實現現在正在做事的壯年與就學的青年第一要對中國佛教的現實認識清楚第二是認識清楚以後確定其理想進而促其理想之實現你們不久即將畢業或者去辦佛教會或辦僧教育或辦慈善公益或接管寺院等一定要遵循這個標準方可有成功的希望目前要振興佛教苦的就是缺乏人材因此佛教的前途發展雖教外無何障礙但於教內仍無辦法現在佛教是自由的因為是自由所以是自生自滅的正在受佛教教育的僧青年不但要知求學標準還要知做事標準以便將來事事能幹如此則佛教方可以興否則即衰故佛教之命運可作如此之判斷今在本院求學的學生能夠親近辦僧教育二三十年的老僧還來訓誡你們教導你們千里萬里外八年十年後的人不知如何的歆慕你們如果你們還不好好修學真是愚蠢極了所以你們必應生起希有難遭之想努力精進佛教的光明前途才有希望復興的理想才可以實現或在五年十年後中國佛教也在中華民國國慶日可以特加一重值得慶祝的意義光宗記見海刊二十四卷第十二期
