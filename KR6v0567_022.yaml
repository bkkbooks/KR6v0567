body:
  text: 僧才訓練班訓詞三十四年夏作後世號稱做事的人往往不學無術卑污苟且而號做學問的人又往往死於章句之下做古人奴隸其最大病根就是把學問事業分做兩截此言道得其半猶有號稱做修證工夫者又往往拘身靜獨於讀書涉群亦撥為多餘總之將學識事功道德打成三橛此中國趙宋以來儒門與佛門均少全才之由也吾前者為本院發起研究會曾言人人皆當自視為復興全中國全世界佛教之分子所作無論巨細皆為弘揚佛法於全中國全世界之事業故皆須有廣博高深學問修養如此則自然越做事越要孜孜求學越求學越能孜孜做事而道行德智之實修證亦自然日著其體驗之工夫於其間矣不曰僧學而曰僧才訓練班者亦懲向來辦學死在章句之失期教者學者咸在訓育德行練習辦事中求學也僧才訓練定期一年自去秋以至今夏已屆畢業而余適在長期病廢中曾不能與教者學者共其精苦乃至亦未能一考所訓練之僧才究得若何成效所辜負於自他者誠悲憤無已今欲為一言以贈諸生亦何有他説惟有重述修道做事為學要打成一片而已諸生撫躬自問果人人達到此訓練成材之目的否勉之勉之見海刊第草六卷第十期
