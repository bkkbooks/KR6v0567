body:
  text: 現代僧教育的危亡與佛教的前途二十一年十月在閩南佛學院訓詞我年來關於佛教的教育感覺到只有滅亡的氣象沒落的氣象這使我多麼底憂懼和失望喲我個人到沒有什麼但我對於你們的將來又使我不能不為佛教前途寄豫期望來為你們尋找出路但是在教育的行程上怎樣地使他向著光明如中國的教育應該本著中國一般的社會所需要的而施設能夠在事實上去體察才有進展的希望這決不是懸空的因之所謂佛教的教育為要住持佛教要化導現代社會所以也要適合現存的寺院和現狀的社會如何而去施設假若是這樣則佛教的前途進展是沒有什麼妨礙的否則恐有關係到佛教本身的危險一般社會人民的心目中認為一般的佛教徒衆或者一般寺院可以代表佛教但是現代的一部分所謂出家的徒衆和一般寺院都不能依佛的教理腳踏實地底去信解行證所以雖尚存有佛教的形式但因不合佛教法律之處很多故不能代表佛教像這種不適合佛教的教義與意旨的一部分佛徒和寺院是決不能夠住持現代佛教而化導現代社會的並且被社會一般的人民所攻擊的雖然被攻擊的是這一部分究竟影響到整個的佛教我們應該要趕快醒悟我們年來受到教內教外的種種打擊是夠我們警覺的了在環境惡劣中的中國因為自身底不幸又遭遇外來的逼迫差不多所希望的所理想的都完全變成幻滅了喊了多年的普及一般國民的教育施設在那裏照現在國內已施設的教育機關而論是不是適合中國社會所需要的是不是在意義上涵有普及的意義這很值得我們注意的以中國年來所施設的教育我敢大膽説一句不但沒有普及更不是目前的中國所需要的因為現代中國的教育為適合士大夫而施設的為模仿外國而施設的前一種是階級式的教育當然談不到普及後一種呢在現在的中國不能適用像這些教育不但無利益於國家而且還可以傷害國家的命脈在佛教的教育立場觀察佛教的教育又什麼樣十幾年來在中國佛教裏所見到過的什麼普通僧學院佛教大學華嚴大學或佛學研究社法師養成所等這大都是一般講經法師出來辦的與中國的士大夫教育通犯一病所以我對於佛教的教育感覺只有滅亡的氣象在這錯誤的時代什麼事都是依著時代的錯誤而錯誤凡百事物以錯傳錯都是如此中國教育模仿外國而佛教教育就模仿中國如法師養成所恰與中國士大夫式的教育一樣這在僧教育的立場來批評他們所辦的佛教教育不是為整個佛教情形所需要的來辦的不是為信解行證全部佛教來辦的不是普及佛教教育的這都是古時代階級式的教育遺痕我所希望的僧教育不是去模仿學作講經法師而已必須要學習整個的僧伽生活要勤苦勞動淡薄要能做擔水扛柴掃灑應對以及處世理事修禪弘法的工作從前各種僧學出來的學僧不但不能勤苦勞動去工作甚至習染奢華而不甘淡泊這可説是模仿社會學校所得的結果而誤於法師養成所的以為別種事不可幹除去講經當教員或作文辦刊物以外把平常的家常事務都忘記了假若全中國的僧徒都來受教育那末寺院中家常的工作都沒有人去做了結果不但不能住持佛教甚至消滅了佛教墮落了佛教像這種教育還不如沒有好現在在這兒修學的學僧希望大家要把這一點認識清楚我以為至少要具備下列二個條件才配稱做現代的學僧一要守清苦淡薄的原有的佛教生活出家人尤其是修學的學僧不要以奢華的生活為美而且要比較一般人格外能清苦淡薄過簡單朴素的生活以此為我們出家人的美德二要能勤苦勞動受過教育而有知識的僧徒要格外的勤苦勞動才好走路不要以車代步各個人的衣食與種種的器具能自己動手去作假若你們把上面所説的都能夠實際上行去這才略有學僧的人格同時把這應用到修證和宣揚佛法的工作上方可適合於現代社會而不相違背在做學僧的時代特別要能勤苦在讀書方面如筆記校對的工作格外要精進勇猛地去幹在這裏我要再三地提出來希望你們注意現代學僧所要學的不是學個講經的儀式必須要學能實行佛法建立佛教昌明佛學而養成能夠勤苦勞動的體格和清苦淡薄的生活因為佛教必須要建立在有組織的廣大的寺院上為修學的道場和宣揚的機關一方面與社會民衆有直接的關係另一面與國家政治亦有間接的關係這是要你們觀察社會的變化來謀佛教之如何施設的假若你們能夠觀察得到又能夠實行得到才可以住持現代佛教僧教育裏的中心點就在這裏在這裏的學僧有的兩年前在這裏已經聽過我的講話還有新來的學僧沒有聽見過的我今天略略把僧教育的綱領與意旨對你們求學的學僧説説也可説是對一班的僧徒而説但所希望的只在你們自己去實行佛教才有光明的一天切勿專門在口頭上空喊在實際上適得其反這是我欲增進中國僧教育發展的關鍵而同時感覺到過去僧教育的大有缺陷之處特別把我的意見貢獻於你們使你們前途的希望和幸福就從此開始你們不要把自身看得太輕微了須知今日的學僧便是將來佛教的中堅僧界的柱石假使沒有認清楚僧教育的意旨沒有養成勤苦勞動淡泊的習慣焉能擔得起異日住持佛教的重責又焉能與各界爭長比短這是你們應憬然猛省的事二十一年十月二十九日燈霞記見海刊第十四卷第一期
