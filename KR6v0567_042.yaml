body:
  text: 信心十六年初夏在福州講華嚴經云信為道源功德母長養一切諸善根則知世出世間一切善根功德之本唯此信心得之而作聖成佛失之便流轉生死永溺苦海惟起大乘之信心庶幾佛種不斷此馬鳴菩薩所以有大乘起信論之作也唯識等論明十一善心所亦以信心為首諸修行人雖具修百善若無此信心則其為善乃雜染而不清潔不足以期無上之道昔禪宗三祖僧燦大師信心銘以明達磨之西來大意後永明禪師亦謂但入信心便登祖位皆足以證此信心為超凡入聖之根本學佛者之第一層基礎也又如彌陀經謂為一切世間說此難信之法則知淨土法門亦行之非艱信之唯艱修此行者之所以願不切而行不篤者皆以無真正之信心耳衆生外感業繫內迷妄執熏染已深往往雖發心學佛視其形誠乾乾惕惕若已深有信心者而試使按心自問則其信心者依然迷惑顛倒妄想煩惱之心耳認賊為子以妄作真佛法之正信心渺不可得論喻信心如水清珠能澄濁水故欲證此信心之下落當觀察自心一切迷惑顛倒妄想煩惱等不定之心皆已寂滅則此信心乃根固蒂密不可動搖入正定聚菩薩位矣否則盲從迷信猶在顛倒不定之途未足云已具信心也欲得此正信心當去淨無始劫來惑習熏染之邪知邪見而求得佛菩薩之正知正見茲將邪知邪見之由來表列於左為著手去滅之預備邪思不正思惟妄斷為是內生夢想夢境中或禪靜中之發現景象執以為實邪知邪見之由來邪教遺傳來之神教等外來惡俗圓光扶乩等一面竭力破除神權迷信之邪說私心自用之惡習一面依佛經論及善知識之開示勤求正知正見以得此根深蒂固確乎不拔之信心孔子云吾十有五而志於學三十而立信心猶立志也志立而學成矣信心立則一切善根具無上菩提之基立矣求正知正見之道當具如下之三種修習一經論為正教量當精徹研究學習思維以為思想之標準二善知識為先知先覺者當時刻親近乞其開示三息心靜慮以參研所疑以期斷疑生信入佛知見然大概言之必如何乃為真正信心茲依大乘起信論分為四義一信根本謂真如性為一切法之根本即所謂諸法實相亦謂之本來面目如實了知其義確信無疑謂之信根本二信佛圖畫偶像固為佛之形相然金剛經云若以色見我以音聲求我是人行邪道不能見如來則不可執形相以求佛佛者覺者阿耨多羅三藐三菩提也覺諸法實相之謂佛故曰如來者即諸法如義如是而信乃謂之信佛三信法發菩提心修菩薩行了解三界衆生之依正無非有漏之苦由煩惱業之所集起欲普令衆生皆得解脫當修習六度萬行即知即行謂之信法四信僧有廣狹二義四人以上曰僧出家五衆同起居同飲食以清淨戒行而和合之衆曰住持僧三乘之聖賢衆同修一事同遵一理彼此和合大衆清淨曰勝義僧如金剛經中之四向四果等華嚴經中之十住十行十向十地等皆聖賢僧之類也能了解其所以為僧者證得其如何起因如何修習如何得果以此起信是為狹義的信僧僧者和合衆義凡為衆緣和合之所成者皆謂之僧四大和合而成此身四大失調則病四大分離則死故和合衆之性乃一切事物之所同具大至世界小而微塵無不以和合衆為原則能遵此和合衆之原則實施於家庭則家齊推而至於社會國家世界則天下太平矣以此起信是為廣義的信僧學佛者能依此至教量求得正知正見斷疑生信起正信心則舉足動步頭頭是道道道皆波羅密行行行入無礙法界矣故當求正信心之成就不可玩忽寂光記見海刊八卷八期
