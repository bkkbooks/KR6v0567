body:
  text: 佛教寺僧的經濟建設三十五年九月作抗戰八年後方工商業因經濟政策的束縛由困頓而迫近崩潰邊緣勝利以後收復區的工商業由于經濟政策未能作盡善盡美之調整而瀕于破産這是稍微注意國內工商界情形的人沒有不知道的上海工商界幾度到南京請願無不是為了挽救這經濟的危機彌補這經濟政策的失算但我們要知道一個國家的經濟政策并不是完全著重于財政的收支還要能通盤打算培養人民財力藏富于民的國民經濟我們檢討經濟政策失敗的癥結而從事緊急救濟殊不失時效我們深知道今日中國的經濟政策是犯了偏重財政收支而忽略了從事生産的國民經濟故目前中國經濟危機之救濟在如何迅速動員國內所有的生産力量從事增産工作有産斯有財生産豐富政府財政基礎穩固人民生計才有著落民生主義也才可以實現在全面的國民經濟政策建設之下佛教寺僧的經濟建設是刻不容緩的當務之急我們知道今後的中國社會是每個人民自力更生的社會就是說勞動與享受均勻要想不耕而食不織而衣坐享其成恐為今後社會所不許且自己亦不過意固不須人人實行耕織而遺棄政教文化等工作但亦不能人人站在生産圈之外頂好能直接參加生産工作或間接促進生産以期國民經濟的通力合作近國內寺僧在佛教會領導之下已稍能展開辦僧教育及辦醫院學校等社會公益慈善事業殊屬可喜然寺僧不能聯合開發其經濟的源流則所興辦事業將無力荷負久遠為此特列舉開發經濟源流如下一山鄉寺僧應就原有山場田地在縣區聯合為林場農場或農林場之開辦二城市寺僧可就寺地所宜集辦罐頭筍菜及僧衣鞋帽或圖書館印刷等工廠商店三應民衆需求而服務的經懺應由佛教會訂立法規整理運用以增經濟收入同時改善風俗全國寺僧如能依此各隨分宜做去不僅佛教經濟現象景氣起來且于中國整個國民經濟亦不無好影響見覺群周報第七期
