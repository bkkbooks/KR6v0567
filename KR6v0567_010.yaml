body:
  text: 學僧修學綱宗二十年三月在閩南佛學院講去秋到北平四川差不多離開十來個月回院見又有許多學僧是從各處地方來的這也是很可喜的事我在此處不能多講數日後又要到別處去了竟沒有閒暇與諸僧談話所以我今天特將在此處修學的一個綱宗提出來講講一立志的標準大家來此處修學當然是抱了志願而來的前次我曾教你們將各人已往的經歷和趨向的目標作一個簡單的寫明看到各人所寫的固然都是很有志願而非無目的地漫然集合于此處的然要在此共同修學尤要有共同的志願固不妨個人有各人的天性有各人的環境有各人的出發點有各人的趨向地但總須有貫通的共同志願所以我首先要講立志的標準此標準大家應立志修練學習成功即可為住持現代佛教的現代僧伽如從學佛法的廣遠意義講起來當然在發菩薩心行菩薩道但從南普陀寺所以辦閩南佛學院的僧伽教育來說即是看到近來中國的佛教僧眾對于住持佛法已不能勝任其職佛教在中國現今之制度與其在歷史上之關係住持佛法的責任的確是在僧伽但是現在僧伽不振需有適應時機之施設將其復興起來故近來中國佛教寺院中往往設立佛學院而我們創辦閩南佛學院亦為應此造成住持現代佛教的現代僧伽的需要大家若皆抱定此種志願而來求學由同志同行同趣同向而自然易成共同和合之精神與教職員亦成共同的志願於是乃能融合閩南佛學院多人而為一體互相督促而有進無退至各人于此標準中也許得有差異因為雖同是要做成住持現代佛教的現代僧伽人材但這種人材也是多方面的要有各種學識和經驗的固亦不妨就其性之所好者偏重之但總須貫通在此標準志願範圍中而後能覺得所領受者與其志願很為相宜與諸教職員亦能精神一致共同站在住持現代佛教之現代僧伽上二為學的宗旨諸學僧既然要來做成一個住持現代佛教的僧伽那麼各人自己的身心就要浸漬在佛法的正見和正行中而使自己的身心完全與佛法相應這就是對于個人人格上的為學宗旨而利他方面還要拿一個熱烈的心腸來將那佛法昌明建立流傳到世界中去換言之不僅解行佛法獨善其身還要將佛法擴充到全社會裏去發展到全人類中去既然如此在此修學時期必須要預備辦這種事業的工具即是要有世間的各種常識科學哲學的常識各民族歷史地理等文化的常識此外還有宣傳佛教的文字語言倘使沒有普通的科學哲學思想而歷史的關係和地理的根據亦復不知世界的常識完全沒有則就不能闡揚佛法到世界中去倘使沒有很好的文字和語言做工具則心中的佛法便沒有方法使之傳播出來話雖這樣說但各人須要把所以學這些學問的宗旨抱得牢牢的不可失掉要知道學這些學問為了要把佛法流通到世界去把他的真理闡明出來以作濟世利人的事業故根本宗旨在於佛學如失掉了這根本宗旨縱然有很好的文字語言但你所發表出來的不是佛法而是你個人的意見或是另外的思想這於所以要有世界常識的本旨完全相悖逆了倘知道為宣揚佛法而學這些的那麼就學日本文來說便不是想將來做日本文教員或是普泛的想將來閱讀和翻譯日文書假使如此則是與通俗為謀生活而讀日文無所差別而與佛學院學日文的宗旨不合了所以各人須把佛學院為顯揚佛法而學習這種學問的宗旨抱定各人皆站在佛學的立場上把佛學認真的修習把精神集中在研究和修學佛法上這樣去兼習世間的學問才不會離掉佛學的宗旨三院眾的和合上之兩種條件還是屬於內心生活的要將這種內心表現出來而作到事實上的院眾之和合即是佛學院之大眾要作成和合的表裏一致的和合眾這也可分做兩點一師生的和合就分位上說是有學僧和教職之別而在事實上要作成一個很和合的僧伽團體不惟精神上如是即是外表之禮節儀式上亦要表示出很有秩序的一致和合樣兒來如學僧對教職有相當的儀禮和恭敬教職對學僧亦有深切的愛護和照顧推其原因學僧是因為知道教職是為學僧而來服務的故知恩報恩知德報德而有親切和悅的禮儀恭敬之表示教職因為知道學僧從各方而來其立志為學都是相同的故教職對於學僧有深切的愛護和體貼凡為學僧合宜的需要和要求樣樣竭力應付而以眾人的公共利益為前提如此則師生志同道合之精神見諸于日常實用起居亦成為很有秩序很有規則很整齊嚴密的一個團體了亦即師生成了和合一致而立于共同遵守之律儀上真能達此目的則院中教職員學僧不難為僧伽團體中之精神和合的模範了二教職員與教職員和學僧與學僧的和合院裏教授功課的教員辦理院務的職員皆要合作進行不致稍有阻滯其志願其目的其宗旨其方針皆要共同在一個方向上而要表現出有組織的氣勢來同時教職員與教職員學僧與學僧學僧與教職員皆能各安其分各盡其責循共同之軌則終日到晚的日常生活天天如是這正是養成住持現代佛教的現代僧伽的實現也就是閩南佛學院能夠造成住持佛教的現代僧伽的實際成功四環境的適應環境的範圍很大而此處所講之環境乃以閩南佛學院所日常接觸者為限此中亦可分為兩種第一對於南普陀寺的適應第二對於南普陀寺所在的廈門地方之適應此二種皆是本院院眾日常所接觸到的環境就第一點說南普陀寺與閩南佛學院實在是有最密切而直接的關係本院不但設在南普陀以內而其設立的基本即在南普陀寺這個學院也可以說就是建築在南普陀寺之上的本院院眾對於南普陀寺的環境應當好好的去為適宜的應付不得有所抵觸致生障礙就日常生活方面說每日三次過堂一次上殿這是全寺僧眾所共同實行的所以要與佛學院以外的僧眾有共同一致的行動現在南普陀寺既未曾另改規制而本院院眾須要切實履行南普陀寺的制度這樣院眾寺眾都成和合一致而精神統一了凡人都有適應環境的必要自然科學與社會科學說得好適者就生存意思說凡是一個人或一種族能與所接觸的環境相適宜那就可以生存現在本院院眾的共同精神要有此種觀念即是要能善於適應南普陀寺所行的規制簡單的說遵守上殿過堂等規則謹飭出入往來的行動乃至對于南普陀寺的辦事職員要有相當禮節不可有輕犯的情形這是適應南普陀寺環境的一種其次學僧對于南普陀寺的寺眾要具報恩心慈悲心要知道我們在院內修學可以得到于身心有益的智慧功德而其餘的寺眾因為要適應社會環境去辦理事務不能夠進來修學但是他們辦的寺務即是于你們修學有很大的恩惠不要覺到他們不能修學智識不如你們對之起驕傲心要懂得你們之所以能夠修學乃是由他們的勞苦而才能如此的故對之要生起謙恭的心要生起慈悲心與寺職寺眾感情融洽將所求得之佛法利益能有資助他們的地方本院眾須注意于此不可像其他寺內的佛學院往往發生寺院衝突的情形本院創辦有年初時未免有這種幼稚毛病近來好像一個兒童漸漸大起來了應不會再有那無知識的舉動暴發出來因為長大成人都能知道人生以感情為重要所以要將潛移默化的精神表現出來大家都應以眾人的利益為前提不生起知識上的驕傲而有慈悲的表現倘使不這樣那就同蛇吃了水草而變成有毒的東西一般不但于人莫有利益反而有損院眾能注意于此不但佛學院的基本可鞏固並且更有擴充的希望再就第二點說本院設在南普陀內南普陀寺所在的地方即是廈門每日山門一開便與廈門的社會群眾相接觸但日常是由南普陀寺的辦事僧眾去應付他而院眾對於應付廈門社會的事情是很少的但有時候也有這種事情必須要閩南佛學院院眾和南普陀寺寺眾共同一致去做的大家就要共同去切實的做以應付這種環境例如每年做水陸逢香會的時期等其次對於廈門本地的言語得暇時也可以留心學習如能懂得一點廈門話設逢廈門偶有特別的時機也就可以隨時做一點宣揚佛化的事績而去適應社會群眾之需要了這樣閩南佛學院為南普陀寺內之一個修學的機關又可為南普陀寺外之一個弘化的機關了如此廈門人乃不難得到閩南佛學院的好印象也可以使廈門的民眾對南普陀寺增加信仰并對于佛教生起正見再其次從個人方面來說假使本院一個學僧走到廈門街上或到廈門所在的各寺庵裏去也要有使人可欽可敬的地方不要使人看到你們說你們不學還好些一學到反而比平常更不好總要像受過僧教育的樣子所以那種善良的溫和的可敬可尊的儀表必須要具足的假使把這種條件做到則在寺內就成功和合的律儀團體在寺外就成功能適應環境的優秀分子環境是極寬廣的不僅廈門而閩南而福建本省乃至影響到別省以至全國的事也是有的但現在姑就切近的廈門而言能有可欽的感情不驕傲而謹讓有禮的外表則就容易使人景仰而感化也就可以說慈悲化的主義實現閩南佛學院對于此點現在是能漸漸的轉移社會使人感化的時機了我希望本院院眾更要向前進一步要能夠使閩南僧眾都生起這種觀念以為我們出家人不可不去佛學院參學不可失去這種良好的機會不去琢磨這樣才算得辦這閩南佛學院有了一點實際的成績和效果這四點每人每天早晚可拿來審察倘是在如此做著則佛學院的精神就會增長好像春天的樹木發榮而生長似的覺到這天所為的有點不大相符就要痛自懺悔倘使看到同學中有點不對也就要去勸勉他那末大家對於佛法上就日日增長佛經云因戒生定倘使對於這四點而能好好底實行那就是守戒也就能使心神不散貫注安定了此外還有四點可以做大家日常內心反省的工夫一信心充實否我們在這裏學佛法我們每日就要在內心中問我們自己是否對於佛法的信心有所增加如對於佛法的信心有所損失覺到佛法淡薄寡味那就不對了倘使一天一天的覺到佛法有趣味對於我們有實際的利益那就有了進步和效果了學佛是以信心為本的學的一般知識並非完全是好的譬如世界上有那種邪識惡見做出那種荼毒生靈殘害人民的事實也是由學得來的結果故為學非漫求智識而要有佛法上信心的充實換言之如果信佛就不失去學佛的資格不信佛就是智識豐富也是於實際毫無裨益二見解正確否自己的見解也應天天去省察看他是否一天一天的明確而正當倘能一天的正確一天那末雖學世界上各種學術但遇到各種的思想義論當前時菩薩須在內心中省察是否我的心為他所引動和誘惑能否用佛法來判斷他和攝化他將他的不好底渣滓排去而將他的好底精華吸進於是對於佛法正當明確的見解就能日日煥發倘不能如此覺得佛法沉悶而枯寂時為通俗學說思想所牽引則你的根本被他搖動也更無見解正確之可言了三護教熱烈否凡為正真的僧伽對於愛護佛法的心應當比愛護個人的生命還要緊些要立願將個人的身命為建立正法昌明佛教而犧牲以此為精神上最大的安慰因為雖犧牲個人之身體卻創造成美善的大乘法身慧命而又能使正法得久住於世以饒益有情諸學僧亦應以此常常自省如對於佛法有熱烈而誠懇的愛護這就是對於修學上有了進步不然雖同是求知所得者或反與佛法遠離了只圖個人目前的生活或暫時身心的安逸毫無佛法的精神而與所立之志亦不相合大家能愛護佛法不惜身命才合作住持現代佛教的現代僧伽四濟世懇摯否不是以道德自修隨順環境就能了事的還要有大悲救世心懇摯地去做濟世利人的工作才算是大乘菩薩的精神倘使不能宏揚佛法利世濟人自覺但為個人而忙而於為眾人謀利益之心一點也沒有那就應當生慚愧心知道自己於求學是退步了如覺到濟世救人之心一天天的高漲而實際上也能拿佛法來適應社會需要使眾人得沾佛法之益這就是求學有進步了這就是小乘大乘的分別關頭這是應當好好注意的這四點各人要常常置諸心頭仔細考察若能這樣去做久之就有很大的功效不然雖學也無利益且可以因學反生出毛病來前四點是院眾共行的標準後四點是各人內省的依據合集起來可以作在本院修學的綱宗我不久將要他往希望院眾能使我於今年回院的時候見到已將這種精神在事實上表現出來二十年三月十六日默如記附註演說集原題閩南佛學院學僧修學綱宗學僧之路作現代學僧修學的綱宗今改略
